<!DOCTYPE html>
<html lang="ro">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EMX</title>
<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;600;700&family=Share+Tech+Mono&family=Exo+2:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
html, body {
  margin:0; padding:0;
  background:#080c18 !important;
  color:#c8ddf0;
  font-family:'Exo 2',sans-serif;
  min-height:100vh;
}
*, *::before, *::after { box-sizing:border-box; }

:root {
  --bg:   #080c18;
  --bg2:  #0d1120;
  --bg3:  #111828;
  --b0:   rgba(0,210,170,0.12);
  --b1:   rgba(0,210,170,0.35);
  --b2:   rgba(0,210,170,0.6);
  --cyan: #00d2aa;
  --c2:   #00b4ff;
  --grn:  #3dffa0;
  --org:  #ff7c2a;
  --red:  #ff3d5e;
  --txt:  #c8ddf0;
  --mut:  #4a607a;
  --glow: 0 0 20px rgba(0,210,170,0.25);
}

body::before {
  content:''; position:fixed; inset:0; pointer-events:none; z-index:0;
  background-image:
    linear-gradient(rgba(0,210,170,0.025) 1px,transparent 1px),
    linear-gradient(90deg,rgba(0,210,170,0.025) 1px,transparent 1px);
  background-size:36px 36px;
}
body::after {
  content:''; position:fixed; top:-150px; left:50%; transform:translateX(-50%);
  width:700px; height:400px; pointer-events:none; z-index:0;
  background:radial-gradient(ellipse,rgba(0,180,255,0.05) 0%,transparent 70%);
}

/* ── VIEWS ── */
#vPublic, #vAdmin { position:relative; z-index:1; }
#vAdmin { display:none; }

/* ════════════════════════════
   PUBLIC
════════════════════════════ */
.pub { max-width:860px; margin:0 auto; padding:0 16px 80px; }

.banner {
  display:flex; align-items:center; justify-content:space-between;
  padding:28px 0 20px; border-bottom:1px solid var(--b0);
  margin-bottom:22px; flex-wrap:wrap; gap:12px;
}
.logo {
  font-family:'Rajdhani',sans-serif; font-size:62px; font-weight:700;
  line-height:1; letter-spacing:-2px; user-select:none;
}
.logo .e{color:var(--c2)} .logo .m{color:#fff} .logo .x{color:var(--grn)}
.logo .dot {
  display:inline-block; width:9px; height:9px; border-radius:50%;
  background:var(--org); box-shadow:0 0 12px var(--org);
  margin-left:3px; margin-bottom:10px; vertical-align:middle;
  animation:blink 2s ease-in-out infinite;
}
@keyframes blink{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.4;transform:scale(.65)}}

.bnr-r { display:flex; align-items:center; gap:10px; }

.tok-btn {
  display:flex; align-items:center; gap:7px;
  padding:10px 16px; border-radius:10px;
  font-family:'Rajdhani',sans-serif; font-size:14px; font-weight:700; letter-spacing:1px;
  cursor:pointer; border:1.5px solid rgba(255,124,42,0.4);
  background:rgba(255,124,42,0.08); color:var(--org); transition:all .2s;
}
.tok-btn:hover { background:rgba(255,124,42,0.18); border-color:var(--org); }
.tok-btn.on { border-color:var(--cyan); background:rgba(0,210,170,0.08); color:var(--cyan); }

.adm-btn {
  display:none; align-items:center; gap:7px;
  padding:10px 16px; border-radius:10px;
  font-family:'Rajdhani',sans-serif; font-size:14px; font-weight:700; letter-spacing:1.5px;
  cursor:pointer; border:1.5px solid var(--grn);
  background:rgba(61,255,160,0.07); color:var(--grn); transition:all .2s;
}
.adm-btn.show { display:flex; }
.adm-btn:hover { background:rgba(61,255,160,0.16); }

.srch {
  position:relative; margin-bottom:20px;
}
.srch input {
  width:100%; padding:12px 16px 12px 44px;
  background:var(--bg3); border:1.5px solid var(--b0);
  border-radius:12px; color:var(--txt);
  font-family:'Exo 2',sans-serif; font-size:15px; outline:none;
  transition:border-color .2s;
}
.srch input:focus { border-color:var(--b1); box-shadow:var(--glow); }
.srch input::placeholder { color:var(--mut); }
.srch-ico {
  position:absolute; left:14px; top:50%; transform:translateY(-50%);
  font-size:17px; pointer-events:none; opacity:.45;
}

.secs { display:flex; flex-direction:column; gap:12px; }

.sc {
  background:var(--bg3); border:1.5px solid var(--b0);
  border-radius:14px; overflow:hidden; transition:border-color .2s;
}
.sc:hover { border-color:var(--b1); }
.sc-hdr {
  display:flex; align-items:center; gap:12px;
  padding:14px 18px; cursor:pointer;
  background:rgba(0,0,0,0.14); border-bottom:1px solid transparent;
  transition:background .2s, border-color .2s; user-select:none;
}
.sc.open .sc-hdr { border-bottom-color:var(--b0); }
.sc-hdr:hover { background:rgba(0,210,170,0.04); }
.sc-ico {
  width:34px; height:34px; border-radius:8px; flex-shrink:0;
  display:flex; align-items:center; justify-content:center; font-size:17px;
  background:rgba(0,210,170,0.08); border:1px solid var(--b0);
}
.sc-ttl {
  font-family:'Rajdhani',sans-serif; font-size:17px; font-weight:700;
  letter-spacing:.5px; color:#fff; flex:1;
}
.sc-cnt { font-family:'Share Tech Mono',monospace; font-size:11px; color:var(--mut); }
.chev { font-size:12px; color:var(--mut); margin-left:6px; transition:transform .2s; }
.sc.open .chev { transform:rotate(180deg); }

.fl { display:none; padding:10px 14px 14px; flex-direction:column; gap:7px; }
.sc.open .fl { display:flex; }

.fr {
  display:flex; align-items:center; gap:11px;
  padding:10px 14px; border-radius:10px;
  background:rgba(0,0,0,0.2); border:1px solid var(--b0);
  cursor:pointer; transition:all .2s;
}
.fr:hover { border-color:var(--b2); background:rgba(0,210,170,0.05); transform:translateX(3px); }
.fr-ico { font-size:20px; flex-shrink:0; }
.fr-name { flex:1; font-size:14px; font-weight:500; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
.fr-size { font-family:'Share Tech Mono',monospace; font-size:11px; color:var(--mut); flex-shrink:0; }
.fr-arr { font-size:13px; color:var(--mut); flex-shrink:0; }

.empty { text-align:center; padding:70px 20px; color:var(--mut); display:none; }
.empty.show { display:block; }
.empty div:first-child { font-size:42px; margin-bottom:10px; opacity:.3; }
.empty div:last-child { font-family:'Share Tech Mono',monospace; font-size:12px; letter-spacing:3px; }

/* ════════════════════════════
   PREVIEW
════════════════════════════ */
.pov {
  display:none; position:fixed; inset:0; z-index:300;
  background:rgba(4,7,14,0.93); backdrop-filter:blur(12px);
  flex-direction:column;
}
.pov.open { display:flex; animation:fi .18s; }
@keyframes fi{from{opacity:0}to{opacity:1}}

.pov-bar {
  display:flex; align-items:center; gap:12px;
  padding:12px 16px; background:var(--bg2);
  border-bottom:1px solid var(--b0); flex-shrink:0;
}
.pov-name {
  flex:1; font-family:'Rajdhani',sans-serif; font-size:16px; font-weight:700;
  color:var(--cyan); overflow:hidden; text-overflow:ellipsis; white-space:nowrap;
}
.pov-close {
  width:36px; height:36px; border-radius:8px; flex-shrink:0;
  display:flex; align-items:center; justify-content:center;
  background:rgba(255,61,94,0.1); border:1px solid rgba(255,61,94,0.3);
  color:var(--red); font-size:18px; cursor:pointer; transition:all .2s;
}
.pov-close:hover { background:rgba(255,61,94,0.25); }

.pov-body {
  flex:1; overflow:auto; display:flex;
  align-items:center; justify-content:center; padding:0;
}
.pov-body iframe { width:100%; height:100%; border:none; background:#fff; }
.pov-body img { max-width:100%; max-height:100%; object-fit:contain; padding:10px; }

.pov-uns { text-align:center; padding:40px 20px; }
.pov-uns .ui { font-size:52px; margin-bottom:14px; }
.pov-uns p { font-family:'Share Tech Mono',monospace; font-size:12px; color:var(--mut); letter-spacing:2px; margin-bottom:20px; }
.dl-a {
  display:inline-flex; align-items:center; gap:8px;
  padding:12px 24px; border-radius:10px;
  background:rgba(0,210,170,0.1); border:1.5px solid var(--b1);
  color:var(--cyan); font-family:'Rajdhani',sans-serif;
  font-size:15px; font-weight:700; letter-spacing:1px;
  cursor:pointer; text-decoration:none; transition:all .2s;
}
.dl-a:hover { background:rgba(0,210,170,0.2); box-shadow:var(--glow); }

/* ════════════════════════════
   MODALS
════════════════════════════ */
.mov {
  display:none; position:fixed; inset:0; z-index:400;
  background:rgba(4,7,15,0.88); backdrop-filter:blur(8px);
  align-items:center; justify-content:center; padding:16px;
}
.mov.open { display:flex; animation:fi .18s; }

.modal {
  background:var(--bg2); border:1.5px solid var(--b1);
  border-radius:16px; padding:26px; width:100%; max-width:420px;
  box-shadow:0 0 50px rgba(0,210,170,0.1); animation:su .22s ease;
}
.modal.wide { max-width:520px; }
@keyframes su{from{transform:translateY(16px);opacity:0}to{transform:translateY(0);opacity:1}}

.modal h2 {
  font-family:'Rajdhani',sans-serif; font-size:20px; font-weight:700;
  letter-spacing:2px; margin-bottom:5px;
}
.modal h2.c { color:var(--cyan); }
.modal h2.g { color:var(--grn); }
.msub { font-family:'Share Tech Mono',monospace; font-size:11px; color:var(--mut); line-height:1.7; margin-bottom:16px; }

.modal input[type=text], .modal input[type=password] {
  width:100%; padding:12px 14px;
  background:rgba(0,210,170,0.05); border:1.5px solid var(--b0);
  border-radius:10px; color:var(--txt);
  font-family:'Share Tech Mono',monospace; font-size:13px;
  outline:none; margin-bottom:14px; transition:border-color .2s;
}
.modal input:focus { border-color:var(--cyan); box-shadow:0 0 10px rgba(0,210,170,.1); }

.merr { font-family:'Share Tech Mono',monospace; font-size:11px; color:var(--red); margin-bottom:10px; display:none; }
.merr.show { display:block; }

.mbtns { display:flex; gap:10px; }
.btn {
  flex:1; padding:12px; border-radius:10px; border:none;
  font-family:'Rajdhani',sans-serif; font-size:15px; font-weight:700; letter-spacing:1.2px;
  cursor:pointer; transition:all .2s;
}
.bp { background:linear-gradient(135deg,var(--cyan),var(--c2)); color:#060a14; }
.bp:hover { filter:brightness(1.12); box-shadow:var(--glow); }
.bp:disabled { opacity:.5; cursor:default; filter:none; }
.bs { background:rgba(255,255,255,0.04); border:1.5px solid var(--b0); color:var(--mut); }
.bs:hover { background:rgba(255,255,255,0.08); }

/* drop zone */
.dz {
  border:2px dashed rgba(0,210,170,0.28); border-radius:12px;
  padding:34px 20px; text-align:center; cursor:pointer;
  transition:all .2s; margin-bottom:12px; background:rgba(0,210,170,0.02);
}
.dz:hover,.dz.drag { border-color:var(--cyan); background:rgba(0,210,170,0.06); }
.dz-ico { font-size:34px; margin-bottom:7px; }
.dz-t { font-family:'Rajdhani',sans-serif; font-size:15px; font-weight:600; color:var(--cyan); letter-spacing:1px; }
.dz-s { font-family:'Share Tech Mono',monospace; font-size:11px; color:var(--mut); margin-top:3px; }

.plist { display:flex; flex-direction:column; gap:5px; max-height:170px; overflow-y:auto; margin-bottom:12px; }
.pi {
  display:flex; align-items:center; gap:8px;
  padding:7px 10px; border-radius:8px;
  background:rgba(0,210,170,0.05); border:1px solid rgba(0,210,170,0.12); font-size:13px;
}
.pi .rm { margin-left:auto; cursor:pointer; color:var(--mut); font-size:15px; transition:color .15s; }
.pi .rm:hover { color:var(--red); }

/* ════════════════════════════
   ADMIN PANEL
════════════════════════════ */
.adm { max-width:860px; margin:0 auto; padding:0 16px 80px; }
.adm-top {
  display:flex; align-items:center; gap:10px;
  padding:22px 0 16px; border-bottom:1px solid var(--b0);
  margin-bottom:20px; flex-wrap:wrap;
}
.adm-top h1 {
  font-family:'Rajdhani',sans-serif; font-size:20px; font-weight:700;
  letter-spacing:2px; color:var(--grn); flex:1;
}
.back-btn {
  display:flex; align-items:center; gap:7px;
  padding:9px 15px; border-radius:10px;
  background:rgba(255,255,255,0.04); border:1.5px solid var(--b0);
  color:var(--mut); font-family:'Rajdhani',sans-serif;
  font-size:14px; font-weight:600; letter-spacing:1px;
  cursor:pointer; transition:all .2s;
}
.back-btn:hover { color:var(--txt); border-color:var(--b1); }
.nadd-btn {
  display:flex; align-items:center; gap:7px;
  padding:10px 18px; border-radius:10px;
  background:rgba(0,210,170,0.1); border:1.5px solid var(--b1);
  color:var(--cyan); font-family:'Rajdhani',sans-serif;
  font-size:14px; font-weight:700; letter-spacing:1.5px;
  cursor:pointer; transition:all .2s; box-shadow:var(--glow);
}
.nadd-btn:hover { background:rgba(0,210,170,0.2); transform:translateY(-1px); }

.adm-secs { display:flex; flex-direction:column; gap:12px; }
.as {
  background:var(--bg3); border:1.5px solid var(--b0);
  border-radius:14px; overflow:hidden;
}
.as-hdr {
  display:flex; align-items:center; gap:10px;
  padding:13px 16px; background:rgba(0,0,0,0.16);
  border-bottom:1px solid var(--b0);
}
.as-ico {
  width:32px; height:32px; border-radius:7px; flex-shrink:0;
  display:flex; align-items:center; justify-content:center; font-size:16px;
  background:rgba(0,210,170,0.07); border:1px solid var(--b0);
}
.as-ttl { font-family:'Rajdhani',sans-serif; font-size:17px; font-weight:700; color:#fff; flex:1; }
.as-acts { display:flex; gap:7px; }
.ib {
  width:32px; height:32px; border-radius:8px; flex-shrink:0;
  display:flex; align-items:center; justify-content:center; font-size:13px;
  background:rgba(255,255,255,0.04); border:1px solid var(--b0);
  color:var(--mut); cursor:pointer; transition:all .2s;
}
.ib:hover { color:var(--cyan); border-color:var(--cyan); background:rgba(0,210,170,0.08); }
.ib.d:hover { color:var(--red); border-color:var(--red); background:rgba(255,61,94,0.08); }

.as-files { padding:10px 14px 14px; display:flex; flex-direction:column; gap:7px; }
.af {
  display:flex; align-items:center; gap:10px;
  padding:9px 12px; border-radius:9px;
  background:rgba(0,0,0,0.18); border:1px solid var(--b0);
}
.af-name { flex:1; font-size:13px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
.af-size { font-family:'Share Tech Mono',monospace; font-size:11px; color:var(--mut); }
.add-f-btn {
  display:flex; align-items:center; justify-content:center; gap:7px;
  padding:9px; border-radius:9px;
  border:1.5px dashed rgba(0,210,170,0.22); background:transparent;
  color:rgba(0,210,170,0.45); font-family:'Rajdhani',sans-serif;
  font-size:13px; font-weight:600; letter-spacing:1px;
  cursor:pointer; transition:all .2s; width:100%;
}
.add-f-btn:hover { border-color:var(--cyan); color:var(--cyan); background:rgba(0,210,170,0.05); }

.tei {
  background:transparent; border:none; border-bottom:1.5px solid var(--cyan);
  color:#fff; font-family:'Rajdhani',sans-serif; font-size:17px; font-weight:700;
  outline:none; width:100%; padding:2px 3px;
}

/* toast */
.toast {
  position:fixed; bottom:22px; right:20px; z-index:600;
  background:var(--bg2); border:1px solid var(--b1);
  border-radius:10px; padding:11px 18px;
  font-family:'Share Tech Mono',monospace; font-size:12px; color:var(--cyan);
  box-shadow:var(--glow); opacity:0; transform:translateY(60px);
  transition:all .28s ease; pointer-events:none;
}
.toast.show { opacity:1; transform:translateY(0); }
.toast.err { border-color:rgba(255,61,94,.45); color:var(--red); }

::-webkit-scrollbar{width:4px} ::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:rgba(0,210,170,0.28);border-radius:2px}
input[type=file]{display:none}

@media(max-width:560px){
  .logo{font-size:48px}
  .banner{padding:20px 0 14px}
}
</style>
</head>
<body>

<!-- ══ PUBLIC ══ -->
<div id="vPublic">
<div class="pub">
  <div class="banner">
    <div class="logo">
      <span class="e">E</span><span class="m">M</span><span class="x">X</span><span class="dot"></span>
    </div>
    <div class="bnr-r">
      <button class="adm-btn" id="admBtn" onclick="showAdmin()">⚙️ ADMIN</button>
      <button class="tok-btn" id="tokBtn" onclick="openTokModal()">🔑 TOKEN</button>
    </div>
  </div>

  <div class="srch">
    <span class="srch-ico">🔍</span>
    <input type="text" id="srchInp" placeholder="Caută fișiere sau secțiuni..." oninput="renderPub()">
  </div>

  <div class="empty" id="emptyPub">
    <div>📁</div>
    <div>NICIUN FIȘIER DISPONIBIL</div>
  </div>
  <div class="secs" id="pubSecs"></div>
</div>
</div>

<!-- ══ ADMIN ══ -->
<div id="vAdmin">
<div class="adm">
  <div class="adm-top">
    <h1>⚙️ PANOU ADMIN</h1>
    <button class="back-btn" onclick="showPublic()">← ÎNAPOI</button>
    <button class="nadd-btn" onclick="openNewSec()">＋ SECȚIUNE NOUĂ</button>
  </div>
  <div class="adm-secs" id="admSecs"></div>
</div>
</div>

<!-- ══ PREVIEW ══ -->
<div class="pov" id="pov">
  <div class="pov-bar">
    <span class="pov-name" id="povName"></span>
    <div class="pov-close" onclick="closePrev()">✕</div>
  </div>
  <div class="pov-body" id="povBody"></div>
</div>

<!-- ══ TOKEN MODAL ══ -->
<div class="mov" id="tokModal">
  <div class="modal">
    <h2 class="c">🔑 GITHUB TOKEN</h2>
    <div class="msub">Introdu Personal Access Token (PAT).<br>Verificat live la GitHub · Salvat local.</div>
    <div class="merr" id="tokErr"></div>
    <input type="text" id="tokInp" placeholder="ghp_xxxxxxxxxxxxxxxxxxxx" autocomplete="off" spellcheck="false">
    <div class="mbtns">
      <button class="btn bs" onclick="closeM('tokModal')">ANULEAZĂ</button>
      <button class="btn bp" id="tokSub" onclick="submitTok()">VERIFICĂ</button>
    </div>
  </div>
</div>

<!-- ══ NEW/ADD SECTION MODAL ══ -->
<div class="mov" id="secModal">
  <div class="modal wide">
    <h2 class="g" id="secMTitle">＋ SECȚIUNE NOUĂ</h2>
    <div class="msub" id="secMSub">Titlu + fișiere.</div>
    <div id="titWrap">
      <label style="font-family:'Share Tech Mono',monospace;font-size:11px;color:var(--mut);letter-spacing:2px;display:block;margin-bottom:7px;">TITLU SECȚIUNE</label>
      <input type="text" id="titInp" placeholder="ex: Livrete, Grafic August...">
    </div>
    <div class="dz" id="dz"
      onclick="document.getElementById('fi').click()"
      ondragover="dzO(event)" ondragleave="dzL(event)" ondrop="dzD(event)">
      <div class="dz-ico">📂</div>
      <div class="dz-t">TRAGE SAU SELECTEAZĂ FIȘIERE</div>
      <div class="dz-s">PDF · Word · Excel · Imagini · orice</div>
    </div>
    <div class="plist" id="plist"></div>
    <div class="merr" id="secErr"></div>
    <div class="mbtns">
      <button class="btn bs" onclick="closeM('secModal');rPend()">ANULEAZĂ</button>
      <button class="btn bp" onclick="confSec()">SALVEAZĂ</button>
    </div>
  </div>
</div>

<input type="file" id="fi" multiple onchange="onFiles(event)">
<div class="toast" id="toast"></div>

<script>
/* ── STATE ── */
let isAdm = false;
let ghTok = localStorage.getItem('emx_t') || '';
let secs = JSON.parse(localStorage.getItem('emx_s') || '[]');
let pend = [];
let editId = null;

/* ── UTILS ── */
const save = () => localStorage.setItem('emx_s', JSON.stringify(secs));
const ico = n => {
  const e = (n.split('.').pop()||'').toLowerCase();
  return {pdf:'📄',xlsx:'📊',xls:'📊',csv:'📊',docx:'📝',doc:'📝',txt:'📃',
          jpg:'🖼️',jpeg:'🖼️',png:'🖼️',gif:'🖼️',webp:'🖼️',heic:'🖼️',heif:'🖼️',
          mp4:'🎬',mov:'🎬',avi:'🎬',mp3:'🎵',wav:'🎵',
          zip:'🗜️',rar:'🗜️',pptx:'📑',ppt:'📑'}[e]||'📎';
};
const fmt = b => !b?'':b<1024?b+'B':b<1048576?(b/1024).toFixed(1)+'KB':(b/1048576).toFixed(1)+'MB';
const openM = id => document.getElementById(id).classList.add('open');
const closeM = id => document.getElementById(id).classList.remove('open');
const toast = (m,e=false) => {
  const t=document.getElementById('toast');
  t.textContent=m; t.className='toast show'+(e?' err':'');
  clearTimeout(t._t); t._t=setTimeout(()=>t.className='toast',2800);
};
const err = (id,m) => { const el=document.getElementById(id); el.textContent=m; el.classList.add('show'); };

/* ── VIEWS ── */
function showPublic() {
  document.getElementById('vPublic').style.display='block';
  document.getElementById('vAdmin').style.display='none';
  renderPub();
}
function showAdmin() {
  document.getElementById('vPublic').style.display='none';
  document.getElementById('vAdmin').style.display='block';
  renderAdm();
}

/* ── PUBLIC RENDER ── */
function renderPub() {
  const q=(document.getElementById('srchInp').value||'').toLowerCase().trim();
  const cont=document.getElementById('pubSecs');
  const empty=document.getElementById('emptyPub');
  cont.innerHTML='';

  const vis=secs.filter(s=>!q||s.title.toLowerCase().includes(q)||(s.files||[]).some(f=>f.name.toLowerCase().includes(q)));
  if(!vis.length){empty.classList.add('show');return;}
  empty.classList.remove('show');

  vis.forEach(sec=>{
    const files=sec.files||[];
    const shown=q?files.filter(f=>f.name.toLowerCase().includes(q)||sec.title.toLowerCase().includes(q)):files;
    const card=document.createElement('div');
    card.className='sc'+(q?' open':'');
    card.id='p'+sec.id;
    card.innerHTML=`
      <div class="sc-hdr" onclick="togPub('${sec.id}')">
        <div class="sc-ico">${sec.icon||'📁'}</div>
        <div class="sc-ttl">${sec.title}</div>
        <span class="sc-cnt">${files.length} fișier${files.length!==1?'e':''}</span>
        <span class="chev">▼</span>
      </div>
      <div class="fl">${shown.map((f,i)=>`
        <div class="fr" onclick="prevFile('${sec.id}',${files.indexOf(f)})">
          <span class="fr-ico">${ico(f.name)}</span>
          <span class="fr-name" title="${f.name}">${f.name}</span>
          <span class="fr-size">${fmt(f.size)}</span>
          <span class="fr-arr">▶</span>
        </div>`).join('')}
      </div>`;
    cont.appendChild(card);
  });
}
const togPub = id => { const c=document.getElementById('p'+id); if(c)c.classList.toggle('open'); };

/* ── PREVIEW ── */
function prevFile(secId,fi) {
  const sec=secs.find(s=>s.id===secId);
  if(!sec||!sec.files[fi])return;
  const f=sec.files[fi];
  document.getElementById('povName').textContent=f.name;
  const body=document.getElementById('povBody');
  body.innerHTML='';
  document.getElementById('pov').classList.add('open');
  document.body.style.overflow='hidden';

  if(!f.dataUrl){body.innerHTML=uns(f);return;}
  const ext=(f.name.split('.').pop()||'').toLowerCase();

  if(['jpg','jpeg','png','gif','webp','heic','heif'].includes(ext)){
    const img=document.createElement('img');
    img.src=f.dataUrl;
    body.appendChild(img);
  } else if(ext==='pdf'){
    const ifr=document.createElement('iframe');
    ifr.src=f.dataUrl; body.appendChild(ifr);
  } else if(['mp4','mov','avi'].includes(ext)){
    const v=document.createElement('video');
    v.src=f.dataUrl; v.controls=true;
    v.style.cssText='max-width:100%;max-height:100%;margin:auto;display:block;';
    body.appendChild(v);
  } else if(['mp3','wav'].includes(ext)){
    const w=document.createElement('div');
    w.style.cssText='display:flex;align-items:center;justify-content:center;width:100%;';
    const a=document.createElement('audio'); a.src=f.dataUrl; a.controls=true;
    w.appendChild(a); body.appendChild(w);
  } else if(['txt','csv','json'].includes(ext)){
    const pre=document.createElement('pre');
    pre.style.cssText='color:var(--txt);font-family:"Share Tech Mono",monospace;font-size:13px;padding:20px;overflow:auto;width:100%;height:100%;background:var(--bg2);white-space:pre-wrap;word-break:break-word;margin:0;';
    try{pre.textContent=decodeURIComponent(escape(atob(f.dataUrl.split(',')[1])));}
    catch(e){pre.textContent='Nu se poate afișa.';}
    body.appendChild(pre);
  } else { body.innerHTML=uns(f); }
}

const uns = f => `<div class="pov-uns">
  <div class="ui">${ico(f.name)}</div>
  <p>PREVIZUALIZARE INDISPONIBILĂ<br>PENTRU ACEST FORMAT</p>
  <a class="dl-a" href="${f.dataUrl}" download="${f.name}">⬇ DESCARCĂ FIȘIERUL</a>
</div>`;

function closePrev(){
  document.getElementById('pov').classList.remove('open');
  document.getElementById('povBody').innerHTML='';
  document.body.style.overflow='';
}

/* ── ADMIN RENDER ── */
function renderAdm(){
  const cont=document.getElementById('admSecs');
  cont.innerHTML='';
  if(!secs.length){
    cont.innerHTML='<div style="text-align:center;padding:50px;font-family:\'Share Tech Mono\',monospace;font-size:12px;color:var(--mut);letter-spacing:3px;">NICIO SECȚIUNE · ADAUGĂ UNA</div>';
    return;
  }
  secs.forEach(sec=>{
    const d=document.createElement('div'); d.className='as';
    d.innerHTML=`
      <div class="as-hdr">
        <div class="as-ico">${sec.icon||'📁'}</div>
        <div class="as-ttl" id="at${sec.id}">${sec.title}</div>
        <div class="as-acts">
          <button class="ib" title="Redenumește" onclick="startRen('${sec.id}')">✏️</button>
          <button class="ib d" title="Șterge secțiunea" onclick="delSec('${sec.id}')">🗑️</button>
        </div>
      </div>
      <div class="as-files">
        ${(sec.files||[]).map((f,fi)=>`
          <div class="af">
            <span>${ico(f.name)}</span>
            <span class="af-name" title="${f.name}">${f.name}</span>
            <span class="af-size">${fmt(f.size)}</span>
            <button class="ib d" onclick="delFile('${sec.id}',${fi})">✕</button>
          </div>`).join('')}
        <button class="add-f-btn" onclick="openAddFiles('${sec.id}')">＋ ADAUGĂ FIȘIERE</button>
      </div>`;
    cont.appendChild(d);
  });
}

/* ── RENAME ── */
function startRen(id){
  const el=document.getElementById('at'+id);
  const cur=el.textContent;
  const inp=document.createElement('input');
  inp.className='tei'; inp.value=cur;
  el.replaceWith(inp); inp.focus(); inp.select();
  const commit=()=>{
    const s=secs.find(x=>x.id===id);
    if(s&&inp.value.trim())s.title=inp.value.trim();
    save(); renderAdm(); renderPub(); toast('Titlu actualizat!');
  };
  inp.addEventListener('blur',commit);
  inp.addEventListener('keydown',e=>{if(e.key==='Enter')inp.blur();if(e.key==='Escape')renderAdm();});
}

/* ── DELETE ── */
function delSec(id){
  if(!confirm('Ștergi secțiunea și toate fișierele?'))return;
  secs=secs.filter(s=>s.id!==id); save(); renderAdm(); renderPub();
  toast('Secțiune ștearsă.',true);
}
function delFile(secId,fi){
  const s=secs.find(x=>x.id===secId);
  if(s){s.files.splice(fi,1);save();renderAdm();renderPub();toast('Fișier șters.',true);}
}

/* ── UPLOAD ── */
function openNewSec(){
  editId=null; pend=[];
  document.getElementById('secMTitle').textContent='＋ SECȚIUNE NOUĂ';
  document.getElementById('secMSub').textContent='Titlu + fișiere pentru noua secțiune.';
  document.getElementById('titWrap').style.display='block';
  document.getElementById('titInp').value='';
  document.getElementById('secErr').classList.remove('show');
  rPend(); openM('secModal');
}
function openAddFiles(id){
  editId=id; pend=[];
  const s=secs.find(x=>x.id===id);
  document.getElementById('secMTitle').textContent='＋ ADAUGĂ FIȘIERE';
  document.getElementById('secMSub').textContent='Adaugă la: '+(s?s.title:'');
  document.getElementById('titWrap').style.display='none';
  document.getElementById('secErr').classList.remove('show');
  rPend(); openM('secModal');
}

const onFiles=e=>{addF(Array.from(e.target.files));e.target.value='';};
const dzO=e=>{e.preventDefault();e.currentTarget.classList.add('drag');};
const dzL=e=>e.currentTarget.classList.remove('drag');
const dzD=e=>{e.preventDefault();e.currentTarget.classList.remove('drag');addF(Array.from(e.dataTransfer.files));};
function addF(files){
  files.forEach(f=>{
    const r=new FileReader();
    r.onload=ev=>{pend.push({name:f.name,size:f.size,type:f.type,dataUrl:ev.target.result});rPend();};
    r.readAsDataURL(f);
  });
}
function rPend(){
  document.getElementById('plist').innerHTML=pend.map((f,i)=>`
    <div class="pi">
      <span>${ico(f.name)}</span>
      <span style="flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">${f.name}</span>
      <span style="font-family:'Share Tech Mono',monospace;font-size:11px;color:var(--mut);">${fmt(f.size)}</span>
      <span class="rm" onclick="pend.splice(${i},1);rPend()">✕</span>
    </div>`).join('');
}
const rPend2=()=>{pend=[];rPend();};

function confSec(){
  document.getElementById('secErr').classList.remove('show');
  if(editId){
    if(!pend.length){err('secErr','ADAUGĂ CEL PUȚIN UN FIȘIER.');return;}
    const s=secs.find(x=>x.id===editId);
    if(s){s.files=[...(s.files||[]),...pend];save();renderAdm();renderPub();}
    closeM('secModal');rPend2();toast('Fișiere adăugate!');
  } else {
    const t=document.getElementById('titInp').value.trim();
    if(!t||!pend.length){err('secErr','ADAUGĂ TITLU ȘI CEL PUȚIN UN FIȘIER.');return;}
    const icons=['📁','📂','📋','📊','📝','🗂️','📑','🗃️'];
    const s={id:'s'+Date.now(),title:t,icon:icons[Math.floor(Math.random()*icons.length)],files:[...pend]};
    secs.push(s);save();renderAdm();renderPub();
    closeM('secModal');rPend2();toast('Secțiune creată!');
  }
}

/* ── TOKEN ── */
function openTokModal(){
  if(isAdm){
    isAdm=false;ghTok='';localStorage.removeItem('emx_t');
    document.getElementById('admBtn').classList.remove('show');
    document.getElementById('tokBtn').className='tok-btn';
    document.getElementById('tokBtn').innerHTML='🔑 TOKEN';
    toast('Deconectat.'); showPublic(); return;
  }
  document.getElementById('tokErr').classList.remove('show');
  document.getElementById('tokInp').value=ghTok||'';
  openM('tokModal');
  setTimeout(()=>document.getElementById('tokInp').focus(),100);
}

async function submitTok(){
  const v=document.getElementById('tokInp').value.trim();
  if(!v){err('tokErr','INTRODU UN TOKEN.');return;}
  const btn=document.getElementById('tokSub');
  btn.textContent='SE VERIFICĂ…';btn.disabled=true;
  document.getElementById('tokErr').classList.remove('show');
  try{
    const r=await fetch('https://api.github.com/user',{headers:{'Authorization':'token '+v}});
    if(r.ok){
      const u=await r.json();
      ghTok=v;localStorage.setItem('emx_t',v);isAdm=true;
      closeM('tokModal');
      document.getElementById('admBtn').classList.add('show');
      document.getElementById('tokBtn').className='tok-btn on';
      document.getElementById('tokBtn').innerHTML='🔓 '+(u.login||'ADMIN').toUpperCase();
      toast('Bun venit, '+(u.login||'admin')+'!');
      renderPub();
    } else {
      err('tokErr',r.status===401?'TOKEN INVALID.':'EROARE '+r.status+'.');
      document.getElementById('tokInp').select();
    }
  }catch(e){err('tokErr','EROARE REȚEA.');}
  btn.textContent='VERIFICĂ';btn.disabled=false;
}

async function autoLogin(){
  if(!ghTok)return;
  try{
    const r=await fetch('https://api.github.com/user',{headers:{'Authorization':'token '+ghTok}});
    if(r.ok){
      const u=await r.json();isAdm=true;
      document.getElementById('admBtn').classList.add('show');
      document.getElementById('tokBtn').className='tok-btn on';
      document.getElementById('tokBtn').innerHTML='🔓 '+(u.login||'ADMIN').toUpperCase();
      renderPub();
    }else{localStorage.removeItem('emx_t');ghTok='';}
  }catch(e){}
}

/* ── KEYBOARD ── */
document.addEventListener('keydown',e=>{
  if(e.key==='Escape'){['tokModal','secModal'].forEach(closeM);closePrev();}
  if(e.key==='Enter'&&document.getElementById('tokModal').classList.contains('open'))submitTok();
});
document.querySelectorAll('.mov').forEach(ov=>{
  ov.addEventListener('click',e=>{if(e.target===ov){ov.classList.remove('open');rPend2();}});
});

/* ── INIT ── */
renderPub();
autoLogin();
</script>
</body>
</html>
