<!DOCTYPE html>

<html lang="ro">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EMX · Evidență Ore CFR</title>
<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;500;600;700&family=Share+Tech+Mono&family=Exo+2:wght@300;400;600;800&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0e1a;
    --bg2: #0e1528;
    --bg3: #131c30;
    --panel: rgba(16,26,50,0.85);
    --border: rgba(0,220,180,0.18);
    --border-active: rgba(0,220,180,0.55);
    --cyan: #00ddb4;
    --cyan2: #00b8ff;
    --green: #3dffa0;
    --orange: #ff7c2a;
    --red: #ff3d5e;
    --text: #c8ddf0;
    --muted: #4a6080;
    --glow: 0 0 20px rgba(0,220,180,0.3);
    --glow-strong: 0 0 40px rgba(0,220,180,0.5);
  }

- { margin:0; padding:0; box-sizing:border-box; }

body {
font-family: ‘Exo 2’, sans-serif;
background: var(–bg);
color: var(–text);
min-height: 100vh;
overflow-x: hidden;
}

/* Animated grid background */
body::before {
content: ‘’;
position: fixed;
inset: 0;
background-image:
linear-gradient(rgba(0,220,180,0.03) 1px, transparent 1px),
linear-gradient(90deg, rgba(0,220,180,0.03) 1px, transparent 1px);
background-size: 40px 40px;
pointer-events: none;
z-index: 0;
}

/* Radial glow */
body::after {
content: ‘’;
position: fixed;
top: -200px; left: 50%;
transform: translateX(-50%);
width: 800px; height: 500px;
background: radial-gradient(ellipse, rgba(0,184,255,0.06) 0%, transparent 70%);
pointer-events: none;
z-index: 0;
}

.wrap { position: relative; z-index: 1; max-width: 900px; margin: 0 auto; padding: 0 16px 60px; }

/* ===== BANNER ===== */
.banner {
padding: 32px 0 20px;
display: flex;
align-items: center;
gap: 20px;
border-bottom: 1px solid var(–border);
margin-bottom: 28px;
}

.logo {
font-family: ‘Rajdhani’, sans-serif;
font-size: 68px;
font-weight: 700;
line-height: 1;
letter-spacing: -2px;
position: relative;
user-select: none;
}
.logo .e { color: var(–cyan2); }
.logo .m { color: #fff; }
.logo .x { color: var(–green); }
.logo .dot {
display: inline-block;
width: 10px; height: 10px;
background: var(–orange);
border-radius: 50%;
margin-left: 4px;
vertical-align: middle;
margin-bottom: 12px;
box-shadow: 0 0 14px var(–orange);
animation: pulse-dot 2s ease-in-out infinite;
}
@keyframes pulse-dot {
0%,100% { opacity:1; transform:scale(1); }
50% { opacity:0.5; transform:scale(0.7); }
}

.logo-sub {
font-family: ‘Share Tech Mono’, monospace;
font-size: 11px;
letter-spacing: 5px;
color: var(–muted);
text-transform: uppercase;
margin-top: 4px;
}

/* ===== TOKEN SECTION ===== */
.token-section {
display: flex;
align-items: center;
gap: 10px;
margin-left: auto;
}

.token-btn {
display: flex; align-items: center; gap: 8px;
background: rgba(255,124,42,0.1);
border: 1.5px solid rgba(255,124,42,0.4);
color: var(–orange);
font-family: ‘Rajdhani’, sans-serif;
font-size: 15px; font-weight: 600;
letter-spacing: 1px;
padding: 10px 20px;
border-radius: 10px;
cursor: pointer;
transition: all 0.2s;
}
.token-btn:hover {
background: rgba(255,124,42,0.2);
border-color: var(–orange);
box-shadow: 0 0 16px rgba(255,124,42,0.3);
}
.token-btn.active {
background: rgba(61,255,160,0.1);
border-color: var(–green);
color: var(–green);
box-shadow: 0 0 14px rgba(61,255,160,0.2);
}

.token-status {
font-family: ‘Share Tech Mono’, monospace;
font-size: 11px;
padding: 6px 12px;
border-radius: 6px;
background: rgba(61,255,160,0.08);
border: 1px solid rgba(61,255,160,0.25);
color: var(–green);
display: none;
}
.token-status.show { display: block; }

/* ===== MODAL ===== */
.modal-overlay {
display: none;
position: fixed; inset: 0;
background: rgba(5,10,20,0.85);
backdrop-filter: blur(8px);
z-index: 100;
align-items: center;
justify-content: center;
}
.modal-overlay.open { display: flex; animation: fade-in 0.2s; }
@keyframes fade-in { from { opacity:0; } to { opacity:1; } }

.modal {
background: var(–bg2);
border: 1.5px solid var(–border-active);
border-radius: 16px;
padding: 32px;
width: 100%; max-width: 420px;
box-shadow: 0 0 60px rgba(0,220,180,0.15);
animation: slide-up 0.25s ease;
}
@keyframes slide-up { from { transform:translateY(20px); opacity:0; } to { transform:translateY(0); opacity:1; } }

.modal h2 {
font-family: ‘Rajdhani’, sans-serif;
font-size: 22px; font-weight: 700;
color: var(–cyan);
letter-spacing: 2px;
margin-bottom: 20px;
}

.modal input[type=password], .modal input[type=text] {
width: 100%;
background: rgba(0,220,180,0.05);
border: 1.5px solid var(–border);
border-radius: 10px;
padding: 12px 16px;
font-family: ‘Share Tech Mono’, monospace;
font-size: 14px;
color: var(–text);
outline: none;
transition: border-color 0.2s;
margin-bottom: 16px;
}
.modal input:focus { border-color: var(–cyan); box-shadow: 0 0 12px rgba(0,220,180,0.15); }

.modal-btns { display: flex; gap: 10px; }

.btn {
flex: 1;
font-family: ‘Rajdhani’, sans-serif;
font-size: 15px; font-weight: 700;
letter-spacing: 1.5px;
padding: 12px;
border-radius: 10px;
border: none;
cursor: pointer;
transition: all 0.2s;
}
.btn-primary {
background: linear-gradient(135deg, var(–cyan), var(–cyan2));
color: #0a0e1a;
}
.btn-primary:hover { filter: brightness(1.15); box-shadow: var(–glow); }
.btn-secondary {
background: rgba(255,255,255,0.05);
border: 1.5px solid var(–border);
color: var(–muted);
}
.btn-secondary:hover { background: rgba(255,255,255,0.08); }

.modal-error {
font-size: 13px;
color: var(–red);
font-family: ‘Share Tech Mono’, monospace;
margin-bottom: 12px;
display: none;
}
.modal-error.show { display: block; }

/* ===== MAIN CONTENT ===== */
.main-content { display: none; }
.main-content.show { display: block; }

/* ===== UPLOAD BUTTON ===== */
.admin-bar {
display: flex;
justify-content: flex-end;
margin-bottom: 24px;
}

.upload-btn {
display: flex; align-items: center; gap: 8px;
background: linear-gradient(135deg, rgba(0,220,180,0.15), rgba(0,184,255,0.1));
border: 1.5px solid var(–border-active);
color: var(–cyan);
font-family: ‘Rajdhani’, sans-serif;
font-size: 15px; font-weight: 700;
letter-spacing: 2px;
padding: 12px 24px;
border-radius: 12px;
cursor: pointer;
transition: all 0.2s;
box-shadow: var(–glow);
}
.upload-btn:hover {
background: linear-gradient(135deg, rgba(0,220,180,0.25), rgba(0,184,255,0.2));
box-shadow: var(–glow-strong);
transform: translateY(-1px);
}

/* ===== SECTIONS / TITLURI ===== */
.sections { display: flex; flex-direction: column; gap: 16px; }

.section-card {
background: var(–panel);
border: 1.5px solid var(–border);
border-radius: 14px;
overflow: hidden;
transition: border-color 0.2s;
backdrop-filter: blur(4px);
}
.section-card:hover { border-color: rgba(0,220,180,0.35); }

.section-header {
display: flex; align-items: center; gap: 12px;
padding: 16px 20px;
cursor: pointer;
background: rgba(0,0,0,0.2);
border-bottom: 1px solid var(–border);
transition: background 0.2s;
}
.section-header:hover { background: rgba(0,220,180,0.05); }

.section-icon {
width: 36px; height: 36px;
border-radius: 8px;
display: flex; align-items: center; justify-content: center;
font-size: 18px;
background: rgba(0,220,180,0.1);
border: 1px solid rgba(0,220,180,0.2);
flex-shrink: 0;
}

.section-title {
font-family: ‘Rajdhani’, sans-serif;
font-size: 18px; font-weight: 700;
letter-spacing: 1px;
color: #fff;
flex: 1;
}

.section-meta {
font-family: ‘Share Tech Mono’, monospace;
font-size: 11px;
color: var(–muted);
}

.section-actions { display: flex; gap: 8px; }

.icon-btn {
width: 32px; height: 32px;
border-radius: 8px;
border: 1px solid var(–border);
background: rgba(255,255,255,0.04);
color: var(–muted);
font-size: 15px;
cursor: pointer;
display: flex; align-items: center; justify-content: center;
transition: all 0.2s;
}
.icon-btn:hover { color: var(–cyan); border-color: var(–cyan); background: rgba(0,220,180,0.08); }
.icon-btn.danger:hover { color: var(–red); border-color: var(–red); background: rgba(255,61,94,0.08); }

.chevron {
font-size: 13px;
color: var(–muted);
transition: transform 0.2s;
margin-left: 4px;
}
.section-card.open .chevron { transform: rotate(180deg); }

/* Files list */
.files-list {
display: none;
padding: 12px 16px 16px;
gap: 8px;
flex-direction: column;
}
.section-card.open .files-list { display: flex; }

.file-item {
display: flex; align-items: center; gap: 12px;
padding: 10px 14px;
background: rgba(0,0,0,0.25);
border: 1px solid rgba(0,220,180,0.1);
border-radius: 10px;
transition: all 0.2s;
}
.file-item:hover { border-color: var(–border-active); background: rgba(0,220,180,0.04); }

.file-icon { font-size: 22px; flex-shrink: 0; }
.file-name {
flex: 1;
font-family: ‘Exo 2’, sans-serif;
font-size: 14px;
font-weight: 500;
color: var(–text);
overflow: hidden;
text-overflow: ellipsis;
white-space: nowrap;
}
.file-size {
font-family: ‘Share Tech Mono’, monospace;
font-size: 11px;
color: var(–muted);
}

.add-file-btn {
display: flex; align-items: center; gap: 8px;
padding: 9px 14px;
border: 1.5px dashed rgba(0,220,180,0.25);
border-radius: 10px;
background: transparent;
color: rgba(0,220,180,0.5);
font-family: ‘Rajdhani’, sans-serif;
font-size: 14px; font-weight: 600;
letter-spacing: 1px;
cursor: pointer;
transition: all 0.2s;
width: 100%;
justify-content: center;
}
.add-file-btn:hover {
border-color: var(–cyan);
color: var(–cyan);
background: rgba(0,220,180,0.05);
}

/* ===== UPLOAD MODAL ===== */
.upload-modal {
max-width: 560px;
}

.upload-modal h2 { color: var(–green); }

.drop-zone {
border: 2px dashed rgba(0,220,180,0.3);
border-radius: 12px;
padding: 40px 20px;
text-align: center;
cursor: pointer;
transition: all 0.2s;
margin-bottom: 16px;
background: rgba(0,220,180,0.03);
}
.drop-zone:hover, .drop-zone.drag-over {
border-color: var(–cyan);
background: rgba(0,220,180,0.07);
}
.drop-zone-icon { font-size: 40px; margin-bottom: 10px; }
.drop-zone-text {
font-family: ‘Rajdhani’, sans-serif;
font-size: 16px; font-weight: 600;
color: var(–cyan);
letter-spacing: 1px;
}
.drop-zone-sub {
font-family: ‘Share Tech Mono’, monospace;
font-size: 11px;
color: var(–muted);
margin-top: 4px;
}

.selected-files {
display: flex; flex-direction: column; gap: 6px;
max-height: 200px;
overflow-y: auto;
margin-bottom: 16px;
}
.selected-file-item {
display: flex; align-items: center; gap: 10px;
padding: 8px 12px;
background: rgba(0,220,180,0.06);
border: 1px solid rgba(0,220,180,0.15);
border-radius: 8px;
font-size: 13px;
}
.selected-file-item .remove-file {
margin-left: auto;
cursor: pointer;
color: var(–muted);
font-size: 16px;
transition: color 0.15s;
}
.selected-file-item .remove-file:hover { color: var(–red); }

.title-input-wrap { margin-bottom: 16px; }
.title-input-wrap label {
display: block;
font-family: ‘Share Tech Mono’, monospace;
font-size: 11px;
letter-spacing: 2px;
color: var(–muted);
margin-bottom: 8px;
}

/* ===== EMPTY STATE ===== */
.empty-state {
text-align: center;
padding: 60px 20px;
color: var(–muted);
display: none;
}
.empty-state.show { display: block; }
.empty-state-icon { font-size: 48px; margin-bottom: 12px; opacity: 0.4; }
.empty-state-text {
font-family: ‘Share Tech Mono’, monospace;
font-size: 13px;
letter-spacing: 2px;
}

/* ===== SCROLLBAR ===== */
::-webkit-scrollbar { width: 4px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: rgba(0,220,180,0.3); border-radius: 2px; }

/* ===== TOAST ===== */
.toast {
position: fixed;
bottom: 24px; right: 24px;
background: var(–bg2);
border: 1px solid var(–border-active);
border-radius: 10px;
padding: 12px 20px;
font-family: ‘Share Tech Mono’, monospace;
font-size: 12px;
color: var(–cyan);
box-shadow: var(–glow);
z-index: 200;
transform: translateY(80px);
opacity: 0;
transition: all 0.3s ease;
}
.toast.show {
transform: translateY(0);
opacity: 1;
}
.toast.error { border-color: rgba(255,61,94,0.5); color: var(–red); box-shadow: 0 0 20px rgba(255,61,94,0.2); }

/* ===== INLINE EDIT ===== */
.section-title-edit {
background: transparent;
border: none;
border-bottom: 1.5px solid var(–cyan);
color: #fff;
font-family: ‘Rajdhani’, sans-serif;
font-size: 18px; font-weight: 700;
letter-spacing: 1px;
outline: none;
width: 100%;
padding: 2px 4px;
}

input[type=file] { display: none; }

@media (max-width: 600px) {
.logo { font-size: 52px; }
.banner { flex-wrap: wrap; gap: 14px; }
.token-section { margin-left: 0; }
}
</style>

</head>

<script>
const ADMIN_TOKEN = "emx2026";

let isAdmin = false;
let sections = JSON.parse(localStorage.getItem('emx_sections') || '[]');
let currentEditSectionId = null; // null = new section
let pendingFiles = []; // {name, size, type, dataUrl}

// File type icons
function getIcon(name) {
  const ext = (name.split('.').pop() || '').toLowerCase();
  const map = {
    pdf: '📄', xlsx: '📊', xls: '📊', csv: '📊',
    docx: '📝', doc: '📝', txt: '📝',
    jpg: '🖼️', jpeg: '🖼️', png: '🖼️', gif: '🖼️', webp: '🖼️', heic: '🖼️',
    mp4: '🎬', mov: '🎬', avi: '🎬',
    zip: '🗜️', rar: '🗜️',
    pptx: '📑', ppt: '📑',
  };
  return map[ext] || '📎';
}

function fmtSize(bytes) {
  if (!bytes) return '';
  if (bytes < 1024) return bytes + ' B';
  if (bytes < 1024*1024) return (bytes/1024).toFixed(1) + ' KB';
  return (bytes/(1024*1024)).toFixed(1) + ' MB';
}

function save() {
  localStorage.setItem('emx_sections', JSON.stringify(sections));
}

function render() {
  const container = document.getElementById('sections');
  const empty = document.getElementById('emptyState');
  container.innerHTML = '';
  if (sections.length === 0) { empty.classList.add('show'); return; }
  empty.classList.remove('show');

  sections.forEach((sec, si) => {
    const card = document.createElement('div');
    card.className = 'section-card';
    card.id = 'sec-' + sec.id;

    const adminActions = isAdmin ? `
      <button class="icon-btn" title="Adaugă fișier" onclick="event.stopPropagation(); openAddFilesModal('${sec.id}')">➕</button>
      <button class="icon-btn" title="Editează titlu" onclick="event.stopPropagation(); startEditTitle('${sec.id}', this)">✏️</button>
      <button class="icon-btn danger" title="Șterge secțiunea" onclick="event.stopPropagation(); deleteSection('${sec.id}')">🗑️</button>
    ` : '';

    const filesHtml = (sec.files||[]).map((f,fi) => `
      <div class="file-item">
        <span class="file-icon">${getIcon(f.name)}</span>
        <span class="file-name" title="${f.name}">${f.name}</span>
        <span class="file-size">${fmtSize(f.size)}</span>
        ${f.dataUrl ? `<button class="icon-btn" title="Descarcă" onclick="downloadFile('${sec.id}',${fi})">⬇️</button>` : ''}
        ${isAdmin ? `<button class="icon-btn danger" title="Șterge fișier" onclick="deleteFile('${sec.id}',${fi})">✕</button>` : ''}
      </div>
    `).join('');

    card.innerHTML = `
      <div class="section-header" onclick="toggleSection('${sec.id}')">
        <div class="section-icon">${sec.icon || '📁'}</div>
        <div class="section-title" id="title-${sec.id}">${sec.title}</div>
        <span class="section-meta">${(sec.files||[]).length} fișier${(sec.files||[]).length!==1?'e':''}</span>
        <div class="section-actions">${adminActions}</div>
        <span class="chevron">▼</span>
      </div>
      <div class="files-list">
        ${filesHtml}
      </div>
    `;
    container.appendChild(card);
  });
}

function toggleSection(id) {
  const card = document.getElementById('sec-' + id);
  if (card) card.classList.toggle('open');
}

// ===== TOKEN =====
function openTokenModal() {
  if (isAdmin) {
    isAdmin = false;
    document.getElementById('adminBar').style.display = 'none';
    document.getElementById('tokenStatus').classList.remove('show');
    document.getElementById('tokenBtn').classList.remove('active');
    document.getElementById('tokenBtn').textContent = '🔑 TOKEN';
    showToast('Deconectat din modul admin.');
    render();
    return;
  }
  document.getElementById('tokenError').classList.remove('show');
  document.getElementById('tokenInput').value = '';
  openModal('tokenModal');
  setTimeout(() => document.getElementById('tokenInput').focus(), 100);
}

function submitToken() {
  const val = document.getElementById('tokenInput').value.trim();
  if (val === ADMIN_TOKEN) {
    isAdmin = true;
    closeModal('tokenModal');
    document.getElementById('adminBar').style.display = 'flex';
    document.getElementById('tokenStatus').classList.add('show');
    document.getElementById('tokenBtn').classList.add('active');
    document.getElementById('tokenBtn').textContent = '🔓 DECONECTARE';
    showToast('Acces administrator activat!');
    render();
  } else {
    document.getElementById('tokenError').classList.add('show');
    document.getElementById('tokenInput').value = '';
    document.getElementById('tokenInput').focus();
  }
}

// ===== MODAL UTILS =====
function openModal(id) { document.getElementById(id).classList.add('open'); }
function closeModal(id) { document.getElementById(id).classList.remove('open'); }

// ===== UPLOAD =====
function openUploadModal() {
  currentEditSectionId = null;
  pendingFiles = [];
  document.getElementById('uploadModalTitle').textContent = '⬆ ADAUGĂ FIȘIERE NOI';
  document.getElementById('titleWrap').style.display = 'block';
  document.getElementById('sectionTitleInput').value = '';
  document.getElementById('uploadError').classList.remove('show');
  renderPending();
  openModal('uploadModal');
}

function openAddFilesModal(secId) {
  currentEditSectionId = secId;
  pendingFiles = [];
  const sec = sections.find(s => s.id === secId);
  document.getElementById('uploadModalTitle').textContent = `➕ ADAUGĂ LA: ${sec ? sec.title : ''}`;
  document.getElementById('titleWrap').style.display = 'none';
  document.getElementById('uploadError').classList.remove('show');
  renderPending();
  openModal('uploadModal');
}

function resetUpload() {
  pendingFiles = [];
  renderPending();
}

function handleFileSelect(e) {
  addFiles(Array.from(e.target.files));
  e.target.value = '';
}
function handleDragOver(e) { e.preventDefault(); e.currentTarget.classList.add('drag-over'); }
function handleDragLeave(e) { e.currentTarget.classList.remove('drag-over'); }
function handleDrop(e) {
  e.preventDefault();
  e.currentTarget.classList.remove('drag-over');
  addFiles(Array.from(e.dataTransfer.files));
}

function addFiles(files) {
  files.forEach(file => {
    const reader = new FileReader();
    reader.onload = (ev) => {
      pendingFiles.push({ name: file.name, size: file.size, type: file.type, dataUrl: ev.target.result });
      renderPending();
    };
    reader.readAsDataURL(file);
  });
}

function renderPending() {
  const wrap = document.getElementById('selectedFiles');
  wrap.innerHTML = pendingFiles.map((f, i) => `
    <div class="selected-file-item">
      <span>${getIcon(f.name)}</span>
      <span style="flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${f.name}</span>
      <span style="font-size:11px;color:var(--muted);font-family:'Share Tech Mono',monospace">${fmtSize(f.size)}</span>
      <span class="remove-file" onclick="removePending(${i})">✕</span>
    </div>
  `).join('');
}
function removePending(i) { pendingFiles.splice(i, 1); renderPending(); }

function confirmUpload() {
  document.getElementById('uploadError').classList.remove('show');

  if (currentEditSectionId) {
    // Add to existing section
    if (pendingFiles.length === 0) {
      document.getElementById('uploadError').textContent = 'ADAUGĂ CEL PUȚIN UN FIȘIER.';
      document.getElementById('uploadError').classList.add('show');
      return;
    }
    const sec = sections.find(s => s.id === currentEditSectionId);
    if (sec) { sec.files = [...(sec.files||[]), ...pendingFiles]; save(); render(); }
    closeModal('uploadModal');
    resetUpload();
    showToast(`${pendingFiles.length || 'Fișierele'} adăugate!`);
  } else {
    // New section
    const title = document.getElementById('sectionTitleInput').value.trim();
    if (!title || pendingFiles.length === 0) {
      document.getElementById('uploadError').textContent = 'ADAUGĂ TITLU ȘI CEL PUȚIN UN FIȘIER.';
      document.getElementById('uploadError').classList.add('show');
      return;
    }
    const icons = ['📁','📂','📋','📊','📝','🗂️','📑'];
    const sec = {
      id: 'sec_' + Date.now(),
      title,
      icon: icons[Math.floor(Math.random()*icons.length)],
      files: [...pendingFiles]
    };
    sections.push(sec);
    save(); render();
    closeModal('uploadModal');
    resetUpload();
    showToast('Secțiune creată!');
    // Auto-open the new section
    setTimeout(() => {
      const card = document.getElementById('sec-' + sec.id);
      if (card) card.classList.add('open');
    }, 100);
  }
}

// ===== EDIT TITLE =====
function startEditTitle(secId, btn) {
  const titleEl = document.getElementById('title-' + secId);
  const current = titleEl.textContent;
  const input = document.createElement('input');
  input.type = 'text';
  input.className = 'section-title-edit';
  input.value = current;
  titleEl.replaceWith(input);
  input.focus();
  input.select();

  function save_() {
    const sec = sections.find(s => s.id === secId);
    if (sec && input.value.trim()) sec.title = input.value.trim();
    save(); render();
    showToast('Titlu actualizat!');
  }
  input.addEventListener('blur', save_);
  input.addEventListener('keydown', (e) => { if (e.key === 'Enter') { input.blur(); } if (e.key === 'Escape') { render(); } });
}

// ===== DELETE =====
function deleteSection(secId) {
  if (!confirm('Ștergi această secțiune și toate fișierele ei?')) return;
  sections = sections.filter(s => s.id !== secId);
  save(); render();
  showToast('Secțiune ștearsă.', true);
}

function deleteFile(secId, fi) {
  const sec = sections.find(s => s.id === secId);
  if (sec) { sec.files.splice(fi, 1); save(); render(); showToast('Fișier șters.', true); }
}

// ===== DOWNLOAD =====
function downloadFile(secId, fi) {
  const sec = sections.find(s => s.id === secId);
  if (!sec || !sec.files[fi]) return;
  const f = sec.files[fi];
  const a = document.createElement('a');
  a.href = f.dataUrl;
  a.download = f.name;
  a.click();
}

// ===== TOAST =====
function showToast(msg, isErr = false) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'toast show' + (isErr ? ' error' : '');
  clearTimeout(t._timer);
  t._timer = setTimeout(() => { t.className = 'toast'; }, 2800);
}

// ===== KEYBOARD =====
document.addEventListener('keydown', (e) => {
  if (e.key === 'Escape') {
    ['tokenModal','uploadModal'].forEach(id => closeModal(id));
  }
  if (e.key === 'Enter' && document.getElementById('tokenModal').classList.contains('open')) {
    submitToken();
  }
});

// Close modal on overlay click
document.querySelectorAll('.modal-overlay').forEach(ov => {
  ov.addEventListener('click', (e) => {
    if (e.target === ov) {
      ov.classList.remove('open');
      resetUpload();
    }
  });
});

// Initial render
render();
</script>

</body>
</html>
