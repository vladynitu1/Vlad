<!DOCTYPE html>

<html lang="ro">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>TFC Navigator</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Barlow+Condensed:wght@400;600;700;900&family=Barlow:wght@400;500;600&display=swap');

html, body {
margin: 0; padding: 0;
width: 100%; height: 100%;
background-color: #0a0e14;
color: #e8f0fe;
font-family: ‘Barlow’, sans-serif;
overflow: hidden;
-webkit-text-size-adjust: 100%;
box-sizing: border-box;
}

*, *::before, *::after { box-sizing: border-box; }

/* ── HEADER ── */
#header {
width: 100%;
background-color: #111720;
border-bottom: 2px solid #00c8ff;
padding: 8px 16px;
display: flex;
align-items: center;
gap: 12px;
position: relative;
z-index: 100;
flex-shrink: 0;
}
#header-logo {
font-family: ‘Share Tech Mono’, monospace;
font-size: 11px;
color: #00c8ff;
letter-spacing: 2px;
opacity: 0.7;
}
#train-badge {
font-family: ‘Barlow Condensed’, sans-serif;
font-size: 28px;
font-weight: 900;
color: #00c8ff;
display: none;
}
#route-label {
flex: 1;
font-family: ‘Barlow Condensed’, sans-serif;
font-size: 14px;
font-weight: 600;
color: #4a6080;
overflow: hidden;
text-overflow: ellipsis;
white-space: nowrap;
display: none;
}
#spacer { flex: 1; }
#gps-wrap {
display: flex;
align-items: center;
gap: 6px;
font-family: ‘Share Tech Mono’, monospace;
font-size: 11px;
color: #4a6080;
}
#gps-dot {
width: 8px; height: 8px;
border-radius: 50%;
background-color: #4a6080;
flex-shrink: 0;
}
#gps-dot.active { background-color: #00e676; box-shadow: 0 0 8px #00e676; }
#gps-dot.error  { background-color: #ff3d57; }
#btn-change {
display: none;
background: transparent;
border: 1px solid #1e2d40;
color: #4a6080;
font-family: ‘Barlow Condensed’, sans-serif;
font-size: 12px;
font-weight: 600;
letter-spacing: 1px;
padding: 4px 10px;
border-radius: 4px;
cursor: pointer;
-webkit-appearance: none;
white-space: nowrap;
}

/* ── WRAPPER ── */
#wrapper {
width: 100%;
height: calc(100vh - 42px);
display: flex;
flex-direction: column;
background-color: #0a0e14;
}

/* ── SEARCH SCREEN ── */
#search-screen {
flex: 1;
display: flex;
flex-direction: column;
align-items: center;
justify-content: center;
padding: 32px 24px;
gap: 28px;
background-color: #0a0e14;
}

.s-title {
font-family: ‘Barlow Condensed’, sans-serif;
font-size: 52px;
font-weight: 900;
color: #00c8ff;
text-align: center;
line-height: 0.95;
letter-spacing: -1px;
}
.s-sub {
font-family: ‘Share Tech Mono’, monospace;
font-size: 11px;
color: #4a6080;
letter-spacing: 2px;
text-align: center;
margin-top: 6px;
}

/* THE INPUT BOX */
#search-row {
display: flex;
width: 100%;
max-width: 380px;
border-radius: 10px;
overflow: hidden;
border: 2px solid #00c8ff;
}

#train-input {
flex: 1;
font-family: ‘Share Tech Mono’, monospace;
font-size: 32px;
letter-spacing: 6px;
text-align: center;
padding: 16px 12px;
background-color: #111720;
color: #e8f0fe;
border: none;
outline: none;
-webkit-appearance: none;
appearance: none;
border-radius: 0;
min-width: 0;
/* Force iOS Safari to use our colors */
-webkit-text-fill-color: #e8f0fe;
opacity: 1;
}

#train-input::-webkit-input-placeholder {
color: #4a6080;
-webkit-text-fill-color: #4a6080;
font-size: 18px;
letter-spacing: 2px;
}

#btn-go {
background-color: #00c8ff;
color: #0a0e14;
-webkit-text-fill-color: #0a0e14;
font-family: ‘Barlow Condensed’, sans-serif;
font-size: 18px;
font-weight: 900;
letter-spacing: 2px;
padding: 16px 22px;
border: none;
outline: none;
cursor: pointer;
-webkit-appearance: none;
appearance: none;
border-radius: 0;
flex-shrink: 0;
}

#status-msg {
font-family: ‘Share Tech Mono’, monospace;
font-size: 12px;
color: #00c8ff;
text-align: center;
min-height: 20px;
letter-spacing: 1px;
}
#status-msg.err { color: #ff3d57; }

.hint-text {
font-family: ‘Share Tech Mono’, monospace;
font-size: 10px;
color: #2a3d55;
text-align: center;
line-height: 1.8;
max-width: 300px;
}

/* ── LOADING ── */
#loading {
display: none;
position: fixed;
inset: 0;
background-color: rgba(10,14,20,0.93);
z-index: 999;
align-items: center;
justify-content: center;
flex-direction: column;
gap: 18px;
}
#loading.show { display: flex; }
.spinner {
width: 44px; height: 44px;
border: 3px solid #1e2d40;
border-top-color: #00c8ff;
border-radius: 50%;
animation: spin 0.75s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }
#load-txt {
font-family: ‘Share Tech Mono’, monospace;
font-size: 13px;
color: #00c8ff;
letter-spacing: 2px;
}

/* ── APP SCREEN ── */
#app-screen {
flex: 1;
display: none;
flex-direction: column;
overflow: hidden;
background-color: #0a0e14;
}

/* NEXT STATION BANNER */
#banner {
background-color: #111720;
border-bottom: 1px solid #1e2d40;
padding: 10px 16px;
display: grid;
grid-template-columns: 1fr auto 1fr;
align-items: center;
gap: 8px;
flex-shrink: 0;
}
.b-label {
font-family: ‘Share Tech Mono’, monospace;
font-size: 9px;
color: #4a6080;
letter-spacing: 2px;
}
#next-name {
font-family: ‘Barlow Condensed’, sans-serif;
font-size: 20px;
font-weight: 700;
color: #e8f0fe;
white-space: nowrap;
overflow: hidden;
text-overflow: ellipsis;
}
#km-val {
font-family: ‘Share Tech Mono’, monospace;
font-size: 28px;
color: #00c8ff;
text-align: center;
line-height: 1;
font-weight: bold;
}
#km-lbl {
font-family: ‘Share Tech Mono’, monospace;
font-size: 9px;
color: #4a6080;
text-align: center;
letter-spacing: 2px;
}
#next-times { text-align: right; }
.t-row {
display: flex;
justify-content: flex-end;
align-items: baseline;
gap: 5px;
}
.t-tag {
font-family: ‘Share Tech Mono’, monospace;
font-size: 9px;
color: #4a6080;
letter-spacing: 1px;
}
.t-val {
font-family: ‘Share Tech Mono’, monospace;
font-size: 16px;
color: #ffd600;
}

/* SPLIT */
#split {
flex: 1;
display: grid;
grid-template-columns: 1fr 1fr;
overflow: hidden;
}

/* MAP */
#map {
width: 100%;
height: 100%;
}

/* STATION LIST */
#list-wrap {
overflow-y: auto;
background-color: #0a0e14;
border-left: 1px solid #1e2d40;
}
#list-wrap::-webkit-scrollbar { width: 3px; }
#list-wrap::-webkit-scrollbar-track { background: #0a0e14; }
#list-wrap::-webkit-scrollbar-thumb { background: #1e2d40; }

.st-item {
display: grid;
grid-template-columns: 3px 1fr auto;
align-items: stretch;
border-bottom: 1px solid rgba(30,45,64,0.4);
min-height: 58px;
background-color: #0a0e14;
position: relative;
transition: background-color 0.3s;
}
.st-item.passed {
background-color: #0d1420;
opacity: 0.45;
}
.st-item.current {
background-color: rgba(0,200,255,0.05);
}
.st-bar {
background-color: #1e2d40;
width: 3px;
align-self: stretch;
}
.st-item.passed .st-bar { background-color: #1e2d40; opacity: 0.3; }
.st-item.current .st-bar { background-color: #00c8ff; }

.st-info {
padding: 8px 0 6px 0;
display: flex;
flex-direction: column;
justify-content: center;
gap: 2px;
min-width: 0;
}
.st-name {
font-family: ‘Barlow Condensed’, sans-serif;
font-size: 13px;
font-weight: 600;
color: #e8f0fe;
white-space: nowrap;
overflow: hidden;
text-overflow: ellipsis;
line-height: 1.2;
}
.st-item.passed .st-name {
text-decoration: line-through;
color: #4a6080;
}
.st-item.current .st-name { color: #00c8ff; }
.st-km {
font-family: ‘Share Tech Mono’, monospace;
font-size: 10px;
color: #2a3d55;
}

.st-times {
padding: 8px 10px 6px 4px;
display: flex;
flex-direction: column;
align-items: flex-end;
justify-content: center;
gap: 1px;
}
.st-arr {
font-family: ‘Share Tech Mono’, monospace;
font-size: 12px;
color: #e8f0fe;
line-height: 1;
}
.st-dep {
font-family: ‘Share Tech Mono’, monospace;
font-size: 11px;
color: #ffd600;
line-height: 1;
}
.st-lbl {
font-size: 8px;
color: #2a3d55;
letter-spacing: 0.5px;
font-family: ‘Share Tech Mono’, monospace;
}
.st-item.passed .st-arr,
.st-item.passed .st-dep { color: #2a3d55; }

/* current pulse dot */
.st-item.current::before {
content: ‘’;
position: absolute;
left: -4px;
top: 50%;
transform: translateY(-50%);
width: 9px; height: 9px;
border-radius: 50%;
background-color: #00c8ff;
box-shadow: 0 0 10px #00c8ff;
z-index: 2;
}

@media (max-width: 600px) {
#split {
grid-template-columns: 1fr;
grid-template-rows: 38vh 1fr;
}
#list-wrap { border-left: none; border-top: 1px solid #1e2d40; }
}
</style>

</head>

<script>
// ── STATE ──────────────────────────────────────────
var G = {
  trainNo: null,
  stations: [],
  curIdx: 0,
  lat: null,
  lng: null,
  watchId: null,
  map: null,
  marker: null,
};

// ── HELPERS ────────────────────────────────────────
function el(id) { return document.getElementById(id); }
function showLoad(msg) { el('load-txt').textContent = msg || 'SE ÎNCARCĂ...'; el('loading').classList.add('show'); }
function hideLoad() { el('loading').classList.remove('show'); }
function setMsg(msg, err) {
  el('status-msg').textContent = msg;
  el('status-msg').className = err ? 'err' : '';
}

// Enter key
el('train-input').addEventListener('keyup', function(e) {
  if (e.key === 'Enter' || e.keyCode === 13) searchTrain();
});

// ── SEARCH ─────────────────────────────────────────
function searchTrain() {
  var no = el('train-input').value.replace(/\D/g, '').trim();
  if (!no) { setMsg('Introdu numărul trenului!', true); return; }
  showLoad('CAUT TRENUL ' + no + '...');
  setMsg('');
  fetchTrain(no).then(function(stations) {
    hideLoad();
    if (!stations || stations.length === 0) {
      setMsg('Trenul ' + no + ' nu a fost găsit.', true);
      return;
    }
    G.trainNo = no;
    G.stations = stations;
    G.curIdx = 0;
    launchApp();
  }).catch(function(err) {
    hideLoad();
    setMsg('Eroare: ' + err.message, true);
  });
}

// ── FETCH via Anthropic API ─────────────────────────
function fetchTrain(no) {
  var today = new Date();
  var dd = String(today.getDate()).padStart(2,'0');
  var mm = String(today.getMonth()+1).padStart(2,'0');
  var yyyy = today.getFullYear();
  var dateRo = dd + '.' + mm + '.' + yyyy;
  var dateISO = yyyy + '-' + mm + '-' + dd;

  var prompt = 'Cauta pe web trenul CFR numarul ' + no + ' pentru data ' + dateRo + '.\n' +
    'Acceseaza https://mersultrenurilor.infofer.ro/ro-RO/Itineraries?trainNumber=' + no + '&date=' + dateISO + ' sau orice alta sursa.\n\n' +
    'Returneaza DOAR un JSON array cu toate statiile/opririle trenului, fara alt text, fara markdown, fara explicatii.\n\n' +
    'Format strict:\n' +
    '[{"name":"Nume Statie","km":0,"arr":"","dep":"HH:MM","lat":45.0,"lng":25.0},...]\n\n' +
    'Campuri:\n' +
    '- name: numele statiei (string)\n' +
    '- km: km pe ruta (numar, 0 daca necunoscut)\n' +
    '- arr: ora sosire HH:MM (string gol pentru prima statie)\n' +
    '- dep: ora plecare HH:MM (string gol pentru ultima statie)\n' +
    '- lat: latitudine Romania (numar, 0 daca necunoscuta)\n' +
    '- lng: longitudine Romania (numar, 0 daca necunoscuta)\n\n' +
    'IMPORTANT: Returneaza NUMAI JSON array. Nicio alta informatie.';

  return fetch('https://api.anthropic.com/v1/messages', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({
      model: 'claude-sonnet-4-20250514',
      max_tokens: 4000,
      tools: [{ type: 'web_search_20250305', name: 'web_search' }],
      messages: [{ role: 'user', content: prompt }]
    })
  })
  .then(function(r) {
    if (!r.ok) throw new Error('API ' + r.status);
    return r.json();
  })
  .then(function(data) {
    var text = '';
    for (var i = 0; i < data.content.length; i++) {
      if (data.content[i].type === 'text') text += data.content[i].text;
    }
    // extract JSON array
    var m = text.match(/\[[\s\S]*\]/);
    if (m) {
      try {
        var arr = JSON.parse(m[0]);
        if (Array.isArray(arr) && arr.length > 0) return arr;
      } catch(e) {}
    }
    throw new Error('Nu s-au putut parsa datele pentru trenul ' + no);
  });
}

// ── LAUNCH APP ─────────────────────────────────────
function launchApp() {
  el('search-screen').style.display = 'none';
  el('app-screen').style.display = 'flex';
  el('train-badge').textContent = G.trainNo;
  el('train-badge').style.display = 'block';
  var s = G.stations;
  if (s.length >= 2) {
    el('route-label').textContent = s[0].name + ' → ' + s[s.length-1].name;
    el('route-label').style.display = 'block';
  }
  el('btn-change').style.display = 'block';

  renderList();
  initMap();
  startGPS();
  updateBanner();
}

function showSearch() {
  el('app-screen').style.display = 'none';
  el('search-screen').style.display = 'flex';
  el('train-badge').style.display = 'none';
  el('route-label').style.display = 'none';
  el('btn-change').style.display = 'none';
  if (G.watchId) navigator.geolocation.clearWatch(G.watchId);
}

// ── STATION LIST ───────────────────────────────────
function renderList() {
  var list = el('st-list');
  list.innerHTML = '';
  G.stations.forEach(function(st, i) {
    var cls = 'st-item';
    if (i < G.curIdx) cls += ' passed';
    else if (i === G.curIdx) cls += ' current';

    var div = document.createElement('div');
    div.className = cls;
    div.id = 'si-' + i;

    var arrHtml = st.arr ? '<div class="st-lbl">SOS</div><div class="st-arr">' + st.arr + '</div>' : '';
    var depHtml = st.dep ? '<div class="st-lbl">PL</div><div class="st-dep">' + st.dep + '</div>' : '';

    div.innerHTML =
      '<div class="st-bar"></div>' +
      '<div class="st-info">' +
        '<div class="st-name">' + st.name + '</div>' +
        '<div class="st-km">' + (st.km ? 'km ' + st.km : '') + '</div>' +
      '</div>' +
      '<div class="st-times">' + arrHtml + depHtml + '</div>';

    list.appendChild(div);
  });
  scrollToCurrent();
}

function scrollToCurrent() {
  var el2 = el('si-' + G.curIdx);
  if (el2) el2.scrollIntoView({ block: 'center', behavior: 'smooth' });
}

// ── BANNER ─────────────────────────────────────────
function updateBanner() {
  var next = G.stations[G.curIdx];
  if (!next) return;
  el('next-name').textContent = next.name;
  el('n-arr').textContent = next.arr || '—';
  el('n-dep').textContent = next.dep || '—';

  if (G.lat && next.lat && next.lng) {
    var d = haversine(G.lat, G.lng, next.lat, next.lng);
    el('km-val').textContent = d.toFixed(1);
  } else {
    el('km-val').textContent = '—';
  }
}

// ── GPS ────────────────────────────────────────────
function startGPS() {
  if (!navigator.geolocation) { gpsStatus('error', 'NO GPS'); return; }
  gpsStatus('wait', 'WAIT');
  G.watchId = navigator.geolocation.watchPosition(onPos, onPosErr, {
    enableHighAccuracy: true,
    maximumAge: 3000,
    timeout: 15000
  });
}

function onPos(pos) {
  G.lat = pos.coords.latitude;
  G.lng = pos.coords.longitude;
  gpsStatus('active', Math.round(pos.coords.accuracy) + 'm');
  moveUserMarker();
  checkStationProgress();
  updateBanner();
}

function onPosErr() { gpsStatus('error', 'ERR'); }

function gpsStatus(cls, txt) {
  el('gps-dot').className = cls;
  el('gps-txt').textContent = txt;
}

function checkStationProgress() {
  if (!G.lat || G.stations.length === 0) return;
  // Find nearest station from current onward
  var best = G.curIdx, bestD = Infinity;
  for (var i = G.curIdx; i < G.stations.length; i++) {
    var st = G.stations[i];
    if (!st.lat || !st.lng) continue;
    var d = haversine(G.lat, G.lng, st.lat, st.lng);
    if (d < bestD) { bestD = d; best = i; }
  }
  // Within 300m → mark as passed
  if (bestD < 0.3 && best >= G.curIdx) {
    var newIdx = Math.min(best + 1, G.stations.length - 1);
    if (newIdx !== G.curIdx) {
      G.curIdx = newIdx;
      renderList();
    }
  }
}

// ── MAP ────────────────────────────────────────────
function initMap() {
  if (G.map) { G.map.remove(); G.map = null; G.marker = null; }

  G.map = L.map('map', { zoomControl: true, attributionControl: false });
  L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', { maxZoom: 19 }).addTo(G.map);

  var coords = [];
  G.stations.forEach(function(st) {
    if (st.lat && st.lng) coords.push([st.lat, st.lng]);
  });

  if (coords.length >= 2) {
    var line = L.polyline(coords, { color: '#00c8ff', weight: 3, opacity: 0.7 }).addTo(G.map);
    G.map.fitBounds(line.getBounds(), { padding: [24, 24] });
  } else {
    G.map.setView([45.9, 24.9], 7);
  }

  G.stations.forEach(function(st, i) {
    if (!st.lat || !st.lng) return;
    var isF = i === 0, isL = i === G.stations.length - 1;
    L.circleMarker([st.lat, st.lng], {
      radius: (isF || isL) ? 7 : 4,
      color: isF ? '#00e676' : isL ? '#ff3d57' : '#00c8ff',
      fillColor: isF ? '#00e676' : isL ? '#ff3d57' : '#0a0e14',
      fillOpacity: 1, weight: 2
    }).addTo(G.map).bindPopup('<b>' + st.name + '</b><br>' + (st.arr || '') + ' / ' + (st.dep || ''));
  });
}

function moveUserMarker() {
  if (!G.map || !G.lat) return;
  var pos = [G.lat, G.lng];
  if (!G.marker) {
    var icon = L.divIcon({
      html: '<div style="width:18px;height:18px;background:#ff6b35;border:3px solid #fff;border-radius:50%;box-shadow:0 0 14px #ff6b35;"></div>',
      iconSize: [18, 18], iconAnchor: [9, 9], className: ''
    });
    G.marker = L.marker(pos, { icon: icon, zIndexOffset: 1000 }).addTo(G.map);
  } else {
    G.marker.setLatLng(pos);
  }
  G.map.panTo(pos, { animate: true, duration: 1 });
}

// ── HAVERSINE (km) ──────────────────────────────────
function haversine(lat1, lng1, lat2, lng2) {
  var R = 6371;
  var dLat = (lat2 - lat1) * Math.PI / 180;
  var dLng = (lng2 - lng1) * Math.PI / 180;
  var a = Math.sin(dLat/2) * Math.sin(dLat/2) +
    Math.cos(lat1 * Math.PI/180) * Math.cos(lat2 * Math.PI/180) *
    Math.sin(dLng/2) * Math.sin(dLng/2);
  return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
}
