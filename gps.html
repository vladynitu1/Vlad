<!DOCTYPE html>
<html lang="ro">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TFC Navigator - Fix</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#0a0e14;
  color:#fff;
}

/* MODAL */
#lmodal{
  display:flex;
  flex-direction:column;
  height:100vh;
}

#lmheader{
  background:#111;
  padding:10px;
  display:flex;
  justify-content:space-between;
  border-bottom:2px solid #ffd600;
}

#lmtitle{color:#ffd600;font-weight:bold;}

#lmbody{padding:15px;overflow:auto}

/* TABS */
#lmtabs{display:flex;gap:5px;margin-bottom:10px;}

.lmtab{
  padding:8px 12px;
  border:1px solid #333;
  cursor:pointer;
  color:#777;
}

.lmtab.on{
  color:#ffd600;
  border-color:#ffd600;
}

/* TAB CONTENT */
.lmtabcontent{display:none;}
.lmtabcontent.on{display:block;}

/* BUTTON */
.btn{
  background:#ffd600;
  color:#000;
  padding:12px;
  border:none;
  border-radius:6px;
  font-weight:bold;
  cursor:pointer;
  width:100%;
}

/* PDF BOX */
#pdfresult{
  margin-top:10px;
  padding:10px;
  background:#111;
  border:1px solid #333;
  display:none;
  max-height:200px;
  overflow:auto;
  white-space:pre-wrap;
}
</style>
</head>

<body>

<div id="lmodal">

  <div id="lmheader">
    <div id="lmtitle">GESTIUNE LIVRETE</div>
  </div>

  <div id="lmbody">

    <div id="lmtabs">
      <div class="lmtab on" onclick="switchTab('tab-trains')">TRENURI</div>
      <div class="lmtab" onclick="switchTab('tab-add')">ADAUGĂ</div>
      <div class="lmtab" onclick="switchTab('tab-pdf')">UPLOAD PDF</div>
    </div>

    <!-- TAB 1 -->
    <div id="tab-trains" class="lmtabcontent on">
      <p>Nu există trenuri.</p>
    </div>

    <!-- TAB 2 -->
    <div id="tab-add" class="lmtabcontent">
      <p>Formular adăugare...</p>
    </div>

    <!-- TAB 3 FIXAT -->
    <div id="tab-pdf" class="lmtabcontent">

      <button class="btn" onclick="document.getElementById('file').click()">
        📄 SELECTEAZĂ PDF
      </button>

      <input id="file" type="file" accept="application/pdf"
        style="display:none"
        onchange="readPdf(this.files)">

      <div id="pdfresult"></div>

    </div>

  </div>
</div>

<script>
function switchTab(id){
  let tabs = document.querySelectorAll('.lmtab');
  let contents = document.querySelectorAll('.lmtabcontent');

  tabs.forEach(t=>t.classList.remove('on'));
  contents.forEach(c=>c.classList.remove('on'));

  event.target.classList.add('on');
  document.getElementById(id).classList.add('on');
}

/* PDF SIMPLU (doar test) */
function readPdf(files){
  if(!files.length) return;

  let file = files[0];
  document.getElementById('pdfresult').style.display='block';
  document.getElementById('pdfresult').innerText =
    "✔ PDF selectat: " + file.name;
}
</script>

</body>
</html>
