<!DOCTYPE html>

<html lang="ro">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>TFC Train Navigator</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Barlow+Condensed:wght@400;600;700;900&family=Barlow:wght@400;500;600&display=swap');
html,body{margin:0;padding:0;width:100%;height:100%;background:#0a0e14;color:#e8f0fe;font-family:'Barlow',sans-serif;overflow:hidden;-webkit-text-size-adjust:100%;}
*,*::before,*::after{box-sizing:border-box;}

/* ── HEADER ── */
#header{width:100%;background:#111720;border-bottom:2px solid #00c8ff;padding:8px 14px;display:flex;align-items:center;gap:10px;flex-shrink:0;z-index:100;min-height:44px;}
#hlogo{font-family:‘Share Tech Mono’,monospace;font-size:11px;color:#00c8ff;letter-spacing:2px;opacity:.6;white-space:nowrap;}
#tbadge{font-family:‘Barlow Condensed’,sans-serif;font-size:24px;font-weight:900;color:#00c8ff;display:none;white-space:nowrap;}
#rlabel{flex:1;font-family:‘Barlow Condensed’,sans-serif;font-size:12px;font-weight:600;color:#4a6080;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;display:none;}
#hsp{flex:1;}
#gpswrap{display:flex;align-items:center;gap:5px;font-family:‘Share Tech Mono’,monospace;font-size:10px;color:#4a6080;}
#gpsdot{width:8px;height:8px;border-radius:50%;background:#4a6080;flex-shrink:0;transition:background .3s;}
#gpsdot.active{background:#00e676;box-shadow:0 0 8px #00e676;}
#gpsdot.error{background:#ff3d57;}
#btnchg{display:none;background:transparent;border:1px solid #1e2d40;color:#4a6080;font-family:‘Barlow Condensed’,sans-serif;font-size:11px;font-weight:600;letter-spacing:1px;padding:4px 8px;border-radius:4px;cursor:pointer;white-space:nowrap;}
#btnlivrete{background:transparent;border:1px solid #ffd600;color:#ffd600;font-family:‘Barlow Condensed’,sans-serif;font-size:11px;font-weight:700;letter-spacing:1px;padding:4px 9px;border-radius:4px;cursor:pointer;white-space:nowrap;}

/* ── MAIN WRAP ── */
#wrap{width:100%;height:calc(100vh - 44px);display:flex;flex-direction:column;background:#0a0e14;}

/* ── SEARCH SCREEN ── */
#sscreen{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px 20px;gap:20px;background:#0a0e14;}
.stitle{font-family:‘Barlow Condensed’,sans-serif;font-size:48px;font-weight:900;color:#00c8ff;text-align:center;line-height:.95;letter-spacing:-1px;}
.ssub{font-family:‘Share Tech Mono’,monospace;font-size:10px;color:#4a6080;letter-spacing:2px;text-align:center;margin-top:6px;}
#srow{display:flex;width:100%;max-width:360px;border-radius:10px;overflow:hidden;border:2px solid #00c8ff;}
#tinput{flex:1;font-family:‘Share Tech Mono’,monospace;font-size:30px;letter-spacing:5px;text-align:center;padding:14px 10px;background:#111720;color:#e8f0fe;border:none;outline:none;-webkit-appearance:none;min-width:0;opacity:1;}
#tinput::-webkit-input-placeholder{color:#4a6080;font-size:15px;letter-spacing:2px;}
#btngo{background:#00c8ff;color:#0a0e14;font-family:‘Barlow Condensed’,sans-serif;font-size:18px;font-weight:900;letter-spacing:2px;padding:14px 18px;border:none;cursor:pointer;-webkit-appearance:none;flex-shrink:0;}
#smsg{font-family:‘Share Tech Mono’,monospace;font-size:11px;color:#00c8ff;text-align:center;min-height:18px;letter-spacing:1px;padding:0 16px;line-height:1.5;}
#smsg.err{color:#ff3d57;}
#traincount{font-family:‘Share Tech Mono’,monospace;font-size:10px;color:#2a3d55;text-align:center;}
#traincount span{color:#ffd600;}

/* ── LOADING ── */
#loading{display:none;position:fixed;inset:0;background:rgba(10,14,20,.94);z-index:999;align-items:center;justify-content:center;flex-direction:column;gap:16px;}
#loading.show{display:flex;}
.spinner{width:42px;height:42px;border:3px solid #1e2d40;border-top-color:#00c8ff;border-radius:50%;animation:spin .75s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}
#ltxt{font-family:‘Share Tech Mono’,monospace;font-size:12px;color:#00c8ff;letter-spacing:2px;text-align:center;}

/* ── APP SCREEN ── */
#ascreen{flex:1;display:none;flex-direction:column;overflow:hidden;}
#banner{background:#111720;border-bottom:1px solid #1e2d40;padding:9px 14px;display:grid;grid-template-columns:1fr auto 1fr;align-items:center;gap:8px;flex-shrink:0;}
.blbl{font-family:‘Share Tech Mono’,monospace;font-size:9px;color:#4a6080;letter-spacing:2px;}
#nname{font-family:‘Barlow Condensed’,sans-serif;font-size:19px;font-weight:700;color:#e8f0fe;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
#kmval{font-family:‘Share Tech Mono’,monospace;font-size:26px;color:#00c8ff;text-align:center;font-weight:bold;}
#kmlbl{font-family:‘Share Tech Mono’,monospace;font-size:9px;color:#4a6080;text-align:center;letter-spacing:2px;}
#ntimes{text-align:right;}
.trow{display:flex;justify-content:flex-end;align-items:baseline;gap:5px;}
.ttag{font-family:‘Share Tech Mono’,monospace;font-size:9px;color:#4a6080;letter-spacing:1px;}
.tval{font-family:‘Share Tech Mono’,monospace;font-size:15px;color:#ffd600;}
#split{flex:1;display:grid;grid-template-columns:1fr 1fr;overflow:hidden;}
#map{width:100%;height:100%;}
#lwrap{overflow-y:auto;background:#0a0e14;border-left:1px solid #1e2d40;}
#lwrap::-webkit-scrollbar{width:3px;}
#lwrap::-webkit-scrollbar-track{background:#0a0e14;}
#lwrap::-webkit-scrollbar-thumb{background:#1e2d40;}
.si{display:grid;grid-template-columns:3px 1fr auto;align-items:stretch;border-bottom:1px solid rgba(30,45,64,.4);min-height:56px;background:#0a0e14;position:relative;}
.si.passed{background:#0d1420;opacity:.4;}
.si.cur{background:rgba(0,200,255,.05);}
.sibar{background:#1e2d40;width:3px;}
.si.passed .sibar{opacity:.3;}
.si.cur .sibar{background:#00c8ff;}
.siinfo{padding:7px 0 6px;display:flex;flex-direction:column;justify-content:center;gap:2px;min-width:0;}
.siname{font-family:‘Barlow Condensed’,sans-serif;font-size:13px;font-weight:600;color:#e8f0fe;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;line-height:1.2;}
.si.passed .siname{text-decoration:line-through;color:#4a6080;}
.si.cur .siname{color:#00c8ff;}
.sikm{font-family:‘Share Tech Mono’,monospace;font-size:10px;color:#2a3d55;}
.sitimes{padding:7px 8px 6px 4px;display:flex;flex-direction:column;align-items:flex-end;justify-content:center;gap:1px;}
.siarr{font-family:‘Share Tech Mono’,monospace;font-size:12px;color:#e8f0fe;line-height:1;}
.sidep{font-family:‘Share Tech Mono’,monospace;font-size:11px;color:#ffd600;line-height:1;}
.silbl{font-size:8px;color:#2a3d55;letter-spacing:.5px;font-family:‘Share Tech Mono’,monospace;}
.si.passed .siarr,.si.passed .sidep{color:#2a3d55;}
.si.cur::before{content:’’;position:absolute;left:-4px;top:50%;transform:translateY(-50%);width:9px;height:9px;border-radius:50%;background:#00c8ff;box-shadow:0 0 10px #00c8ff;z-index:2;}
#maptoggle{position:absolute;bottom:80px;right:10px;z-index:500;background:#111720;border:1px solid #1e2d40;color:#4a6080;font-family:‘Share Tech Mono’,monospace;font-size:10px;padding:6px 8px;border-radius:6px;cursor:pointer;letter-spacing:1px;}
#maptoggle.rail{border-color:#00c8ff;color:#00c8ff;}
@media(max-width:600px){#split{grid-template-columns:1fr;grid-template-rows:38vh 1fr;}#lwrap{border-left:none;border-top:1px solid #1e2d40;}}

/* ════════════════════════════════
LIVRETE MODAL
════════════════════════════════ */
#lmodal{display:none;position:fixed;inset:0;background:rgba(10,14,20,.97);z-index:2000;flex-direction:column;overflow:hidden;}
#lmodal.show{display:flex;}
#lmheader{background:#111720;border-bottom:2px solid #ffd600;padding:12px 16px;display:flex;align-items:center;gap:12px;flex-shrink:0;}
#lmtitle{font-family:‘Barlow Condensed’,sans-serif;font-size:22px;font-weight:900;color:#ffd600;letter-spacing:2px;flex:1;}
#lmclose{background:transparent;border:1px solid #ffd600;color:#ffd600;font-family:‘Barlow Condensed’,sans-serif;font-size:13px;font-weight:700;padding:5px 12px;border-radius:4px;cursor:pointer;letter-spacing:1px;}
#lmbody{flex:1;overflow-y:auto;padding:16px;}

/* Tabs */
#lmtabs{display:flex;gap:4px;margin-bottom:16px;}
.lmtab{font-family:‘Barlow Condensed’,sans-serif;font-size:13px;font-weight:700;letter-spacing:1px;padding:7px 14px;border-radius:6px 6px 0 0;border:1px solid #1e2d40;border-bottom:none;color:#4a6080;background:#0d1520;cursor:pointer;}
.lmtab.on{color:#ffd600;border-color:#ffd600;background:rgba(255,214,0,.07);}
.lmtabcontent{display:none;}
.lmtabcontent.on{display:block;}

/* Train list */
#trainlist{display:flex;flex-direction:column;gap:6px;}
.titem{background:#111720;border:1px solid #1e2d40;border-radius:8px;display:flex;align-items:center;gap:10px;padding:10px 12px;cursor:pointer;}
.titem:hover{border-color:#00c8ff;}
.tino{font-family:‘Share Tech Mono’,monospace;font-size:18px;color:#00c8ff;font-weight:bold;min-width:52px;}
.tiroute{flex:1;font-family:‘Barlow Condensed’,sans-serif;font-size:13px;color:#e8f0fe;line-height:1.3;}
.tistops{font-family:‘Share Tech Mono’,monospace;font-size:10px;color:#4a6080;}
.tidel{background:transparent;border:none;color:#ff3d57;font-size:16px;cursor:pointer;padding:4px;opacity:.5;}
.tidel:hover{opacity:1;}

/* Add train form */
#addform{background:#111720;border:1px solid #1e2d40;border-radius:10px;padding:16px;}
#addform h3{font-family:‘Barlow Condensed’,sans-serif;font-size:16px;font-weight:700;color:#ffd600;letter-spacing:1px;margin:0 0 14px;}
.finput{width:100%;background:#0a0e14;border:1px solid #1e2d40;color:#e8f0fe;font-family:‘Share Tech Mono’,monospace;font-size:13px;padding:8px 10px;border-radius:6px;outline:none;margin-bottom:8px;}
.finput:focus{border-color:#00c8ff;}
.finput::placeholder{color:#2a3d55;}
#stationsarea{width:100%;min-height:180px;background:#0a0e14;border:1px solid #1e2d40;color:#e8f0fe;font-family:‘Share Tech Mono’,monospace;font-size:11px;padding:8px 10px;border-radius:6px;outline:none;resize:vertical;margin-bottom:8px;line-height:1.8;}
#stationsarea:focus{border-color:#00c8ff;}
.fhint{font-family:‘Share Tech Mono’,monospace;font-size:9px;color:#2a3d55;margin-bottom:12px;line-height:1.7;}
.fhint b{color:#4a6080;}
#btnadd{background:#ffd600;color:#0a0e14;font-family:‘Barlow Condensed’,sans-serif;font-size:15px;font-weight:900;letter-spacing:2px;padding:10px 20px;border:none;border-radius:6px;cursor:pointer;width:100%;}

/* PDF Upload section */
#pdfzone{border:2px dashed #1e2d40;border-radius:10px;padding:28px 20px;text-align:center;cursor:pointer;transition:border-color .2s,background .2s;margin-bottom:16px;position:relative;}
#pdfzone:hover,#pdfzone.drag{border-color:#ffd600;background:rgba(255,214,0,.04);}
#pdfzone input[type=file]{position:absolute;inset:0;opacity:0;cursor:pointer;width:100%;height:100%;}
#pdficon{font-size:32px;margin-bottom:8px;}
#pdftxt{font-family:‘Barlow Condensed’,sans-serif;font-size:15px;font-weight:700;color:#4a6080;letter-spacing:1px;}
#pdfsub{font-family:‘Share Tech Mono’,monospace;font-size:10px;color:#2a3d55;margin-top:4px;}
#pdfresult{background:#0d1520;border:1px solid #1e2d40;border-radius:8px;padding:12px;font-family:‘Share Tech Mono’,monospace;font-size:11px;color:#e8f0fe;line-height:1.7;display:none;white-space:pre-wrap;max-height:260px;overflow-y:auto;word-break:break-all;}
#pdfresult::-webkit-scrollbar{width:3px;}
#pdfresult::-webkit-scrollbar-thumb{background:#1e2d40;}
#pdfbtns{display:flex;gap:8px;margin-top:10px;}
#btncopypdf{flex:1;background:transparent;border:1px solid #00c8ff;color:#00c8ff;font-family:‘Barlow Condensed’,sans-serif;font-size:13px;font-weight:700;letter-spacing:1px;padding:8px;border-radius:6px;cursor:pointer;}
#btnpastetrain{flex:1;background:#00c8ff;color:#0a0e14;font-family:‘Barlow Condensed’,sans-serif;font-size:13px;font-weight:700;letter-spacing:1px;padding:8px;border-radius:6px;cursor:pointer;}
#pdffeedback{font-family:‘Share Tech Mono’,monospace;font-size:10px;color:#00e676;text-align:center;min-height:16px;margin-top:6px;}

/* Import/export */
#iezone{display:flex;flex-direction:column;gap:10px;}
.iebtn{background:transparent;border:1px solid #1e2d40;color:#4a6080;font-family:‘Barlow Condensed’,sans-serif;font-size:13px;font-weight:700;letter-spacing:1px;padding:11px 14px;border-radius:6px;cursor:pointer;text-align:left;}
.iebtn:hover{border-color:#00c8ff;color:#00c8ff;}
.iebtn.danger:hover{border-color:#ff3d57;color:#ff3d57;}
.iebtn span{font-family:‘Share Tech Mono’,monospace;font-size:9px;color:#2a3d55;display:block;margin-top:2px;font-weight:400;letter-spacing:.5px;}
#importarea{width:100%;min-height:100px;background:#0a0e14;border:1px solid #1e2d40;color:#e8f0fe;font-family:‘Share Tech Mono’,monospace;font-size:10px;padding:8px 10px;border-radius:6px;outline:none;resize:vertical;display:none;}
#importarea:focus{border-color:#ffd600;}
#btnimportgo{background:#ffd600;color:#0a0e14;font-family:‘Barlow Condensed’,sans-serif;font-size:14px;font-weight:900;letter-spacing:1px;padding:9px;border:none;border-radius:6px;cursor:pointer;width:100%;display:none;margin-top:6px;}
#iefeedback{font-family:‘Share Tech Mono’,monospace;font-size:10px;color:#00e676;text-align:center;min-height:16px;}

/* notification toast */
#toast{position:fixed;bottom:30px;left:50%;transform:translateX(-50%) translateY(40px);background:#00e676;color:#0a0e14;font-family:‘Barlow Condensed’,sans-serif;font-size:14px;font-weight:700;letter-spacing:1px;padding:9px 20px;border-radius:20px;z-index:9999;opacity:0;transition:opacity .3s,transform .3s;pointer-events:none;}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
#toast.err{background:#ff3d57;color:#fff;}
</style>

</head>

<div id="loading"><div class="spinner"></div><div id="ltxt">SE ÎNCARCĂ...</div></div>

  <div id="tbadge"></div>
  <div id="rlabel"></div>

      <input id="tinput" type="tel" inputmode="numeric" pattern="[0-9]*"

</div>

// LOCAL TRAIN DATABASE — localStorage

var DB_KEY = 'tfc_trains_v1';

function loadDB() {
  try { return JSON.parse(localStorage.getItem(DB_KEY)) || {}; }
  catch(e) { return {}; }
}
function saveDB(db) {
  localStorage.setItem(DB_KEY, JSON.stringify(db));
}

// ══════════════════════════════════════════════════
// COORDS HELPERS
// ══════════════════════════════════════════════════
function norm(n) {
  return (n||'').trim()
    .replace(/[ăÄă]/g,'a').replace(/â/g,'a').replace(/Â/g,'A')
    .replace(/î/g,'i').replace(/Î/g,'I')
    .replace(/[șşŞ]/g,'s').replace(/[Ș]/g,'S')
    .replace(/[țţŢ]/g,'t').replace(/[Ț]/g,'T')
    .replace(/\s+/g,' ').toLowerCase();
}
function getCoords(name) {
  if (!name) return null;
  if (COORDS[name]) return COORDS[name];
  var n = norm(name);
  for (var k in COORDS) { if (norm(k)===n) return COORDS[k]; }
  for (var k in COORDS) {
    var nk=norm(k);
    if (n.indexOf(nk)===0||nk.indexOf(n)===0) return COORDS[k];
  }
  return null;
}

el('tinput').addEventListener('keyup',function(e){if(e.key==='Enter'||e.keyCode===13)doSearch();});

function updateTrainCount() {
  var db=loadDB();
  el('tcnt').textContent=Object.keys(db).length;
}

function doSearch() {
  var no = el('tinput').value.replace(/\D/g,'').trim();
  if (!no) { setMsg('Introdu numărul trenului!',true); return; }
  requestGPS();
  showLoad('CAUT TRENUL '+no+'...');
  setMsg('');

  var db = loadDB();
  var train = db[no];
  if (!train) {
    hideLoad();
    setMsg('Trenul '+no+' nu există în baza de date. Adaugă-l din LIVRETE.',true);
    return;
  }

  var stations = train.stations.map(function(s){
    var c = getCoords(s.name);
    return {
      name: s.name, km: s.km||0,
      arr: s.arr||'', dep: s.dep||'',
      lat: c?c[0]:0, lng: c?c[1]:0,
    };
  });
  G.trainNo = no;
  G.stations = stations;
  G.curIdx = 0;
  hideLoad();
  launchApp();
}

function requestGPS() {
  if (!navigator.geolocation) return;
  navigator.geolocation.getCurrentPosition(
    function(pos){ onPos(pos); },
    function(){},
    {enableHighAccuracy:true, timeout:5000}
  );
}

function launchApp() {
  el('sscreen').style.display='none';
  el('ascreen').style.display='flex';
  el('tbadge').textContent=G.trainNo;
  el('tbadge').style.display='block';
  if (G.stations.length>=2) {
    el('rlabel').textContent=G.stations[0].name+' → '+G.stations[G.stations.length-1].name;
    el('rlabel').style.display='block';
  }
  el('btnchg').style.display='block';
  renderList();
  initMap();
  startGPS();
  updateBanner();
}

function showSearch() {
  el('ascreen').style.display='none';
  el('sscreen').style.display='flex';
  el('tbadge').style.display='none';
  el('rlabel').style.display='none';
  el('btnchg').style.display='none';
  if (G.watchId){navigator.geolocation.clearWatch(G.watchId);G.watchId=null;}
}

function renderList() {
  var list=el('slist'); list.innerHTML='';
  G.stations.forEach(function(st,i){
    var cls='si'+(i<G.curIdx?' passed':i===G.curIdx?' cur':'');
    var div=document.createElement('div');
    div.className=cls; div.id='si'+i;
    var arrH=st.arr?'<div class="silbl">SOS</div><div class="siarr">'+st.arr+'</div>':'';
    var depH=st.dep?'<div class="silbl">PL</div><div class="sidep">'+st.dep+'</div>':'';
    div.innerHTML='<div class="sibar"></div>'+
      '<div class="siinfo"><div class="siname">'+esc(st.name)+'</div>'+
      (st.km?'<div class="sikm">km '+st.km+'</div>':'')+
      '</div><div class="sitimes">'+arrH+depH+'</div>';
    list.appendChild(div);
  });
  scrollToCur();
}

function scrollToCur(){
  var e=el('si'+G.curIdx);
  if(e) e.scrollIntoView({block:'center',behavior:'smooth'});
}

function updateBanner(){
  var next=G.stations[G.curIdx]; if(!next) return;
  el('nname').textContent=next.name;
  el('narr').textContent=next.arr||'—';
  el('ndep').textContent=next.dep||'—';
  if(G.lat&&next.lat&&next.lng){
    el('kmval').textContent=hav(G.lat,G.lng,next.lat,next.lng).toFixed(1);
  } else {
    el('kmval').textContent='—';
  }
}

function startGPS(){
  if(!navigator.geolocation){gpsSet('error','NO GPS');return;}
  gpsSet('','WAIT');
  G.watchId=navigator.geolocation.watchPosition(onPos,function(){gpsSet('error','ERR');},{
    enableHighAccuracy:true,maximumAge:3000,timeout:15000
  });
}

function onPos(pos){
  G.lat=pos.coords.latitude; G.lng=pos.coords.longitude;
  gpsSet('active',Math.round(pos.coords.accuracy)+'m');
  moveMarker(); checkProgress(); updateBanner();
}
function gpsSet(cls,txt){el('gpsdot').className=cls;el('gpstxt').textContent=txt;}

function checkProgress(){
  if(!G.lat||!G.stations.length) return;
  var best=G.curIdx,bestD=Infinity;
  for(var i=G.curIdx;i<G.stations.length;i++){
    var st=G.stations[i];
    if(!st.lat||!st.lng) continue;
    var d=hav(G.lat,G.lng,st.lat,st.lng);
    if(d<bestD){bestD=d;best=i;}
  }
  if(bestD<0.35&&best>=G.curIdx){
    var ni=Math.min(best+1,G.stations.length-1);
    if(ni!==G.curIdx){G.curIdx=ni;renderList();}
  }
}

function initMap(){
  if(G.map){G.map.remove();G.map=null;G.marker=null;G.railLayer=null;}
  G.map=L.map('map',{zoomControl:true,attributionControl:false});
  L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png',{maxZoom:19}).addTo(G.map);
  G.railLayer=L.tileLayer('https://{s}.tiles.openrailwaymap.org/standard/{z}/{x}/{y}.png',{maxZoom:19,opacity:0.8});
  var coords=[];
  G.stations.forEach(function(st){if(st.lat&&st.lng)coords.push([st.lat,st.lng]);});
  if(coords.length>=2){
    var line=L.polyline(coords,{color:'#00c8ff',weight:3,opacity:.7}).addTo(G.map);
    G.map.fitBounds(line.getBounds(),{padding:[24,24]});
  } else { G.map.setView([45.9,24.9],7); }
  G.stations.forEach(function(st,i){
    if(!st.lat||!st.lng) return;
    var isF=i===0,isL=i===G.stations.length-1;
    L.circleMarker([st.lat,st.lng],{
      radius:(isF||isL)?7:4,
      color:isF?'#00e676':isL?'#ff3d57':'#00c8ff',
      fillColor:isF?'#00e676':isL?'#ff3d57':'#0a0e14',
      fillOpacity:1,weight:2
    }).addTo(G.map).bindPopup('<b>'+esc(st.name)+'</b><br>'+(st.arr||'')+(st.dep?' / '+st.dep:''));
  });
}

function toggleRailLayer(){
  if(!G.map) return;
  G.railOn=!G.railOn;
  var btn=el('maptoggle');
  if(G.railOn){G.railLayer.addTo(G.map);btn.textContent='🗺 DARK';btn.classList.add('rail');}
  else{G.map.removeLayer(G.railLayer);btn.textContent='🛤 CFR';btn.classList.remove('rail');}
}

function moveMarker(){
  if(!G.map||!G.lat) return;
  var pos=[G.lat,G.lng];
  if(!G.marker){
    var icon=L.divIcon({
      html:'<div style="width:18px;height:18px;background:#ff6b35;border:3px solid #fff;border-radius:50%;box-shadow:0 0 14px #ff6b35;"></div>',
      iconSize:[18,18],iconAnchor:[9,9],className:''
    });
    G.marker=L.marker(pos,{icon:icon,zIndexOffset:1000}).addTo(G.map);
  } else { G.marker.setLatLng(pos); }
  G.map.panTo(pos,{animate:true,duration:1});
}

function hav(lat1,lng1,lat2,lng2){
  var R=6371,dL=(lat2-lat1)*Math.PI/180,dG=(lng2-lng1)*Math.PI/180;
  var a=Math.sin(dL/2)*Math.sin(dL/2)+Math.cos(lat1*Math.PI/180)*Math.cos(lat2*Math.PI/180)*Math.sin(dG/2)*Math.sin(dG/2);
  return R*2*Math.atan2(Math.sqrt(a),Math.sqrt(1-a));
}
function esc(s){return(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}

// ── Render saved trains ──
function renderTrainList() {
  var db=loadDB();
  var list=el('trainlist');
  var keys=Object.keys(db).sort(function(a,b){return parseInt(a)-parseInt(b);});
  if (!keys.length) {
    list.innerHTML='<div style="font-family:Share Tech Mono,monospace;font-size:11px;color:#2a3d55;text-align:center;padding:32px 0;">Nu există trenuri salvate.<br>Adaugă primul tren din tabul ADAUGĂ TREN.</div>';
    return;
  }
  list.innerHTML='';
  keys.forEach(function(no){
    var t=db[no];
    var first=t.stations&&t.stations[0]?t.stations[0].name:'?';
    var last=t.stations&&t.stations.length>1?t.stations[t.stations.length-1].name:'?';
    var div=document.createElement('div');
    div.className='titem';
    div.innerHTML=
      '<div class="tino">'+esc(no)+'</div>'+
      '<div class="tiroute">'+
        '<div>'+(t.name?esc(t.name):(esc(first)+' → '+esc(last)))+'</div>'+
        '<div class="tistops">'+(t.stations?t.stations.length:0)+' stații</div>'+
      '</div>'+
      '<button class="tidel" title="Șterge" onclick="deleteTrain(\''+no+'\',event)">✕</button>';
    div.addEventListener('click',function(){
      closeLivrete();
      el('tinput').value=no;
      doSearch();
    });
    list.appendChild(div);
  });
}

function deleteTrain(no,e) {
  e.stopPropagation();
  if (!confirm('Ștergi trenul '+no+'?')) return;
  var db=loadDB();
  delete db[no];
  saveDB(db);
  renderTrainList();
  showToast('Trenul '+no+' șters.');
}

// ── Parse station lines ──
function parseStationLines(text) {
  var lines = text.split('\n');
  var stations = [];
  var kmCounter = 0;
  lines.forEach(function(line) {
    line = line.trim();
    if (!line) return;
    // Extract times: HH:MM patterns
    var times = [];
    var timeRe = /(\d{1,2}:\d{2})/g;
    var m;
    while ((m=timeRe.exec(line))!==null) times.push(m[1]);
    // Remove times from line to get station name
    var name = line.replace(/\d{1,2}:\d{2}/g,'').replace(/[-–—]/g,' ').replace(/\s+/g,' ').trim();
    // Remove leading/trailing km if present (number at start or end)
    name = name.replace(/^\d+\s*/,'').replace(/\s*\d+$/,'').trim();
    if (!name) return;
    var st = { name: name, km: 0, arr: '', dep: '' };
    if (times.length>=2) { st.arr=times[0]; st.dep=times[1]; }
    else if (times.length===1) { st.dep=times[0]; }
    stations.push(st);
  });
  return stations;
}

// ── Add train manually ──
function addTrainManual() {
  var no = el('f-no').value.replace(/\D/g,'').trim();
  var name = el('f-name').value.trim();
  var raw = el('stationsarea').value.trim();
  if (!no) { showToast('Introdu numărul trenului!',true); return; }
  if (!raw) { showToast('Adaugă cel puțin o stație!',true); return; }
  var stations = parseStationLines(raw);
  if (stations.length < 2) { showToast('Trebuie cel puțin 2 stații!',true); return; }
  var db = loadDB();
  db[no] = { name: name||'', stations: stations, updated: new Date().toISOString() };
  saveDB(db);
  el('f-no').value='';
  el('f-name').value='';
  el('stationsarea').value='';
  showToast('Trenul '+no+' salvat! ('+stations.length+' stații)');
  switchTab('tab-trains');
  renderTrainList();
}

var pdfExtractedText = '';

function pdfDrag(e,on){

function pdfDrop(e){
  e.preventDefault();
  el('pdfzone').classList.remove('drag');

}

function pdfPicked(files) {
  if (!files||!files.length) return;
  var file=files[0];
  if (!file.type.match('pdf') && !file.name.toLowerCase().endsWith('.pdf')) {
    showToast('Selectează un fișier PDF!',true);
    return;
  }
  el('pdftxt').textContent='SE PROCESEAZĂ '+file.name+'...';
  el('pdfsub').textContent='';
  el('pdfresult').style.display='none';
  el('pdfbtns').style.display='none';
  el('pdffeedback').textContent='';

  // Use FileReader + PDF.js CDN
  var reader = new FileReader();
  reader.onload = function(ev) {
    loadPdfJs(function() {
      extractPdfText(ev.target.result, file.name);
    });
  };
  reader.readAsArrayBuffer(file);
}

var pdfJsLoaded = false;
function loadPdfJs(cb) {
  if (pdfJsLoaded) { cb(); return; }
  var s = document.createElement('script');
  s.src = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js';
  s.onload = function() {
    pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';
    pdfJsLoaded = true;
    cb();
  };
  s.onerror = function() {
    el('pdftxt').textContent='EROARE: Nu s-a putut încărca PDF.js';
    showToast('Eroare la încărcare PDF.js',true);
  };
  document.head.appendChild(s);
}

function extractPdfText(arrayBuffer, filename) {
  var typedArray = new Uint8Array(arrayBuffer);
  pdfjsLib.getDocument({data: typedArray}).promise.then(function(pdf) {
    var totalPages = pdf.numPages;
    var textParts = [];
    var pagesDone = 0;

    for (var i = 1; i <= totalPages; i++) {
      (function(pageNum) {
        pdf.getPage(pageNum).then(function(page) {
          page.getTextContent().then(function(tc) {
            var pageText = tc.items.map(function(item) {
              return item.str;
            }).join(' ');
            textParts[pageNum-1] = pageText;
            pagesDone++;
            if (pagesDone === totalPages) {
              var fullText = textParts.join('\n');
              pdfExtractedText = fullText;
              el('pdfresult').textContent = fullText;
              el('pdfresult').style.display = 'block';
              el('pdfbtns').style.display = 'flex';
              el('pdftxt').textContent = '✓ ' + filename;
              el('pdfsub').textContent = totalPages + ' pagini • ' + fullText.length + ' caractere extrase';
              el('pdffeedback').textContent = '✓ Text extras cu succes!';
            }
          });
        });
      })(i);
    }
  }).catch(function(err) {
    el('pdftxt').textContent = 'EROARE la procesare PDF';
    el('pdfsub').textContent = err.message;
    showToast('Eroare PDF: '+err.message, true);
  });
}

function copyPdfText() {
  if (!pdfExtractedText) return;
  navigator.clipboard.writeText(pdfExtractedText).then(function(){
    showToast('Text copiat în clipboard!');
    el('pdffeedback').textContent='✓ Copiat!';
  }).catch(function(){
    // fallback
    var ta=document.createElement('textarea');
    ta.value=pdfExtractedText;
    document.body.appendChild(ta);
    ta.select();
    document.execCommand('copy');
    document.body.removeChild(ta);
    showToast('Text copiat!');
  });
}

function pastePdfToForm() {
  if (!pdfExtractedText) return;
  el('stationsarea').value = pdfExtractedText;
  switchTab('tab-add');
  showToast('Text pasat în formular. Curăță-l și salvează.');
}

// IMPORT / EXPORT
// ══════════════════════════════════════════════════
function exportDB() {
  var db=loadDB();
  var json=JSON.stringify(db,null,2);
  var blob=new Blob([json],{type:'application/json'});
  var url=URL.createObjectURL(blob);
  var a=document.createElement('a');
  a.href=url; a.download='tfc-trains-'+new Date().toISOString().slice(0,10)+'.json';
  a.click();
  URL.revokeObjectURL(url);
  showToast('Exportat '+Object.keys(db).length+' trenuri.');
}

var importVisible=false;
function toggleImport(){
  importVisible=!importVisible;
  el('importarea').style.display=importVisible?'block':'none';
  el('btnimportgo').style.display=importVisible?'block':'none';
}

function doImport(){
  var raw=el('importarea').value.trim();
  if(!raw){showToast('Lipești JSON-ul mai întâi!',true);return;}
  try {
    var data=JSON.parse(raw);
    var db=loadDB();
    var cnt=0;
    Object.keys(data).forEach(function(no){
      db[no]=data[no]; cnt++;
    });
    saveDB(db);
    el('importarea').value='';
    importVisible=false;
    el('importarea').style.display='none';
    el('btnimportgo').style.display='none';
    el('iefeedback').textContent='✓ Importate '+cnt+' trenuri!';
    showToast('Importate '+cnt+' trenuri!');
    setTimeout(function(){el('iefeedback').textContent='';},3000);
  } catch(e) {
    showToast('JSON invalid: '+e.message,true);
  }
}

function clearAll(){
  if(!confirm('Ștergi TOATE trenurile din baza de date? Acțiune ireversibilă!')) return;
  saveDB({});
  showToast('Baza de date ștearsă.');
  el('iefeedback').textContent='✓ Baza de date curățată.';
  setTimeout(function(){el('iefeedback').textContent='';},3000);
}
