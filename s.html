<!DOCTYPE html>
<html lang="ro">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EMX Arhivă · Programe Lucru</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
<style>
  :root{
    --bg:#0a0d10;
    --panel:#11161b;
    --panel-2:#161d24;
    --line:#232c34;
    --amber:#ffb020;
    --amber-dim:#8a611c;
    --red:#ff5252;
    --green:#34d399;
    --text:#e7ecef;
    --muted:#7c8a94;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    background:
      radial-gradient(ellipse at top, #10151a 0%, var(--bg) 55%),
      repeating-linear-gradient(180deg, rgba(255,255,255,0.015) 0px, rgba(255,255,255,0.015) 1px, transparent 1px, transparent 3px);
    color:var(--text);
    font-family:'JetBrains Mono', monospace;
    min-height:100vh;
    padding-bottom:60px;
  }
  h1,h2,h3,.display{font-family:'Oswald',sans-serif; letter-spacing:0.03em; text-transform:uppercase;}

  /* ---- Header: split-flap departure board ---- */
  .board{
    border-bottom:1px solid var(--line);
    background:linear-gradient(180deg, #0d1216, #0a0d10);
    padding:22px 24px 18px;
    position:sticky; top:0; z-index:20;
    backdrop-filter:blur(6px);
  }
  .board-top{display:flex; align-items:baseline; justify-content:space-between; flex-wrap:wrap; gap:8px;}
  .board-title{font-size:22px; font-weight:700; color:var(--amber); display:flex; align-items:center; gap:10px;}
  .board-title .dot{width:9px;height:9px;border-radius:50%;background:var(--green); box-shadow:0 0 8px var(--green); display:inline-block;}
  .board-sub{color:var(--muted); font-size:11px; letter-spacing:0.12em;}

  .tabs{display:flex; gap:2px; margin-top:16px; border:1px solid var(--line); border-radius:4px; overflow:hidden; width:fit-content;}
  .tab{
    padding:10px 20px; cursor:pointer; font-family:'Oswald',sans-serif; font-weight:600;
    font-size:13px; letter-spacing:0.08em; text-transform:uppercase; color:var(--muted);
    background:var(--panel); border-right:1px solid var(--line); user-select:none;
    transition:background .15s, color .15s;
  }
  .tab:last-child{border-right:none;}
  .tab:hover{color:var(--text); background:var(--panel-2);}
  .tab.active{color:#0a0d10; background:var(--amber);}

  main{max-width:1100px; margin:0 auto; padding:24px;}

  /* ---- Upload panel ---- */
  .card{
    background:var(--panel); border:1px solid var(--line); border-radius:6px; padding:18px 20px; margin-bottom:18px;
  }
  .row{display:flex; gap:12px; flex-wrap:wrap; align-items:flex-end;}
  label{display:block; font-size:10px; color:var(--muted); text-transform:uppercase; letter-spacing:0.1em; margin-bottom:6px;}
  input[type=text], input[type=month]{
    background:#0d1216; border:1px solid var(--line); color:var(--text); padding:9px 10px; border-radius:4px;
    font-family:'JetBrains Mono',monospace; font-size:13px; min-width:160px;
  }
  input[type=text]:focus, input[type=month]:focus{outline:1px solid var(--amber); border-color:var(--amber);}
  .btn{
    background:var(--amber); color:#0a0d10; border:none; padding:10px 18px; border-radius:4px;
    font-family:'Oswald',sans-serif; font-weight:600; letter-spacing:0.06em; text-transform:uppercase; font-size:12px;
    cursor:pointer; transition:filter .15s;
  }
  .btn:hover{filter:brightness(1.1);}
  .btn.ghost{background:transparent; border:1px solid var(--line); color:var(--muted);}
  .btn.ghost:hover{color:var(--red); border-color:var(--red);}
  .btn:disabled{opacity:.4; cursor:not-allowed;}
  .file-input-wrap{position:relative;}
  input[type=file]{
    font-family:'JetBrains Mono',monospace; font-size:12px; color:var(--muted);
    max-width:260px;
  }

  .hint{color:var(--muted); font-size:11px; margin-top:8px; line-height:1.5;}
  .status{font-size:12px; margin-top:10px; color:var(--amber); min-height:16px;}

  /* ---- Document list ---- */
  .doc-list{display:flex; flex-direction:column; gap:8px;}
  .doc-item{
    display:flex; align-items:center; justify-content:space-between; gap:10px;
    background:var(--panel); border:1px solid var(--line); border-radius:5px; padding:12px 16px;
    cursor:pointer; transition:border-color .15s, background .15s;
  }
  .doc-item:hover{border-color:var(--amber-dim); background:var(--panel-2);}
  .doc-item.selected{border-color:var(--amber);}
  .doc-name{font-weight:500; font-size:13.5px;}
  .doc-meta{color:var(--muted); font-size:11px; margin-top:3px;}
  .doc-actions{display:flex; gap:8px; align-items:center;}
  .empty{color:var(--muted); font-size:13px; padding:20px 4px; text-align:center;}

  /* ---- Search ---- */
  .search-bar{display:flex; gap:10px; flex-wrap:wrap; align-items:flex-end;}
  .search-note{font-size:11px; color:var(--muted); margin-top:10px; line-height:1.5; border-left:2px solid var(--amber-dim); padding-left:10px;}

  /* ---- Blocks / results ---- */
  .block{
    background:var(--panel); border:1px solid var(--line); border-radius:6px; margin-bottom:14px; overflow:hidden;
  }
  .block.match{border-color:var(--amber);}
  .block-head{
    display:flex; justify-content:space-between; align-items:center;
    padding:10px 16px; background:var(--panel-2); border-bottom:1px solid var(--line);
  }
  .block-name{font-family:'Oswald',sans-serif; font-weight:600; letter-spacing:0.03em; font-size:14px; color:var(--amber);}
  .block-idx{color:var(--muted); font-size:11px;}
  .block-body{padding:12px 16px;}
  .day-header{
    font-size:10.5px; color:var(--muted); white-space:pre-wrap; word-break:break-all; margin-bottom:8px;
    border-bottom:1px dashed var(--line); padding-bottom:8px;
  }
  .day-header .day-flag{color:var(--amber); font-weight:700;}
  .raw-text{
    font-size:11.5px; line-height:1.7; white-space:pre-wrap; word-break:break-all; color:#c7d0d6; max-height:260px; overflow:auto;
  }
  .raw-text mark{background:var(--amber); color:#0a0d10; padding:0 2px; border-radius:2px;}
  .toggle-raw{font-size:10px; color:var(--muted); cursor:pointer; text-decoration:underline; margin-top:8px; display:inline-block;}

  .back-link{color:var(--muted); font-size:12px; cursor:pointer; margin-bottom:14px; display:inline-block;}
  .back-link:hover{color:var(--amber);}

  .section-title{font-size:12px; color:var(--muted); text-transform:uppercase; letter-spacing:0.1em; margin:26px 0 10px;}

  ::-webkit-scrollbar{width:8px; height:8px;}
  ::-webkit-scrollbar-thumb{background:var(--line); border-radius:4px;}
</style>
</head>
<body>

<div class="board">
  <div class="board-top">
    <div class="board-title"><span class="dot"></span>EMX ARHIVĂ · PROGRAME LUCRU</div>
    <div class="board-sub">STOCARE PERSISTENTĂ &nbsp;·&nbsp; CĂUTARE PE COD</div>
  </div>
  <div class="tabs" id="tabs">
    <div class="tab active" data-cat="conductori">Șefi Tren / Vânzători Bilete</div>
    <div class="tab" data-cat="mecanici">Mecanici</div>
  </div>
</div>

<main id="app"></main>

<script>
const CATS = {
  conductori: "Șefi Tren / Vânzători Bilete",
  mecanici: "Mecanici"
};
let state = {
  category: 'conductori',
  view: 'list', // 'list' | 'detail'
  openDocId: null,
  docsMeta: { conductori: [], mecanici: [] },
  query: '',
  dayQuery: ''
};

pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

function uid(){ return 'doc_' + Date.now() + '_' + Math.random().toString(36).slice(2,8); }

async function loadMeta(cat){
  try{
    const r = await window.storage.get('docs-meta:' + cat, false);
    state.docsMeta[cat] = r ? JSON.parse(r.value) : [];
  }catch(e){
    state.docsMeta[cat] = [];
  }
}

async function saveMeta(cat){
  await window.storage.set('docs-meta:' + cat, JSON.stringify(state.docsMeta[cat]), false);
}

async function loadAllMeta(){
  await loadMeta('conductori');
  await loadMeta('mecanici');
}

function setTabHandlers(){
  document.querySelectorAll('.tab').forEach(t=>{
    t.onclick = ()=>{
      state.category = t.dataset.cat;
      state.view='list'; state.openDocId=null; state.query=''; state.dayQuery='';
      document.querySelectorAll('.tab').forEach(x=>x.classList.remove('active'));
      t.classList.add('active');
      render();
    };
  });
}

async function extractPdfText(file){
  const buf = await file.arrayBuffer();
  const pdf = await pdfjsLib.getDocument({data: buf}).promise;
  let full = '';
  for(let i=1;i<=pdf.numPages;i++){
    const page = await pdf.getPage(i);
    const content = await page.getTextContent();
    const lines = {};
    content.items.forEach(item=>{
      const y = Math.round(item.transform[5]);
      if(!lines[y]) lines[y]=[];
      lines[y].push(item.str);
    });
    const ys = Object.keys(lines).map(Number).sort((a,b)=>b-a);
    ys.forEach(y=>{ full += lines[y].join(' ') + '\n'; });
    full += '\n';
  }
  return full;
}

// Split raw text into per-employee blocks using the recurring
// "Nume Data 1 2 3 ..." header row, or the "Nr Nume Data" variant used
// in the mecanici sheet.
function splitBlocks(rawText){
  const lines = rawText.split('\n');
  const headerRe = /^(Nr\s+)?Nume\s+Data(\s+\d+){5,}/;
  const dayRowRe = /^(Nr\s+)?Nume\s+Data\s+((\d+\s*)+)/;
  let blocks = [];
  let current = null;
  lines.forEach(line=>{
    const trimmed = line.trim();
    if(headerRe.test(trimmed)){
      if(current) blocks.push(current);
      const m = trimmed.match(dayRowRe);
      current = { dayHeader: m ? m[2].trim() : '', lines: [] };
    } else if(current){
      current.lines.push(line);
    }
  });
  if(current) blocks.push(current);

  // Guess employee name: look for a line ending in "Festive" (surname line),
  // the line right after it usually holds the first name.
  return blocks.map((b, idx)=>{
    const text = b.lines.join('\n');
    let surname = '', firstname = '';
    for(let i=0;i<b.lines.length;i++){
      if(/Festive\s*$/.test(b.lines[i].trim())){
        const tok = b.lines[i].trim().match(/^([A-ZĂÂÎȘȚ][A-ZĂÂÎȘȚ\-]{1,})\b/);
        if(tok) surname = tok[1];
        if(b.lines[i+1]){
          const tok2 = b.lines[i+1].trim().replace(/^\d+\s+/, '').match(/^([A-ZĂÂÎȘȚ][a-zA-ZĂÂÎȘȚăâîșț\-]{1,})\b/);
          if(tok2) firstname = tok2[1];
        }
        break;
      }
    }
    const name = (surname || firstname) ? `${surname} ${firstname}`.trim() : `Bloc ${idx+1} (nume neidentificat)`;
    return { id: idx, name, dayHeader: b.dayHeader, text };
  }).filter(b => b.text.trim().length > 0);
}

async function handleUpload(cat, file, month){
  const statusEl = document.getElementById('upload-status');
  if(!file){ statusEl.textContent = 'Alege un fișier PDF.'; return; }
  statusEl.textContent = 'Se extrage textul din PDF...';
  try{
    const text = await extractPdfText(file);
    const id = uid();
    await window.storage.set('doc-content:' + id, text, false);
    const meta = {
      id, filename: file.name, month: month || '', uploadedAt: new Date().toISOString()
    };
    state.docsMeta[cat].unshift(meta);
    await saveMeta(cat);
    statusEl.textContent = `Salvat: ${file.name}`;
    render();
  }catch(e){
    console.error(e);
    statusEl.textContent = 'Eroare la citirea PDF-ului: ' + e.message;
  }
}

async function deleteDoc(cat, id){
  if(!confirm('Ștergi definitiv acest program?')) return;
  state.docsMeta[cat] = state.docsMeta[cat].filter(d=>d.id!==id);
  await saveMeta(cat);
  await window.storage.delete('doc-content:' + id, false).catch(()=>{});
  if(state.openDocId===id){ state.view='list'; state.openDocId=null; }
  render();
}

function escapeHtml(s){
  return s.replace(/[&<>]/g, c=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[c]));
}

function highlight(text, query){
  if(!query) return escapeHtml(text);
  const esc = escapeHtml(text);
  const safeQ = query.replace(/[.*+?^${}()|[\]\\]/g,'\\$&');
  return esc.replace(new RegExp('('+safeQ+')','gi'), '<mark>$1</mark>');
}

function dayHeaderHtml(dayHeader, dayQuery){
  if(!dayHeader) return '';
  const nums = dayHeader.split(/\s+/).filter(Boolean);
  const html = nums.map(n=>{
    if(dayQuery && n === String(parseInt(dayQuery,10))){
      return `<span class="day-flag">[${n}]</span>`;
    }
    return n;
  }).join(' ');
  return `<div class="day-header">Antet zile (cap tabel): ${html}</div>`;
}

async function renderDetail(cat, doc){
  const container = document.getElementById('app');
  let rawText = '';
  try{
    const r = await window.storage.get('doc-content:' + doc.id, false);
    rawText = r ? r.value : '';
  }catch(e){ rawText = ''; }

  const blocks = splitBlocks(rawText);

  container.innerHTML = `
    <span class="back-link" id="back-btn">&larr; înapoi la listă</span>
    <h2 style="margin:4px 0 2px;">${escapeHtml(doc.filename)}</h2>
    <div class="doc-meta" style="margin-bottom:16px;">${CATS[cat]} ${doc.month ? '· ' + escapeHtml(doc.month) : ''} · încărcat ${new Date(doc.uploadedAt).toLocaleDateString('ro-RO')}</div>

    <div class="card">
      <div class="search-bar">
        <div>
          <label>Cod (ex. 16565)</label>
          <input type="text" id="q-code" placeholder="cod / nume" value="${escapeHtml(state.query)}">
        </div>
        <div>
          <label>Zi (1-31, opțional)</label>
          <input type="text" id="q-day" placeholder="ex. 15" value="${escapeHtml(state.dayQuery)}" style="min-width:80px;">
        </div>
        <button class="btn" id="search-btn">Caută</button>
        <button class="btn ghost" id="clear-btn">Șterge filtrul</button>
      </div>
      <div class="search-note">
        Ziua căutată este doar evidențiată în antetul de zile al fiecărui bloc (nu poate fi aliniată exact
        pe coloană, fiindcă PDF-ul nu păstrează poziția coloanelor la extragerea textului) —
        verifică vizual poziția codului față de ziua marcată.
      </div>
    </div>

    <div id="blocks-container"></div>
  `;

  document.getElementById('back-btn').onclick = ()=>{ state.view='list'; state.openDocId=null; render(); };
  document.getElementById('search-btn').onclick = ()=>{
    state.query = document.getElementById('q-code').value.trim();
    state.dayQuery = document.getElementById('q-day').value.trim();
    renderBlocks(blocks);
  };
  document.getElementById('clear-btn').onclick = ()=>{
    state.query=''; state.dayQuery='';
    document.getElementById('q-code').value='';
    document.getElementById('q-day').value='';
    renderBlocks(blocks);
  };
  ['q-code','q-day'].forEach(id=>{
    document.getElementById(id).addEventListener('keydown', e=>{
      if(e.key==='Enter') document.getElementById('search-btn').click();
    });
  });

  renderBlocks(blocks);
}

function renderBlocks(blocks){
  const holder = document.getElementById('blocks-container');
  const q = state.query.trim();
  const dq = state.dayQuery.trim();

  let list = blocks;
  if(q){
    list = blocks.filter(b => b.text.toLowerCase().includes(q.toLowerCase()) || b.name.toLowerCase().includes(q.toLowerCase()));
  }

  if(list.length === 0){
    holder.innerHTML = `<div class="empty">Niciun rezultat pentru „${escapeHtml(q)}”.</div>`;
    return;
  }

  holder.innerHTML = `<div class="section-title">${q ? list.length + ' rezultat(e) găsite' : blocks.length + ' angajați în acest fișier'}</div>` +
    list.map((b, i)=>`
      <div class="block ${q ? 'match':''}">
        <div class="block-head">
          <div class="block-name">${escapeHtml(b.name)}</div>
          <div class="block-idx">#${i+1}</div>
        </div>
        <div class="block-body">
          ${dayHeaderHtml(b.dayHeader, dq)}
          <div class="raw-text">${highlight(b.text, q)}</div>
        </div>
      </div>
    `).join('');
}

function renderList(){
  const container = document.getElementById('app');
  const cat = state.category;
  const docs = state.docsMeta[cat] || [];

  container.innerHTML = `
    <h2 style="margin:0 0 4px;">${CATS[cat]}</h2>
    <div class="doc-meta" style="margin-bottom:16px;">Fișierele rămân aici până le ștergi tu.</div>

    <div class="card">
      <div class="row">
        <div>
          <label>Fișier PDF</label>
          <input type="file" id="file-input" accept="application/pdf">
        </div>
        <div>
          <label>Lună / an (etichetă)</label>
          <input type="text" id="month-input" placeholder="ex. Iulie 2026">
        </div>
        <button class="btn" id="upload-btn">Încarcă</button>
      </div>
      <div class="hint">Se extrage textul din PDF direct în browser și rămâne salvat aici — nu se re-încarcă fișierul de fiecare dată.</div>
      <div class="status" id="upload-status"></div>
    </div>

    <div class="section-title">Programe salvate</div>
    <div class="doc-list" id="doc-list">
      ${docs.length === 0 ? '<div class="empty">Niciun program încărcat încă pentru această categorie.</div>' :
        docs.map(d=>`
          <div class="doc-item" data-id="${d.id}">
            <div>
              <div class="doc-name">${escapeHtml(d.filename)}</div>
              <div class="doc-meta">${d.month ? escapeHtml(d.month) + ' · ' : ''}încărcat ${new Date(d.uploadedAt).toLocaleDateString('ro-RO')}</div>
            </div>
            <div class="doc-actions">
              <button class="btn ghost" data-del="${d.id}">Șterge</button>
            </div>
          </div>
        `).join('')
      }
    </div>
  `;

  document.getElementById('upload-btn').onclick = ()=>{
    const file = document.getElementById('file-input').files[0];
    const month = document.getElementById('month-input').value.trim();
    handleUpload(cat, file, month);
  };

  document.querySelectorAll('.doc-item').forEach(el=>{
    el.addEventListener('click', (e)=>{
      if(e.target.closest('[data-del]')) return;
      state.view='detail';
      state.openDocId = el.dataset.id;
      state.query=''; state.dayQuery='';
      render();
    });
  });
  document.querySelectorAll('[data-del]').forEach(btn=>{
    btn.addEventListener('click', (e)=>{
      e.stopPropagation();
      deleteDoc(cat, btn.dataset.del);
    });
  });
}

async function render(){
  if(state.view==='detail' && state.openDocId){
    const doc = (state.docsMeta[state.category]||[]).find(d=>d.id===state.openDocId);
    if(doc){ await renderDetail(state.category, doc); return; }
    state.view='list';
  }
  renderList();
}

(async function init(){
  setTabHandlers();
  await loadAllMeta();
  render();
})();
</script>
</body>
</html>
