<!DOCTYPE html>
<html lang="ro">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EMX Fluturas</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0d0f14;
    --surface: #161922;
    --surface2: #1e2330;
    --border: #2a3044;
    --accent: #f0c040;
    --accent2: #3de8b0;
    --accent3: #ff6b6b;
    --text: #e8ecf5;
    --muted: #6b7594;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Mono', monospace;
    min-height: 100vh;
    padding: 24px 16px 60px;
  }
  .header {
    text-align: center;
    margin-bottom: 32px;
    padding-top: 8px;
  }
  .header h1 {
    font-family: 'Syne', sans-serif;
    font-weight: 800;
    font-size: clamp(26px, 6vw, 42px);
    color: var(--accent);
    letter-spacing: -1px;
  }
  .container {
    max-width: 720px;
    margin: 0 auto;
    display: flex;
    flex-direction: column;
    gap: 14px;
  }
  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 18px 20px;
  }
  .card-title {
    font-family: 'Syne', sans-serif;
    font-weight: 700;
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 2.5px;
    color: var(--muted);
    margin-bottom: 14px;
    padding-bottom: 10px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .card-title .dot { width:6px;height:6px;border-radius:50%;background:var(--accent);flex-shrink:0; }
  .dot-green { background: var(--accent2) !important; }
  .dot-red   { background: var(--accent3) !important; }
  .dot-blue  { background: #6b9fff !important; }

  .grid { display:grid; grid-template-columns:1fr 1fr; gap:10px; }
  @media(max-width:480px){ .grid{ grid-template-columns:1fr; } }
  .field { display:flex; flex-direction:column; gap:5px; }

  label {
    font-size: 10px; color: var(--muted);
    letter-spacing: 0.8px; text-transform: uppercase;
    display: flex; align-items: center; flex-wrap: wrap; gap: 4px;
  }
  .badge {
    font-size: 9px; padding: 1px 5px; border-radius: 4px;
    letter-spacing: 0.2px; font-family: 'DM Mono', monospace;
  }
  .by { background:rgba(240,192,64,0.15); color:var(--accent); border:1px solid rgba(240,192,64,0.25); }
  .bg { background:rgba(61,232,176,0.1);  color:var(--accent2);border:1px solid rgba(61,232,176,0.2); }
  .br { background:rgba(255,107,107,0.1); color:var(--accent3);border:1px solid rgba(255,107,107,0.2); }

  .input-wrap { position:relative; }
  .input-unit {
    position:absolute; right:12px; top:50%; transform:translateY(-50%);
    font-size:11px; color:var(--muted); pointer-events:none;
  }
  input[type="number"] {
    background:var(--surface2); border:1px solid var(--border); border-radius:8px;
    color:var(--text); font-family:'DM Mono',monospace; font-size:15px;
    padding:9px 44px 9px 12px; width:100%; outline:none;
    -moz-appearance:textfield; transition:border-color .2s,box-shadow .2s;
  }
  input::-webkit-inner-spin-button,input::-webkit-outer-spin-button{-webkit-appearance:none;}
  input:focus { border-color:var(--accent); box-shadow:0 0 0 3px rgba(240,192,64,0.08); }

  .info-box {
    font-size:11px; color:var(--muted); margin-top:8px;
    padding:8px 10px; background:var(--surface2);
    border-radius:6px; border:1px solid var(--border); line-height:1.7;
  }
  .info-box .y { color:var(--accent); font-weight:500; }
  .info-box .g { color:var(--accent2); font-weight:500; }
  .info-box .r { color:var(--accent3); font-weight:500; }

  /* Breakdown */
  .breakdown { display:flex; flex-direction:column; }
  .brow {
    display:flex; justify-content:space-between; align-items:center;
    padding:8px 0; border-bottom:1px solid var(--border);
    font-size:12px; gap:8px;
  }
  .brow:last-child { border-bottom:none; }
  .brow .lbl { color:var(--muted); flex:1; line-height:1.5; }
  .brow .val { font-weight:500; white-space:nowrap; }
  .brow.sep {
    border-top:1px solid var(--border); margin-top:4px;
    padding-top:10px; border-bottom:none;
  }
  .brow.sep .lbl {
    font-family:'Syne',sans-serif; font-size:11px; font-weight:700;
    color:var(--text); text-transform:uppercase; letter-spacing:1px;
  }
  .brow.sep2 {
    border-top:1px solid rgba(255,107,107,0.3); margin-top:4px;
    padding-top:10px; border-bottom:none;
  }
  .brow.sep2 .lbl {
    font-family:'Syne',sans-serif; font-size:11px; font-weight:700;
    color:var(--accent3); text-transform:uppercase; letter-spacing:1px;
  }
  .brow.grand {
    border-top:2px solid rgba(61,232,176,0.4); margin-top:4px;
    padding-top:12px; border-bottom:none;
  }
  .brow.grand .lbl {
    font-family:'Syne',sans-serif; font-size:12px; font-weight:800;
    color:var(--accent2); text-transform:uppercase; letter-spacing:1px;
  }

  /* Result boxes */
  .result-grid { display:grid; grid-template-columns:1fr 1fr; gap:14px; }
  @media(max-width:480px){ .result-grid{ grid-template-columns:1fr; } }

  .result-box {
    border-radius:12px; padding:22px 18px;
    display:flex; flex-direction:column; align-items:center;
    gap:6px; text-align:center;
  }
  .result-box.avans {
    background:linear-gradient(135deg,#1e2330,#1a1f2c);
    border:2px solid var(--accent);
    box-shadow:0 0 28px rgba(240,192,64,0.12);
  }
  .result-box.lichidare {
    background:linear-gradient(135deg,#161f1e,#131c1b);
    border:2px solid var(--accent2);
    box-shadow:0 0 28px rgba(61,232,176,0.10);
  }
  .rb-label {
    font-family:'Syne',sans-serif; font-size:10px;
    font-weight:700; text-transform:uppercase; letter-spacing:2px;
  }
  .result-box.avans .rb-label     { color:var(--accent); }
  .result-box.lichidare .rb-label { color:var(--accent2); }
  .rb-amount {
    font-family:'Syne',sans-serif; font-weight:800;
    font-size:clamp(26px,6vw,40px); line-height:1; letter-spacing:-1px;
  }
  .result-box.avans .rb-amount     { color:var(--accent); }
  .result-box.lichidare .rb-amount { color:var(--accent2); }
  .rb-sub { font-size:10px; color:var(--muted); margin-top:2px; line-height:1.6; }
</style>
</head>
<body>

<div class="header"><h1>EMX FLUTURAS</h1></div>

<div class="container">

  <!-- SALARIU & NORMA -->
  <div class="card">
    <div class="card-title"><span class="dot"></span> Salariu & Normă</div>
    <div class="grid">
      <div class="field">
        <label>Salariu de încadrare</label>
        <div class="input-wrap">
          <input type="number" id="salariuBaza" value="8500" min="0" oninput="calculeaza()">
          <span class="input-unit">RON</span>
        </div>
      </div>
      <div class="field">
        <label>Normă ore / lună</label>
        <div class="input-wrap">
          <input type="number" id="normaOre" value="168" min="1" oninput="calculeaza()">
          <span class="input-unit">ore</span>
        </div>
      </div>
    </div>
    <div class="info-box" id="tarifInfo">—</div>
  </div>

  <!-- ORE LUCRATE -->
  <div class="card">
    <div class="card-title"><span class="dot dot-green"></span> Ore lucrate</div>
    <div class="grid">

      <div class="field">
        <label>Ore normale</label>
        <div class="input-wrap">
          <input type="number" id="oreNormale" value="0" min="0" oninput="calculeaza()">
          <span class="input-unit">ore</span>
        </div>
      </div>

      <div class="field">
        <label>Ore suplimentare <span class="badge by">×1.75</span></label>
        <div class="input-wrap">
          <input type="number" id="oreSuplim" value="0" min="0" oninput="calculeaza()">
          <span class="input-unit">ore</span>
        </div>
      </div>

      <div class="field">
        <label>Ore festive <span class="badge bg">tarif normal</span></label>
        <div class="input-wrap">
          <input type="number" id="oreFestive" value="0" min="0" oninput="calculeaza()">
          <span class="input-unit">ore</span>
        </div>
      </div>

      <div class="field">
        <label>Ore noapte <span class="badge by">25% din normală</span></label>
        <div class="input-wrap">
          <input type="number" id="oreNoapte" value="0" min="0" oninput="calculeaza()">
          <span class="input-unit">ore</span>
        </div>
      </div>

      <div class="field">
        <label>Ore odihnă <span class="badge by">50% din normală</span></label>
        <div class="input-wrap">
          <input type="number" id="oreOdihna" value="0" min="0" oninput="calculeaza()">
          <span class="input-unit">ore</span>
        </div>
      </div>

      <div class="field">
        <label>Ore școală <span class="badge bg">tarif normal</span></label>
        <div class="input-wrap">
          <input type="number" id="oreScoala" value="0" min="0" oninput="calculeaza()">
          <span class="input-unit">ore</span>
        </div>
      </div>

    </div>
  </div>

  <!-- CO + BONURI -->
  <div class="card">
    <div class="card-title"><span class="dot dot-green"></span> Concediu & Bonuri</div>
    <div class="grid">
      <div class="field">
        <label>Zile CO (concediu odihnă)</label>
        <div class="input-wrap">
          <input type="number" id="zileCO" value="0" min="0" oninput="calculeaza()">
          <span class="input-unit">zile</span>
        </div>
      </div>
      <div class="field">
        <label>Valoare bon de masă</label>
        <div class="input-wrap">
          <input type="number" id="valoareBon" value="40" min="0" oninput="calculeaza()">
          <span class="input-unit">RON</span>
        </div>
      </div>
    </div>
    <div class="info-box" id="bonuriInfo">— Bonuri calculate din ore normale (1 bon / 8 ore)</div>
  </div>

  <!-- AVANS -->
  <div class="card">
    <div class="card-title"><span class="dot dot-red"></span> Procent avans</div>
    <div class="grid">
      <div class="field">
        <label>Procent avans din salariu NET</label>
        <div class="input-wrap">
          <input type="number" id="procentAvans" value="32" min="0" max="100" oninput="calculeaza()">
          <span class="input-unit">%</span>
        </div>
      </div>
    </div>
  </div>

  <!-- DETALII CALCUL -->
  <div class="card">
    <div class="card-title"><span class="dot dot-blue"></span> Detalii calcul complet</div>
    <div class="breakdown" id="breakdown">
      <div class="brow"><span class="lbl">Introdu ore pentru a vedea detaliile</span><span class="val">—</span></div>
    </div>
  </div>

  <!-- REZULTATE -->
  <div class="result-grid">
    <div class="result-box avans">
      <div class="rb-label">💰 Avans</div>
      <div class="rb-amount" id="rezAvans">0 RON</div>
      <div class="rb-sub" id="rezAvansInfo">—</div>
    </div>
    <div class="result-box lichidare">
      <div class="rb-label">✅ Lichidare</div>
      <div class="rb-amount" id="rezLichidare">0 RON</div>
      <div class="rb-sub" id="rezLichidareInfo">—</div>
    </div>
  </div>

</div>

<script>
function fmt(n) {
  return n.toLocaleString('ro-RO', {minimumFractionDigits:2, maximumFractionDigits:2});
}
function fmtInt(n) {
  return Math.round(n).toLocaleString('ro-RO');
}

function calculeaza() {
  const salBaza      = parseFloat(document.getElementById('salariuBaza').value)  || 0;
  const normaOre     = parseFloat(document.getElementById('normaOre').value)     || 1;
  const oreNormale   = parseFloat(document.getElementById('oreNormale').value)   || 0;
  const oreSuplim    = parseFloat(document.getElementById('oreSuplim').value)    || 0;
  const oreFestive   = parseFloat(document.getElementById('oreFestive').value)   || 0;
  const oreNoapte    = parseFloat(document.getElementById('oreNoapte').value)    || 0;
  const oreOdihna    = parseFloat(document.getElementById('oreOdihna').value)    || 0;
  const oreScoala    = parseFloat(document.getElementById('oreScoala').value)    || 0;
  const zileCO       = parseFloat(document.getElementById('zileCO').value)       || 0;
  const valoareBon   = parseFloat(document.getElementById('valoareBon').value)   || 0;
  const procentAvans = parseFloat(document.getElementById('procentAvans').value) || 0;

  const t = salBaza / normaOre; // tarif orar

  document.getElementById('tarifInfo').innerHTML =
    `Tarif orar: <span class="y">${fmt(t)} RON/oră</span> &nbsp;(${fmt(salBaza)} RON ÷ ${normaOre} ore)`;

  // ── CALCULE BRUT ────────────────────────────────────────────
  // Ore normale: t × ore
  const plataNormala  = oreNormale  * t;

  // Ore suplimentare: ora normală + 75% = t × 1.75
  const plataSuplim   = oreSuplim   * t * 1.75;

  // Ore festive: DOAR ora normală (fără spor)
  const plataFestive  = oreFestive  * t;

  // Ore noapte: DOAR 25% din ora normală (sporul, nu ora întreagă)
  const plataNoapte   = oreNoapte   * t * 0.25;

  // Ore odihnă: DOAR 50% din ora normală (sporul, nu ora întreagă)
  const plataOdihna   = oreOdihna   * t * 0.50;

  // Ore școală: tarif normal
  const plataScoala   = oreScoala   * t;

  // CO: salariu ÷ 21.75 zile lucrătoare/lună
  const tarifZiCO     = salBaza / 21.75;
  const plataCO       = zileCO * tarifZiCO;

  const totalBrut = plataNormala + plataSuplim + plataFestive +
                    plataNoapte  + plataOdihna + plataScoala  + plataCO;

  // ── IMPOZITE ROMÂNIA ────────────────────────────────────────
  // CAS  = 25% din brut
  // CASS = 10% din brut
  // Impozit venit = 10% din (brut - CAS - CASS)
  const CAS        = totalBrut * 0.25;
  const CASS       = totalBrut * 0.10;
  const bazaImpoz  = totalBrut - CAS - CASS;
  const impozit    = bazaImpoz * 0.10;
  const totalRetin = CAS + CASS + impozit;
  const totalNet   = totalBrut - totalRetin;

  // ── BONURI ──────────────────────────────────────────────────
  // Din ore NORMALE: 1 bon / 8 ore (bonurile nu se impozitează separat în calcul fluturuș)
  const nrBonuri    = Math.floor(oreNormale / 8);
  const totalBonuri = nrBonuri * valoareBon;

  // ── AVANS & LICHIDARE (din NET) ─────────────────────────────
  const avans     = totalNet * (procentAvans / 100);
  const lichidare = totalNet - avans;

  // ── BONURI INFO ─────────────────────────────────────────────
  document.getElementById('bonuriInfo').innerHTML =
    `Ore normale: <span class="g">${oreNormale}</span> → <span class="g">${nrBonuri} bonuri</span> × ${valoareBon} RON = <span class="g">${fmt(totalBonuri)} RON</span>`;

  // ── BREAKDOWN HTML ───────────────────────────────────────────
  const rows = [
    { show: oreNormale > 0, color:'var(--text)',
      lbl: `Ore normale — ${oreNormale} ore × ${fmt(t)} RON/h`,
      val: plataNormala },
    { show: oreSuplim > 0,  color:'var(--accent)',
      lbl: `Ore suplim. — ${oreSuplim} ore × ${fmt(t)} RON/h × 1.75`,
      val: plataSuplim },
    { show: oreFestive > 0, color:'var(--text)',
      lbl: `Ore festive — ${oreFestive} ore × ${fmt(t)} RON/h (tarif normal)`,
      val: plataFestive },
    { show: oreNoapte > 0,  color:'var(--accent)',
      lbl: `Spor noapte — ${oreNoapte} ore × ${fmt(t*0.25)} RON (25% din t)`,
      val: plataNoapte },
    { show: oreOdihna > 0,  color:'var(--accent)',
      lbl: `Spor odihnă — ${oreOdihna} ore × ${fmt(t*0.50)} RON (50% din t)`,
      val: plataOdihna },
    { show: oreScoala > 0,  color:'var(--text)',
      lbl: `Ore școală — ${oreScoala} ore × ${fmt(t)} RON/h`,
      val: plataScoala },
    { show: zileCO > 0,     color:'var(--accent2)',
      lbl: `CO — ${zileCO} zile × ${fmt(tarifZiCO)} RON/zi`,
      val: plataCO },
  ];

  const visible = rows.filter(r => r.show);
  let html = '';

  if (visible.length === 0) {
    html = '<div class="brow"><span class="lbl">Introdu ore pentru a vedea detaliile</span><span class="val">—</span></div>';
  } else {
    // Componente brut
    visible.forEach(r => {
      html += `<div class="brow">
        <span class="lbl">${r.lbl}</span>
        <span class="val" style="color:${r.color}">${fmt(r.val)} RON</span>
      </div>`;
    });

    // Total brut
    html += `<div class="brow sep">
      <span class="lbl">Total BRUT</span>
      <span class="val" style="color:var(--accent);font-size:15px;">${fmt(totalBrut)} RON</span>
    </div>`;

    // Rețineri
    html += `<div class="brow sep2">
      <span class="lbl">Rețineri salariat</span>
      <span class="val" style="color:var(--accent3)">− ${fmt(totalRetin)} RON</span>
    </div>`;
    html += `<div class="brow">
      <span class="lbl" style="color:var(--accent3)">CAS — 25% din brut</span>
      <span class="val" style="color:var(--accent3)">− ${fmt(CAS)} RON</span>
    </div>`;
    html += `<div class="brow">
      <span class="lbl" style="color:var(--accent3)">CASS — 10% din brut</span>
      <span class="val" style="color:var(--accent3)">− ${fmt(CASS)} RON</span>
    </div>`;
    html += `<div class="brow">
      <span class="lbl" style="color:var(--accent3)">Impozit venit — 10% din (brut−CAS−CASS)</span>
      <span class="val" style="color:var(--accent3)">− ${fmt(impozit)} RON</span>
    </div>`;

    // Net
    html += `<div class="brow grand">
      <span class="lbl">Salariu NET</span>
      <span class="val" style="color:var(--accent2);font-size:16px;">${fmt(totalNet)} RON</span>
    </div>`;

    if (totalBonuri > 0) {
      html += `<div class="brow">
        <span class="lbl" style="color:var(--accent2)">+ Bonuri de masă — ${nrBonuri} × ${valoareBon} RON</span>
        <span class="val" style="color:var(--accent2)">+ ${fmt(totalBonuri)} RON</span>
      </div>`;
    }
  }

  document.getElementById('breakdown').innerHTML = html;

  // Rezultate mari
  document.getElementById('rezAvans').textContent         = fmtInt(avans) + ' RON';
  document.getElementById('rezLichidare').textContent     = fmtInt(lichidare) + ' RON';
  document.getElementById('rezAvansInfo').textContent     = `${procentAvans}% din net ${fmt(totalNet)} RON`;
  document.getElementById('rezLichidareInfo').textContent = `Rest ${100-procentAvans}% din net ${fmt(totalNet)} RON`;
}

calculeaza();
</script>
</body>
</html>
