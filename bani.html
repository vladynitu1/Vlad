<!DOCTYPE html>
<html lang="ro">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>EMX Finance Tracker</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html { background: #0b0b10; min-height: 100%; }

    body {
      min-height: 100vh;
      background: #0b0b10;
      font-family: 'Georgia', 'Times New Roman', serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      color: #e0ddf0;
    }

    /* BANNER */
    #banner {
      width: 100%;
      background: linear-gradient(135deg, #0f0f1a 0%, #18122a 50%, #0f0f1a 100%);
      border-bottom: 2px solid #e8b84b33;
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 14px 20px;
    }
    .banner-left { display: flex; align-items: baseline; gap: 10px; }
    .banner-emx {
      font-size: 28px; font-weight: bold; letter-spacing: 7px;
      color: #e8b84b; font-family: monospace;
      text-shadow: 0 0 24px #e8b84b66;
    }
    .banner-sub { font-size: 10px; letter-spacing: 3px; color: #6a6a80; font-family: monospace; text-transform: uppercase; }
    .token-btn {
      display: flex; align-items: center; gap: 5px;
      background: #1a1a28; border: 1px solid #3a3a55; color: #9996b0;
      border-radius: 8px; padding: 7px 13px; cursor: pointer;
      font-size: 12px; font-family: monospace;
    }
    .token-btn:hover { border-color: #e8b84b66; color: #e8b84b; }

    /* CONTAINER */
    #container { width: 100%; max-width: 520px; padding: 20px 16px 60px; }

    /* SUB HEADER */
    .sub-header {
      display: flex; justify-content: space-between; align-items: flex-end;
      margin-bottom: 12px; padding-bottom: 16px;
      border-bottom: 1px solid #1e1e2a;
    }
    .header-label { font-size: 9px; letter-spacing: 4px; color: #4a4a62; font-family: monospace; margin-bottom: 4px; }
    .header-title { font-size: 24px; font-weight: bold; color: #e8e4d9; }
    .total-badge {
      background: #16161f; border: 1px solid #e8b84b33;
      border-radius: 10px; padding: 8px 14px; text-align: right;
    }
    .total-label { font-size: 8px; letter-spacing: 3px; color: #e8b84b88; font-family: monospace; margin-bottom: 2px; }
    .total-amount { font-size: 18px; font-weight: bold; color: #e8b84b; font-family: monospace; }

    /* SYNC BAR */
    .sync-bar {
      display: flex; justify-content: space-between; align-items: center;
      background: #13131a; border: 1px solid #1e1e2a;
      border-radius: 10px; padding: 8px 14px; margin-bottom: 18px; gap: 8px;
    }
    #sync-msg { font-size: 11px; font-family: monospace; color: #5a5a72; flex: 1; }
    .sync-btns { display: flex; gap: 6px; flex-shrink: 0; }
    .load-btn {
      background: #1e1e2a; border: 1px solid #303045; color: #7ec0e8;
      border-radius: 7px; padding: 5px 10px; cursor: pointer;
      font-size: 11px; font-family: monospace;
    }
    .save-gist-btn {
      background: #2a3d28; border: 1px solid #3d7a3a; color: #7ec89a;
      border-radius: 7px; padding: 5px 12px; cursor: pointer;
      font-size: 11px; font-family: monospace; font-weight: bold;
    }
    .load-btn:hover { background: #252535; }
    .save-gist-btn:hover { background: #334d30; }

    /* CARDS */
    #card-list { display: flex; flex-direction: column; gap: 16px; }
    .card { background: #16161f; border: 1px solid #252530; border-radius: 14px; overflow: hidden; }
    .card-header {
      display: flex; align-items: center; gap: 12px;
      padding: 13px 16px; background: #1c1c28;
      border-bottom: 1px solid #252530;
    }
    .avatar {
      width: 34px; height: 34px; border-radius: 50%;
      background: #2d2d42; border: 2px solid #3d3d58;
      display: flex; align-items: center; justify-content: center;
      font-size: 14px; font-weight: bold; color: #a8a4c0; flex-shrink: 0;
    }
    .card-name { flex: 1; font-size: 16px; font-weight: bold; color: #e0ddf0; }
    .person-total { font-size: 13px; font-weight: bold; color: #7ec89a; font-family: monospace; }

    .entries { padding: 4px 0; }
    .entry { display: flex; align-items: center; padding: 9px 16px; gap: 8px; }
    .entry:nth-child(odd) { background: #18181f; }
    .entry-reason { flex: 1; font-size: 13px; color: #9996b0; font-family: monospace; }
    .entry-amount { font-size: 13px; color: #e0ddf0; font-family: monospace; font-weight: bold; min-width: 80px; text-align: right; }
    .delete-btn { background: none; border: none; color: #5a3a3a; font-size: 18px; cursor: pointer; padding: 0 2px; line-height: 1; }
    .delete-btn:hover { color: #e07a7a; }

    .add-row {
      display: flex; flex-direction: column; gap: 8px;
      padding: 12px 16px; background: #13131a;
      border-top: 1px dashed #303045;
    }
    .add-row-inputs { display: flex; gap: 8px; }
    .add-entry-btn {
      width: 100%; background: none; border: none;
      border-top: 1px dashed #252530; color: #4a4a65;
      padding: 10px 16px; text-align: left; cursor: pointer;
      font-size: 12px; font-family: monospace; letter-spacing: 1px;
    }
    .add-entry-btn:hover { color: #7ec89a; }

    .total-row {
      display: flex; justify-content: space-between; align-items: center;
      padding: 10px 16px; background: #1a1f1a;
      border-top: 1px solid #252530;
    }
    .total-row-label { font-size: 11px; color: #5a7a65; font-family: monospace; letter-spacing: 1px; text-transform: uppercase; }
    .total-row-amt { font-size: 15px; font-weight: bold; color: #7ec89a; font-family: monospace; }

    .new-person-card {
      margin-top: 16px; background: #16161f;
      border: 1px dashed #303045; border-radius: 14px; padding: 20px;
    }
    .new-person-title { font-size: 10px; letter-spacing: 3px; color: #5a5a72; font-family: monospace; margin-bottom: 14px; text-transform: uppercase; }
    #add-person-btn {
      margin-top: 16px; width: 100%; background: #16161f;
      border: 1px dashed #303045; border-radius: 14px; color: #4a4a65;
      padding: 14px; cursor: pointer; font-family: monospace;
      font-size: 12px; letter-spacing: 2px;
    }
    #add-person-btn:hover { border-color: #4a4a65; color: #7ec89a; }

    input[type=text], input[type=number], input[type=password] {
      background: #1e1e2a; border: 1px solid #3a3a55;
      border-radius: 7px; padding: 9px 10px;
      color: #e0ddf0; font-size: 14px; font-family: monospace; outline: none;
      width: 100%;
    }
    input::placeholder { color: #4a4a62; }
    input:focus { border-color: #e8b84b55; }
    .input-amt { width: 38%; flex-shrink: 0; }
    .input-reason { flex: 1; }
    .input-full { margin-bottom: 10px; }
    .input-row { display: flex; gap: 8px; margin-bottom: 10px; }

    .btn-row { display: flex; gap: 8px; }
    .confirm-btn {
      flex: 1; background: #2a4a35; border: 1px solid #3d7a52; color: #7ec89a;
      border-radius: 7px; padding: 9px; cursor: pointer;
      font-size: 14px; font-weight: bold; font-family: monospace;
    }
    .confirm-btn:hover { background: #334d3a; }
    .cancel-btn {
      flex: 1; background: #2a1a1a; border: 1px solid #5a3030; color: #c87e7e;
      border-radius: 7px; padding: 9px; cursor: pointer;
      font-size: 14px; font-family: monospace;
    }
    .cancel-btn:hover { background: #331a1a; }

    .overlay {
      position: fixed; inset: 0; background: #000c;
      display: flex; align-items: center; justify-content: center;
      z-index: 100; padding: 16px;
    }
    .hidden { display: none !important; }
    .modal {
      background: #1c1c28; border: 1px solid #303045;
      border-radius: 16px; padding: 24px;
      width: 100%; max-width: 400px;
    }
    .modal-header { display: flex; align-items: center; margin-bottom: 12px; gap: 8px; }
    .modal-title { color: #e0ddf0; font-size: 15px; font-family: monospace; font-weight: bold; }
    .modal-hint { font-size: 12px; color: #7a7a90; font-family: monospace; line-height: 1.7; margin-bottom: 14px; }
    .modal-hint a { color: #e8b84b; }
    .token-input { margin-bottom: 14px; }
    .clear-token-btn {
      margin-top: 10px; width: 100%; background: #2a1a1a;
      border: 1px solid #5a3030; color: #c87e7e;
      border-radius: 8px; padding: 8px; cursor: pointer;
      font-family: monospace; font-size: 12px;
    }
    .delete-confirm-btn {
      flex: 1; background: #3a1a1a; border: 1px solid #7a3030; color: #e07a7a;
      border-radius: 7px; padding: 9px; cursor: pointer;
      font-size: 14px; font-family: monospace;
    }

    /* Error box in modal */
    .error-box {
      background: #2a1a1a; border: 1px solid #7a3030; border-radius: 8px;
      padding: 10px 12px; margin-bottom: 12px;
      font-size: 12px; font-family: monospace; color: #e07a7a; line-height: 1.6;
    }
    .error-box.hidden { display: none !important; }

    /* Reset gist btn */
    .reset-gist-btn {
      margin-top: 8px; width: 100%; background: #1a1a2a;
      border: 1px solid #3a3a6a; color: #7a7ab0;
      border-radius: 8px; padding: 8px; cursor: pointer;
      font-family: monospace; font-size: 12px;
    }
    .reset-gist-btn:hover { color: #e8b84b; border-color: #e8b84b44; }
  </style>
</head>
<body>

<!-- BANNER -->
<div id="banner">
  <div class="banner-left">
    <span class="banner-emx">EMX</span>
    <span class="banner-sub">Finance Tracker</span>
  </div>
  <button class="token-btn" onclick="openTokenModal()">
    <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2">
      <path d="M9 19c-5 1.5-5-2.5-7-3m14 6v-3.87a3.37 3.37 0 0 0-.94-2.61c3.14-.35 6.44-1.54 6.44-7A5.44 5.44 0 0 0 20 4.77 5.07 5.07 0 0 0 19.91 1S18.73.65 16 2.48a13.38 13.38 0 0 0-7 0C6.27.65 5.09 1 5.09 1A5.07 5.07 0 0 0 5 4.77a5.44 5.44 0 0 0-1.5 3.78c0 5.42 3.3 6.61 6.44 7A3.37 3.37 0 0 0 9 18.13V22"/>
    </svg>
    <span id="token-btn-label">Token GitHub</span>
  </button>
</div>

<div id="container">

  <div class="sub-header">
    <div>
      <div class="header-label">REGISTRU</div>
      <div class="header-title">Bani de luat</div>
    </div>
    <div class="total-badge">
      <div class="total-label">TOTAL</div>
      <div class="total-amount" id="grand-total">0,00 lei</div>
    </div>
  </div>

  <div class="sync-bar">
    <span id="sync-msg">Fără token — datele nu se sincronizează</span>
    <div class="sync-btns">
      <button class="load-btn hidden" id="sync-load-btn" onclick="loadFromGist()">↓ Sync</button>
      <button class="save-gist-btn" onclick="saveToGist()">💾 Salvează</button>
    </div>
  </div>

  <div id="card-list"></div>

  <div class="new-person-card hidden" id="new-person-form">
    <div class="new-person-title">Persoană nouă</div>
    <input type="text" id="np-name" class="input-full" placeholder="Nume" />
    <div class="input-row">
      <input type="number" id="np-amount" class="input-amt" placeholder="Sumă (lei)" />
      <input type="text" id="np-reason" class="input-reason" placeholder="Motiv" />
    </div>
    <div class="btn-row">
      <button class="confirm-btn" onclick="addPerson()">Salvează</button>
      <button class="cancel-btn" onclick="cancelAddPerson()">Anulează</button>
    </div>
  </div>

  <button id="add-person-btn" onclick="showAddPersonForm()">+ Adaugă persoană</button>
</div>

<!-- TOKEN MODAL -->
<div class="overlay hidden" id="token-modal">
  <div class="modal">
    <div class="modal-header">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#e8b84b" stroke-width="2">
        <path d="M9 19c-5 1.5-5-2.5-7-3m14 6v-3.87a3.37 3.37 0 0 0-.94-2.61c3.14-.35 6.44-1.54 6.44-7A5.44 5.44 0 0 0 20 4.77 5.07 5.07 0 0 0 19.91 1S18.73.65 16 2.48a13.38 13.38 0 0 0-7 0C6.27.65 5.09 1 5.09 1A5.07 5.07 0 0 0 5 4.77a5.44 5.44 0 0 0-1.5 3.78c0 5.42 3.3 6.61 6.44 7A3.37 3.37 0 0 0 9 18.13V22"/>
      </svg>
      <span class="modal-title">Token GitHub</span>
    </div>
    <p class="modal-hint">
      Mergi la
      <a href="https://github.com/settings/tokens/new" target="_blank">github.com/settings/tokens</a>
      → generează un token <strong style="color:#e0ddf0">Classic PAT</strong> cu permisiunea <strong style="color:#e8b84b">gist</strong> bifată.
      Datele se vor salva ca un Gist privat.
    </p>
    <div class="error-box hidden" id="token-error"></div>
    <input type="password" id="token-input" class="token-input" placeholder="ghp_xxxxxxxxxxxxxxxxxxxx" />
    <div class="btn-row">
      <button class="confirm-btn" onclick="saveToken()">Salvează token</button>
      <button class="cancel-btn" onclick="closeTokenModal()">Închide</button>
    </div>
    <button class="clear-token-btn hidden" id="clear-token-btn" onclick="clearToken()">🗑 Șterge token salvat</button>
    <button class="reset-gist-btn hidden" id="reset-gist-btn" onclick="resetGistId()">🔄 Resetează Gist ID (creează unul nou la salvare)</button>
  </div>
</div>

<!-- DELETE MODAL -->
<div class="overlay hidden" id="delete-modal">
  <div class="modal" style="text-align:center">
    <div class="modal-title" style="margin-bottom:20px">Ștergi acest rând?</div>
    <div class="btn-row">
      <button class="delete-confirm-btn" onclick="confirmDelete()">Da, șterge</button>
      <button class="cancel-btn" onclick="closeDeleteModal()">Anulează</button>
    </div>
  </div>
</div>

<script>
  const GIST_FILENAME = "emx-debts.json";
  let nextPersonId = 100;
  let nextEntryId  = 200;
  let pendingDelete = null;

  let people = [
    { id: 1, name: "Vlad",  entries: [{ id: 1, amount: 50, reason: "Împrumut" }] },
    { id: 2, name: "Ionuț", entries: [{ id: 1, amount: 30, reason: "Cină" }] },
  ];

  let ghToken = localStorage.getItem("emx_gh_token") || "";
  let gistId  = localStorage.getItem("emx_gist_id")  || "";

  // ── HELPERS ─────────────────────────────────────────────────────
  function formatLei(n) {
    return n.toLocaleString("ro-RO", { minimumFractionDigits: 2, maximumFractionDigits: 2 }) + " lei";
  }
  function esc(str) {
    return String(str)
      .replace(/&/g,"&amp;").replace(/</g,"&lt;")
      .replace(/>/g,"&gt;").replace(/"/g,"&quot;");
  }

  // ── RENDER ───────────────────────────────────────────────────────
  function render() {
    const list = document.getElementById("card-list");
    list.innerHTML = "";
    let grandTotal = 0;

    people.forEach(person => {
      const personTotal = person.entries.reduce((s, e) => s + e.amount, 0);
      grandTotal += personTotal;

      const card = document.createElement("div");
      card.className = "card";
      card.innerHTML = `
        <div class="card-header">
          <div class="avatar">${person.name.charAt(0).toUpperCase()}</div>
          <div class="card-name">${esc(person.name)}</div>
          <div class="person-total">${formatLei(personTotal)}</div>
        </div>
        <div class="entries" id="entries-${person.id}"></div>
        <div id="add-row-container-${person.id}">
          <button class="add-entry-btn" onclick="showAddRow(${person.id})">+ Adaugă rând</button>
        </div>
        <div class="total-row">
          <span class="total-row-label">Total ${esc(person.name)}</span>
          <span class="total-row-amt">${formatLei(personTotal)}</span>
        </div>
      `;
      list.appendChild(card);

      const entriesDiv = card.querySelector(`#entries-${person.id}`);
      person.entries.forEach(entry => {
        const row = document.createElement("div");
        row.className = "entry";
        row.innerHTML = `
          <span class="entry-reason">${esc(entry.reason)}</span>
          <span class="entry-amount">${formatLei(entry.amount)}</span>
          <button class="delete-btn" onclick="askDelete(${person.id}, ${entry.id})">×</button>
        `;
        entriesDiv.appendChild(row);
      });
    });

    document.getElementById("grand-total").textContent = formatLei(grandTotal);
    updateSyncUI();
  }

  // ── ADD ENTRY ────────────────────────────────────────────────────
  function showAddRow(personId) {
    const container = document.getElementById(`add-row-container-${personId}`);
    container.innerHTML = `
      <div class="add-row">
        <div class="add-row-inputs">
          <input type="number" id="ae-amount-${personId}" class="input-amt" placeholder="Sumă (lei)" />
          <input type="text"   id="ae-reason-${personId}" class="input-reason" placeholder="Motiv" />
        </div>
        <div class="btn-row">
          <button class="confirm-btn" onclick="addEntry(${personId})">✓ Salvează</button>
          <button class="cancel-btn"  onclick="render()">✕ Anulează</button>
        </div>
      </div>
    `;
    document.getElementById(`ae-amount-${personId}`).focus();
  }

  function addEntry(personId) {
    const amt    = parseFloat(document.getElementById(`ae-amount-${personId}`).value);
    const reason = document.getElementById(`ae-reason-${personId}`).value.trim();
    if (!amt || !reason) { alert("Completează suma și motivul!"); return; }
    const person = people.find(p => p.id === personId);
    if (person) person.entries.push({ id: nextEntryId++, amount: amt, reason });
    render();
  }

  // ── ADD PERSON ───────────────────────────────────────────────────
  function showAddPersonForm() {
    document.getElementById("new-person-form").classList.remove("hidden");
    document.getElementById("add-person-btn").classList.add("hidden");
    document.getElementById("np-name").focus();
  }
  function cancelAddPerson() {
    document.getElementById("new-person-form").classList.add("hidden");
    document.getElementById("add-person-btn").classList.remove("hidden");
    ["np-name","np-amount","np-reason"].forEach(id => document.getElementById(id).value = "");
  }
  function addPerson() {
    const name   = document.getElementById("np-name").value.trim();
    const amt    = parseFloat(document.getElementById("np-amount").value);
    const reason = document.getElementById("np-reason").value.trim();
    if (!name || !amt || !reason) { alert("Completează toate câmpurile!"); return; }
    people.push({ id: nextPersonId++, name, entries: [{ id: nextEntryId++, amount: amt, reason }] });
    cancelAddPerson();
    render();
  }

  // ── DELETE ───────────────────────────────────────────────────────
  function askDelete(personId, entryId) {
    pendingDelete = { personId, entryId };
    document.getElementById("delete-modal").classList.remove("hidden");
  }
  function confirmDelete() {
    if (!pendingDelete) return;
    const { personId, entryId } = pendingDelete;
    people = people
      .map(p => p.id === personId ? { ...p, entries: p.entries.filter(e => e.id !== entryId) } : p)
      .filter(p => p.entries.length > 0);
    pendingDelete = null;
    closeDeleteModal();
    render();
  }
  function closeDeleteModal() {
    pendingDelete = null;
    document.getElementById("delete-modal").classList.add("hidden");
  }

  // ── TOKEN ────────────────────────────────────────────────────────
  function openTokenModal() {
    document.getElementById("token-input").value = "";
    document.getElementById("token-error").classList.add("hidden");
    document.getElementById("clear-token-btn").classList.toggle("hidden", !ghToken);
    document.getElementById("reset-gist-btn").classList.toggle("hidden", !gistId);
    document.getElementById("token-modal").classList.remove("hidden");
  }
  function closeTokenModal() {
    document.getElementById("token-modal").classList.add("hidden");
  }
  function saveToken() {
    const t = document.getElementById("token-input").value.trim();
    if (!t) return;
    ghToken = t;
    localStorage.setItem("emx_gh_token", t);
    closeTokenModal();
    setSyncMsg("Token salvat! Apasă Salvează pentru a sincroniza.", "#7ec89a");
    updateSyncUI();
  }
  function clearToken() {
    ghToken = ""; gistId = "";
    localStorage.removeItem("emx_gh_token");
    localStorage.removeItem("emx_gist_id");
    closeTokenModal();
    setSyncMsg("Token șters.", "#c87e7e");
    updateSyncUI();
  }
  function resetGistId() {
    gistId = "";
    localStorage.removeItem("emx_gist_id");
    document.getElementById("reset-gist-btn").classList.add("hidden");
    document.getElementById("token-error").classList.add("hidden");
    setSyncMsg("Gist ID resetat — la salvare se va crea un Gist nou.", "#e8b84b");
    closeTokenModal();
    updateSyncUI();
  }

  function updateSyncUI() {
    document.getElementById("token-btn-label").textContent = ghToken ? "Token ✓" : "Token GitHub";
    const loadBtn = document.getElementById("sync-load-btn");
    (ghToken && gistId) ? loadBtn.classList.remove("hidden") : loadBtn.classList.add("hidden");
  }

  // ── GIST SYNC ────────────────────────────────────────────────────
  function showTokenError(msg) {
    const el = document.getElementById("token-error");
    el.textContent = msg;
    el.classList.remove("hidden");
    // Show reset gist button too
    document.getElementById("reset-gist-btn").classList.remove("hidden");
    document.getElementById("token-modal").classList.remove("hidden");
  }

  async function saveToGist() {
    if (!ghToken) { openTokenModal(); return; }
    setSyncMsg("Se salvează...", "#e8b84b");

    const content = JSON.stringify({ people, nextPersonId, nextEntryId }, null, 2);
    const headers = {
      Authorization: `token ${ghToken}`,
      "Content-Type": "application/json",
      "Accept": "application/vnd.github+json",
    };

    try {
      let res, url, method, body;

      if (gistId) {
        // Try to update existing gist
        url    = `https://api.github.com/gists/${gistId}`;
        method = "PATCH";
        body   = JSON.stringify({ files: { [GIST_FILENAME]: { content } } });
      } else {
        // Create new gist
        url    = "https://api.github.com/gists";
        method = "POST";
        body   = JSON.stringify({
          description: "EMX Debt Tracker",
          public: false,
          files: { [GIST_FILENAME]: { content } }
        });
      }

      res = await fetch(url, { method, headers, body });

      // If 404 on PATCH — gist was deleted externally, reset and create new
      if (res.status === 404 && gistId) {
        setSyncMsg("Gist-ul vechi nu mai există. Se creează unul nou...", "#e8b84b");
        gistId = "";
        localStorage.removeItem("emx_gist_id");

        res = await fetch("https://api.github.com/gists", {
          method: "POST",
          headers,
          body: JSON.stringify({
            description: "EMX Debt Tracker",
            public: false,
            files: { [GIST_FILENAME]: { content } }
          })
        });
      }

      if (res.status === 401) {
        setSyncMsg("✗ Token invalid sau expirat.", "#e07a7a");
        showTokenError("❌ Token invalid sau expirat (401).\nGenerează un token nou pe GitHub cu permisiunea 'gist' bifată, apoi introdu-l din nou.");
        return;
      }
      if (res.status === 403) {
        setSyncMsg("✗ Token fără permisiunea 'gist'.", "#e07a7a");
        showTokenError("❌ Tokenul nu are permisiunea 'gist' (403).\nMergi pe GitHub → Settings → Developer settings → Personal access tokens → generează un token nou cu 'gist' bifat.");
        return;
      }
      if (!res.ok) {
        const errData = await res.json().catch(() => ({}));
        throw new Error(`GitHub ${res.status}: ${errData.message || "eroare necunoscută"}`);
      }

      const data = await res.json();
      gistId = data.id;
      localStorage.setItem("emx_gist_id", gistId);
      setSyncMsg("✓ Salvat pe GitHub Gist", "#7ec89a");
      updateSyncUI();
      setTimeout(() => setSyncMsg(ghToken ? "Conectat la GitHub Gist" : "Fără token — datele nu se sincronizează", "#5a5a72"), 3000);

    } catch (e) {
      setSyncMsg("✗ Eroare: " + e.message, "#e07a7a");
    }
  }

  async function loadFromGist() {
    if (!ghToken || !gistId) return;
    setSyncMsg("Se încarcă...", "#e8b84b");

    try {
      const res = await fetch(`https://api.github.com/gists/${gistId}`, {
        headers: {
          Authorization: `token ${ghToken}`,
          "Accept": "application/vnd.github+json",
        }
      });

      if (res.status === 404) {
        setSyncMsg("✗ Gist-ul nu mai există. Resetează Gist ID.", "#e07a7a");
        showTokenError("❌ Gist-ul nu a fost găsit (404).\nProbabil a fost șters de pe GitHub.\nApasă 'Resetează Gist ID' de mai jos, apoi Salvează din nou pentru a crea unul nou.");
        return;
      }
      if (res.status === 401) {
        setSyncMsg("✗ Token invalid.", "#e07a7a");
        showTokenError("❌ Token invalid sau expirat (401). Introdu un token nou.");
        return;
      }
      if (!res.ok) throw new Error(`GitHub ${res.status}`);

      const data = await res.json();
      const raw  = data.files[GIST_FILENAME]?.content;
      if (!raw) throw new Error("Fișierul emx-debts.json nu există în Gist");

      const parsed = JSON.parse(raw);
      people        = parsed.people        || [];
      nextPersonId  = parsed.nextPersonId  || 100;
      nextEntryId   = parsed.nextEntryId   || 200;
      render();
      setSyncMsg("✓ Sincronizat", "#7ec89a");
      setTimeout(() => setSyncMsg("Conectat la GitHub Gist", "#5a5a72"), 3000);

    } catch (e) {
      setSyncMsg("✗ " + e.message, "#e07a7a");
    }
  }

  function setSyncMsg(msg, color) {
    const el = document.getElementById("sync-msg");
    el.textContent  = msg;
    el.style.color  = color || "#5a5a72";
  }

  // ── INIT ─────────────────────────────────────────────────────────
  render();
  if (ghToken && gistId) loadFromGist();
</script>
</body>
</html>
