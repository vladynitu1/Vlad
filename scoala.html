<!DOCTYPE html>

<html lang="ro" style="background:#080808!important;color-scheme:dark;">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="color-scheme" content="dark">
<title>EMX</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap');

html, body {
background: #080808 !important;
color: #f0f0f0 !important;
margin: 0; padding: 0;
font-family: ‘Inter’, sans-serif;
min-height: 100vh;
-webkit-text-size-adjust: 100%;
}

- { box-sizing: border-box; -webkit-tap-highlight-color: transparent; margin:0; padding:0; }

:root {
–red: #E8212B;
–red2: rgba(232,33,43,0.15);
–bg: #080808;
–s1: #0f0f0f;
–s2: #141414;
–s3: #1a1a1a;
–s4: #202020;
–border: rgba(255,255,255,0.06);
–border2: rgba(255,255,255,0.1);
–border3: rgba(232,33,43,0.3);
–text: #f0f0f0;
–text2: #999;
–text3: #555;
–text4: #333;
}

/* ═══ BANNER ═══ */
.banner {
background: #080808;
border-bottom: 1px solid var(–border2);
padding: 0 20px;
height: 80px;
display: flex;
align-items: center;
gap: 16px;
position: sticky;
top: 0;
z-index: 200;
backdrop-filter: blur(30px);
-webkit-backdrop-filter: blur(30px);
}
.banner-bar {
width: 3px; height: 46px;
background: linear-gradient(180deg, #ff3a43, #c0141c);
border-radius: 3px;
flex-shrink: 0;
box-shadow: 0 0 12px rgba(232,33,43,0.5);
}
.banner-logo {
font-family: ‘Bebas Neue’, sans-serif;
font-size: 50px;
color: #fff;
letter-spacing: 8px;
line-height: 1;
text-shadow: 0 0 40px rgba(255,255,255,0.1);
}
.banner-sep { width:1px; height:34px; background:var(–border2); flex-shrink:0; }
.banner-meta { display:flex; flex-direction:column; gap:3px; }
.banner-label {
font-size: 9px; font-weight: 700;
color: var(–text3); letter-spacing: 3px; text-transform: uppercase;
}
.banner-sub {
font-size: 10px; color: var(–text3);
font-family: ‘JetBrains Mono’, monospace;
}
.banner-right { margin-left:auto; }
.banner-badge {
background: var(–red2);
border: 1px solid var(–border3);
color: var(–red);
font-family: ‘JetBrains Mono’, monospace;
font-size: 10px; font-weight: 500;
padding: 5px 10px; border-radius: 20px;
white-space: nowrap;
}

/* ═══ SEARCH ═══ */
.search-wrap {
padding: 12px 16px;
background: #080808;
border-bottom: 1px solid var(–border);
position: sticky;
top: 80px;
z-index: 199;
}
.search-box {
display: flex; align-items: center; gap: 10px;
background: var(–s2);
border: 1px solid var(–border2);
border-radius: 14px;
padding: 0 16px;
transition: border-color 0.2s, box-shadow 0.2s;
}
.search-box:focus-within {
border-color: var(–red);
box-shadow: 0 0 0 3px rgba(232,33,43,0.1);
}
.search-icon { color: var(–text3); flex-shrink:0; }
.search-input {
flex:1; background:none; border:none; outline:none;
color: var(–text); font-family:‘Inter’,sans-serif; font-size:15px;
padding: 14px 0;
caret-color: var(–red);
}
.search-input::placeholder { color: var(–text4); }
.search-clear {
background:none; border:none; color:var(–text3);
cursor:pointer; font-size:22px; line-height:1;
padding:2px; display:none; transition: color 0.15s;
}
.search-clear:hover { color: var(–red); }
.search-clear.on { display:block; }

/* ═══ STATUS ═══ */
.status {
padding: 10px 20px;
display: flex; align-items: center; gap: 8px;
font-family: ‘JetBrains Mono’, monospace; font-size: 11px;
color: var(–text3); border-bottom: 1px solid var(–border);
background: #080808;
}
.dot { width:7px; height:7px; border-radius:50%; flex-shrink:0; transition: background 0.3s; }
.dot.loading { background:#f59e0b; animation: blink 1s infinite; }
.dot.ok { background:#22c55e; box-shadow: 0 0 8px rgba(34,197,94,0.4); }
.dot.err { background:var(–red); }
@keyframes blink { 0%,100%{opacity:1}50%{opacity:0.1} }

/* ═══ CONTENT ═══ */
.content { padding: 16px 14px 60px; background: #080808; min-height: 60vh; }

/* ═══ CATEGORY ═══ */
.cat-block { margin-bottom: 10px; }

.cat-header {
display: flex; align-items: center; gap: 12px;
padding: 15px 16px;
background: var(–s2);
border: 1px solid var(–border);
border-radius: 14px;
cursor: pointer;
user-select: none;
transition: border-color 0.18s, background 0.18s;
position: relative;
overflow: hidden;
}
.cat-header::before {
content: ‘’;
position: absolute; left:0; top:0; bottom:0;
width: 3px;
background: var(–red);
border-radius: 14px 0 0 14px;
opacity: 0;
transition: opacity 0.2s;
}
.cat-header:hover { border-color: var(–border2); background: var(–s3); }
.cat-header:hover::before { opacity: 1; }
.cat-header.open {
border-color: var(–border3);
border-bottom-left-radius: 0;
border-bottom-right-radius: 0;
background: var(–s3);
}
.cat-header.open::before { opacity: 1; }

.cat-icon {
width: 36px; height: 36px;
background: var(–red2);
border: 1px solid var(–border3);
border-radius: 10px;
display: flex; align-items:center; justify-content:center;
font-size: 16px; flex-shrink:0;
}
.cat-name {
flex:1; font-size:15px; font-weight:600; color:var(–text);
letter-spacing: 0.2px;
}
.cat-count {
font-family:‘JetBrains Mono’,monospace; font-size:11px;
color: var(–red); background: var(–red2);
border: 1px solid var(–border3); padding:4px 10px; border-radius:20px;
font-weight: 500;
}
.cat-chevron {
color:var(–text3); font-size:12px;
transition:transform 0.25s cubic-bezier(.4,0,.2,1); flex-shrink:0;
width: 20px; height: 20px;
display:flex; align-items:center; justify-content:center;
}
.cat-chevron.open { transform:rotate(90deg); color: var(–red); }

/* ═══ CAT BODY ═══ */
.cat-body {
background: var(–s1);
border: 1px solid var(–border3);
border-top: none;
border-radius: 0 0 14px 14px;
overflow: hidden;
}
.cat-body.hidden { display:none; }

/* ═══ SUB HEADER ═══ */
.sub-header {
display: flex; align-items: center; gap: 10px;
padding: 12px 16px 12px 20px;
cursor: pointer; user-select: none;
border-bottom: 1px solid var(–border);
background: var(–s1);
transition: background 0.15s;
}
.sub-header:hover { background: var(–s2); }
.sub-dot {
width: 6px; height: 6px; border-radius: 50%;
background: var(–red); opacity: 0.5; flex-shrink:0;
}
.sub-name { flex:1; font-size:13px; font-weight:500; color:var(–text2); }
.sub-count {
font-family:‘JetBrains Mono’,monospace; font-size:10px; color:var(–text3);
background: var(–s3); padding: 2px 8px; border-radius:10px;
}
.sub-chevron { color:var(–text3); font-size:10px; transition:transform 0.2s; flex-shrink:0; }
.sub-chevron.open { transform:rotate(90deg); color: var(–red); }

.sub-body { background: var(–s1); }
.sub-body.hidden { display: none; }

/* ═══ FILE ROW ═══ */
.file-row {
display: flex; align-items: center; gap: 12px;
padding: 12px 16px 12px 24px;
border-bottom: 1px solid var(–border);
cursor: pointer;
transition: background 0.12s;
background: var(–s1);
text-decoration: none;
}
.file-row:last-child { border-bottom: none; }
.file-row:hover, .file-row:active { background: var(–s3); }
.file-row.indent2 { padding-left: 32px; }

.file-icon {
width: 38px; height: 38px;
border-radius: 10px;
display: flex; align-items:center; justify-content:center;
font-size: 18px; flex-shrink:0;
}
.file-icon.pdf { background: rgba(232,33,43,0.1); border: 1px solid rgba(232,33,43,0.2); }
.file-icon.image { background: rgba(59,130,246,0.1); border: 1px solid rgba(59,130,246,0.2); }
.file-icon.other { background: var(–s3); border: 1px solid var(–border); }

.file-info { flex:1; min-width:0; }
.file-name {
font-size: 13px; font-weight: 500; color: var(–text);
white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
margin-bottom: 3px;
}
.file-badge {
display: inline-block;
font-family: ‘JetBrains Mono’, monospace;
font-size: 9px; font-weight: 600; letter-spacing: 1px;
text-transform: uppercase; padding: 2px 7px; border-radius: 6px;
}
.file-badge.pdf { color: var(–red); background: var(–red2); }
.file-badge.image { color: #60a5fa; background: rgba(59,130,246,0.1); }
.file-badge.other { color: var(–text3); background: var(–s3); }

.file-arrow { color:var(–text4); font-size:16px; flex-shrink:0; }

/* ═══ NO RESULTS ═══ */
.no-results {
text-align:center; padding:80px 20px; color:var(–text3);
}
.no-results .nr-emoji { font-size:48px; margin-bottom:16px; }
.no-results p { font-size:14px; }

/* ═══ MODAL ═══ */
.modal {
display:none; position:fixed; inset:0;
background:#050505; z-index:1000; flex-direction:column;
}
.modal.open { display:flex; }
.modal-top {
background: #0c0c0c;
border-bottom: 1px solid var(–border2);
padding: 14px 16px;
display: flex; align-items: center; gap: 12px;
flex-shrink: 0;
}
.modal-back {
background: var(–s2); border: 1px solid var(–border2);
color: var(–text); width: 38px; height: 38px; border-radius: 10px;
font-size: 20px; cursor: pointer;
display: flex; align-items: center; justify-content: center;
transition: background 0.15s, border-color 0.15s; flex-shrink: 0;
}
.modal-back:hover { background: var(–red); border-color: var(–red); }
.modal-title {
flex:1; font-size:13px; font-weight:500; color:var(–text);
white-space:nowrap; overflow:hidden; text-overflow:ellipsis;
}
.modal-open {
background: var(–red);
border: none; color: #fff;
padding: 10px 18px; border-radius: 10px;
cursor: pointer;
font-family: ‘Bebas Neue’, sans-serif; font-size: 18px; letter-spacing: 1.5px;
text-decoration: none; flex-shrink: 0;
transition: opacity 0.15s;
}
.modal-open:hover { opacity: 0.85; }
.modal-body {
flex:1; overflow:auto; display:flex;
align-items:center; justify-content:center;
background: #050505;
}
.modal-body iframe { width:100%; height:100%; border:none; }
.modal-body img { max-width:100%; max-height:100%; object-fit:contain; padding:16px; }

/* Scrollbar */
::-webkit-scrollbar { width:3px; }
::-webkit-scrollbar-track { background:var(–bg); }
::-webkit-scrollbar-thumb { background:var(–s4); border-radius:2px; }
</style>

</head>
<body>

<!-- BANNER -->

<div class="banner">
  <div class="banner-bar"></div>
  <div class="banner-logo">EMX</div>
  <div class="banner-sep"></div>
  <div class="banner-meta">
    <div class="banner-label">Document Browser</div>
    <div class="banner-sub">Transferoviar Călători</div>
  </div>
  <div class="banner-right">
    <div class="banner-badge" id="bannerBadge">— fișiere</div>
  </div>
</div>

<!-- SEARCH -->

<div class="search-wrap">
  <div class="search-box">
    <svg class="search-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
      <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
    </svg>
    <input class="search-input" id="searchInput" type="search" placeholder="Caută fișiere...">
    <button class="search-clear" id="searchClear" onclick="clearSearch()">×</button>
  </div>
</div>

<!-- STATUS -->

<div class="status">
  <div class="dot loading" id="dot"></div>
  <span id="statusText">Se încarcă...</span>
</div>

<!-- CONTENT -->

<div class="content" id="content"></div>

<!-- MODAL -->

<div class="modal" id="modal">
  <div class="modal-top">
    <button class="modal-back" onclick="closeModal()">←</button>
    <span class="modal-title" id="modalTitle"></span>
    <a class="modal-open" id="modalLink" href="#" target="_blank">DESCHIDE ↗</a>
  </div>
  <div class="modal-body" id="modalBody"></div>
</div>

<script>
const API_KEY = 'AIzaSyAkrWRtDdBb0s6eqRnTbJbuAfqxe0H5Kok';
const ROOT_ID = '1mqSeG9xrvCKZhgI4ztNVqKCj2ciUq4Wr';
const FOLDER  = 'application/vnd.google-apps.folder';

let allFiles = [];
let _savedNodes = null;

function setStatus(state, msg) {
  document.getElementById('dot').className = 'dot ' + state;
  document.getElementById('statusText').textContent = msg;
}

async function listFolder(id) {
  const q = encodeURIComponent(`'${id}' in parents and trashed=false`);
  const url = `https://www.googleapis.com/drive/v3/files?q=${q}&key=${API_KEY}&fields=files(id,name,mimeType)&pageSize=200&orderBy=name`;
  const r = await fetch(url);
  const d = await r.json();
  if (!r.ok) throw new Error(d.error?.message || 'API error ' + r.status);
  return d.files || [];
}

function fileType(mime, name) {
  if (mime === 'application/pdf') return 'pdf';
  if (mime && mime.startsWith('image/')) return 'image';
  const ext = (name||'').split('.').pop().toLowerCase();
  if (ext === 'pdf') return 'pdf';
  if (['jpg','jpeg','png','gif','webp','bmp','svg'].includes(ext)) return 'image';
  return null;
}

function countFiles(node) {
  let n = node.files.length;
  for (const s of node.subfolders) n += countFiles(s);
  return n;
}

async function buildTree(id, name) {
  setStatus('loading', `Se încarcă: ${name}…`);
  const items = await listFolder(id);
  const folders = items.filter(f => f.mimeType === FOLDER);
  const files   = items.filter(f => fileType(f.mimeType, f.name));
  files.forEach(f => allFiles.push({ ...f, ftype: fileType(f.mimeType, f.name) }));
  const subfolders = [];
  for (const f of folders) subfolders.push(await buildTree(f.id, f.name));
  return { name, id, files, subfolders };
}

async function load() {
  try {
    const rootItems   = await listFolder(ROOT_ID);
    const rootFolders = rootItems.filter(f => f.mimeType === FOLDER);
    const rootFiles   = rootItems.filter(f => fileType(f.mimeType, f.name));
    rootFiles.forEach(f => allFiles.push({ ...f, ftype: fileType(f.mimeType, f.name) }));

    const categories = [];
    for (const folder of rootFolders) categories.push(await buildTree(folder.id, folder.name));

    const total = allFiles.length;
    document.getElementById('bannerBadge').textContent = `${total} fișiere`;
    setStatus('ok', `${total} fișiere în ${categories.length} categorii`);
    renderAll(categories, rootFiles);
  } catch(e) {
    setStatus('err', 'Eroare: ' + e.message);
    console.error(e);
  }
}

/* ── RENDER ── */
function renderAll(categories, rootFiles) {
  const content = document.getElementById('content');
  content.innerHTML = '';

  if (rootFiles.length) {
    const fakeTree = { name: 'General', files: rootFiles, subfolders: [] };
    content.appendChild(makeCatBlock(fakeTree));
  }
  for (const cat of categories) content.appendChild(makeCatBlock(cat));
}

function makeCatBlock(cat) {
  const total = countFiles(cat);
  const block = document.createElement('div');
  block.className = 'cat-block';

  // Header
  const header = document.createElement('div');
  header.className = 'cat-header';
  header.innerHTML = `
    <div class="cat-icon">📂</div>
    <div class="cat-name">${esc(cat.name)}</div>
    <div class="cat-count">${total}</div>
    <div class="cat-chevron">▶</div>`;

  // Body
  const body = document.createElement('div');
  body.className = 'cat-body hidden';

  // Direct files
  if (cat.files.length) {
    const fl = makeFileList(cat.files);
    body.appendChild(fl);
  }

  // Subfolders
  for (const sub of cat.subfolders) body.appendChild(makeSubBlock(sub));

  header.addEventListener('click', () => {
    const isOpen = !body.classList.contains('hidden');
    body.classList.toggle('hidden', isOpen);
    header.classList.toggle('open', !isOpen);
    header.querySelector('.cat-chevron').classList.toggle('open', !isOpen);
  });

  block.appendChild(header);
  block.appendChild(body);
  return block;
}

function makeSubBlock(sub) {
  const wrapper = document.createElement('div');

  const header = document.createElement('div');
  header.className = 'sub-header';
  header.innerHTML = `
    <div class="sub-dot"></div>
    <div class="sub-name">${esc(sub.name)}</div>
    <div class="sub-count">${countFiles(sub)}</div>
    <span class="sub-chevron">▶</span>`;

  const body = document.createElement('div');
  body.className = 'sub-body hidden';

  if (sub.files.length) body.appendChild(makeFileList(sub.files));
  for (const child of sub.subfolders) body.appendChild(makeSubBlock(child));

  header.addEventListener('click', () => {
    const isOpen = !body.classList.contains('hidden');
    body.classList.toggle('hidden', isOpen);
    header.querySelector('.sub-chevron').classList.toggle('open', !isOpen);
  });

  wrapper.appendChild(header);
  wrapper.appendChild(body);
  return wrapper;
}

function makeFileList(files) {
  const div = document.createElement('div');
  files.forEach(f => {
    const ft = fileType(f.mimeType, f.name);
    if (ft) div.appendChild(makeFileRow(f, ft));
  });
  return div;
}

const ICONS = { pdf: '📄', image: '🖼️', other: '📎' };

function makeFileRow(file, type) {
  const row = document.createElement('div');
  row.className = 'file-row';
  row.innerHTML = `
    <div class="file-icon ${type}">${ICONS[type] || '📎'}</div>
    <div class="file-info">
      <div class="file-name">${esc(file.name)}</div>
      <span class="file-badge ${type}">${type.toUpperCase()}</span>
    </div>
    <span class="file-arrow">›</span>`;
  row.addEventListener('click', () => openFile(file, type));
  return row;
}

/* ── SEARCH ── */
document.getElementById('searchInput').addEventListener('input', function() {
  const q = this.value.trim().toLowerCase();
  document.getElementById('searchClear').classList.toggle('on', q.length > 0);
  if (!q) { restoreContent(); return; }
  const results = allFiles.filter(f => f.name.toLowerCase().includes(q));
  showSearchResults(results);
});

function clearSearch() {
  document.getElementById('searchInput').value = '';
  document.getElementById('searchClear').classList.remove('on');
  restoreContent();
}

function showSearchResults(results) {
  const content = document.getElementById('content');
  if (!_savedNodes) _savedNodes = Array.from(content.childNodes).map(n => n.cloneNode(true));
  content.innerHTML = '';

  if (!results.length) {
    content.innerHTML = '<div class="no-results"><div class="nr-emoji">🔍</div><p>Niciun fișier găsit</p></div>';
    return;
  }

  const fakeTree = { name: `Rezultate (${results.length})`, files: results, subfolders: [] };
  const block = makeCatBlock(fakeTree);
  // Auto-open
  block.querySelector('.cat-header').click();
  content.appendChild(block);
}

function restoreContent() {
  if (!_savedNodes) return;
  const content = document.getElementById('content');
  content.innerHTML = '';
  _savedNodes.forEach(n => content.appendChild(n.cloneNode(true)));
  // Re-attach events by re-rendering... 
  // Actually simpler: reload from allFiles via savedOriginal
  _savedNodes = null;
  // Re-render needs original data — store it
  if (window._origData) renderAll(window._origData.cats, window._origData.rootFiles);
}

/* ── MODAL ── */
function openFile(file, type) {
  document.getElementById('modalTitle').textContent = file.name;
  document.getElementById('modalLink').href = `https://drive.google.com/file/d/${file.id}/view`;
  const body = document.getElementById('modalBody');
  body.innerHTML = '';
  if (type === 'pdf') {
    const iframe = document.createElement('iframe');
    iframe.src = `https://drive.google.com/file/d/${file.id}/preview`;
    iframe.style.cssText = 'width:100%;height:100%;border:none;';
    body.appendChild(iframe);
  } else {
    const img = document.createElement('img');
    img.src = `https://drive.google.com/thumbnail?id=${file.id}&sz=w1600`;
    img.alt = file.name;
    body.appendChild(img);
  }
  document.getElementById('modal').classList.add('open');
}

function closeModal() {
  document.getElementById('modal').classList.remove('open');
  document.getElementById('modalBody').innerHTML = '';
}

document.addEventListener('keydown', e => { if (e.key === 'Escape') closeModal(); });

function esc(s) {
  return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

// Patched load to store data for search restore
const _origLoad = load;
async function load() {
  try {
    const rootItems   = await listFolder(ROOT_ID);
    const rootFolders = rootItems.filter(f => f.mimeType === FOLDER);
    const rootFiles   = rootItems.filter(f => fileType(f.mimeType, f.name));
    rootFiles.forEach(f => allFiles.push({ ...f, ftype: fileType(f.mimeType, f.name) }));

    const categories = [];
    for (const folder of rootFolders) categories.push(await buildTree(folder.id, folder.name));

    window._origData = { cats: categories, rootFiles };

    const total = allFiles.length;
    document.getElementById('bannerBadge').textContent = `${total} fișiere`;
    setStatus('ok', `${total} fișiere în ${categories.length} categorii`);
    renderAll(categories, rootFiles);
  } catch(e) {
    setStatus('err', 'Eroare: ' + e.message);
    console.error(e);
  }
}

load();
</script>

</body>
</html>
