<!DOCTYPE html>
<html lang="ro">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EMX Manele // Generator</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@500;600;700&family=Share+Tech+Mono&family=Exo+2:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#07090f;
    --panel:#0d1119;
    --panel2:#11161f;
    --cyan:#00e5ff;
    --green:#39ff88;
    --red:#ff3355;
    --orange:#ff9a2e;
    --text:#c9d3de;
    --textdim:#5c6878;
    --border:#1c2330;
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    background:
      radial-gradient(circle at 15% 0%, rgba(0,229,255,0.07), transparent 40%),
      radial-gradient(circle at 85% 100%, rgba(255,58,90,0.06), transparent 45%),
      var(--bg);
    color:var(--text);
    font-family:'Exo 2', sans-serif;
    min-height:100vh;
    padding:24px 16px 60px;
  }
  .wrap{max-width:760px;margin:0 auto;}

  /* header */
  header{display:flex;align-items:center;justify-content:center;gap:14px;margin-bottom:6px;flex-wrap:wrap;}
  .logo{
    font-family:'Rajdhani',sans-serif;
    font-weight:700;
    font-size:2.4rem;
    letter-spacing:3px;
    color:var(--cyan);
    text-shadow:0 0 14px rgba(0,229,255,0.55);
    animation:blink 2.6s infinite;
  }
  @keyframes blink{
    0%,100%{opacity:1;}
    50%{opacity:.55;}
    52%{opacity:1;}
    54%{opacity:.3;}
    56%{opacity:1;}
  }
  .sub{
    font-family:'Share Tech Mono', monospace;
    color:var(--textdim);
    font-size:.8rem;
    letter-spacing:2px;
    text-transform:uppercase;
  }
  h1.title{
    text-align:center;
    font-family:'Rajdhani',sans-serif;
    font-weight:600;
    font-size:1.15rem;
    color:var(--orange);
    letter-spacing:2px;
    margin:0 0 30px;
    text-transform:uppercase;
  }

  .panel{
    background:linear-gradient(180deg, var(--panel), var(--panel2));
    border:1px solid var(--border);
    border-radius:10px;
    padding:20px;
    margin-bottom:20px;
    position:relative;
  }
  .panel::before{
    content:'';
    position:absolute;top:0;left:16px;right:16px;height:1px;
    background:linear-gradient(90deg, transparent, var(--cyan), transparent);
    opacity:.5;
  }
  .panel-label{
    font-family:'Share Tech Mono', monospace;
    font-size:.7rem;
    letter-spacing:2px;
    text-transform:uppercase;
    color:var(--cyan);
    margin-bottom:14px;
    display:flex;align-items:center;gap:8px;
  }
  .panel-label::before{content:'▸';color:var(--green);}

  /* mode toggle */
  .modes{display:flex;gap:10px;margin-bottom:14px;}
  .mode-btn{
    flex:1;
    padding:10px 8px;
    background:var(--panel);
    border:1px solid var(--border);
    color:var(--textdim);
    font-family:'Rajdhani',sans-serif;
    font-weight:600;
    font-size:.95rem;
    letter-spacing:1px;
    border-radius:6px;
    cursor:pointer;
    transition:.15s;
  }
  .mode-btn.active{
    color:var(--bg);
    background:var(--cyan);
    border-color:var(--cyan);
    box-shadow:0 0 14px rgba(0,229,255,0.4);
  }
  .mode-btn:hover:not(.active){border-color:var(--cyan);color:var(--cyan);}

  select, input[type=text]{
    width:100%;
    background:var(--panel);
    border:1px solid var(--border);
    color:var(--text);
    padding:10px 12px;
    border-radius:6px;
    font-family:'Exo 2', sans-serif;
    font-size:.95rem;
    margin-bottom:12px;
  }
  select:focus, input:focus{outline:none;border-color:var(--cyan);}
  label.field-label{
    font-family:'Share Tech Mono', monospace;
    font-size:.68rem;
    letter-spacing:1.5px;
    text-transform:uppercase;
    color:var(--textdim);
    display:block;
    margin-bottom:6px;
  }

  .btn{
    font-family:'Rajdhani',sans-serif;
    font-weight:700;
    font-size:1rem;
    letter-spacing:1px;
    text-transform:uppercase;
    padding:12px 20px;
    border-radius:6px;
    border:1px solid var(--green);
    background:rgba(57,255,136,0.08);
    color:var(--green);
    cursor:pointer;
    transition:.15s;
    width:100%;
  }
  .btn:hover{background:var(--green);color:var(--bg);box-shadow:0 0 16px rgba(57,255,136,0.5);}
  .btn:disabled{opacity:.4;cursor:not-allowed;}
  .btn.red{border-color:var(--red);color:var(--red);background:rgba(255,51,85,0.08);}
  .btn.red:hover{background:var(--red);color:var(--bg);box-shadow:0 0 16px rgba(255,51,85,0.5);}
  .btn.orange{border-color:var(--orange);color:var(--orange);background:rgba(255,154,46,0.08);}
  .btn.orange:hover{background:var(--orange);color:var(--bg);box-shadow:0 0 16px rgba(255,154,46,0.5);}

  /* lyrics output */
  .lyrics-box{
    margin-top:16px;
    background:#000;
    border:1px solid var(--border);
    border-radius:6px;
    padding:18px 20px;
    min-height:120px;
    font-family:'Share Tech Mono', monospace;
    font-size:.95rem;
    line-height:1.9;
    color:var(--green);
    white-space:pre-wrap;
  }
  .lyrics-box.empty{color:var(--textdim);font-style:italic;}
  .lyrics-box .verse-title{color:var(--orange);display:block;margin-bottom:8px;}

  /* beat panel */
  .row{display:flex;gap:14px;align-items:center;margin-bottom:14px;flex-wrap:wrap;}
  .row label.field-label{margin-bottom:0;}
  .slider-row{display:flex;align-items:center;gap:12px;}
  .slider-row span.val{
    font-family:'Share Tech Mono', monospace;
    color:var(--cyan);
    min-width:52px;
    text-align:right;
    font-size:.85rem;
  }
  input[type=range]{
    flex:1;
    accent-color:var(--cyan);
  }
  .beat-controls{display:flex;gap:10px;}
  .beat-controls .btn{width:auto;flex:1;}
  .pulse{
    width:14px;height:14px;border-radius:50%;
    background:var(--border);
    display:inline-block;
    margin-left:8px;
    transition:.05s;
  }
  .pulse.on{background:var(--cyan);box-shadow:0 0 10px var(--cyan);}

  .status{
    font-family:'Share Tech Mono', monospace;
    font-size:.75rem;
    color:var(--textdim);
    margin-top:10px;
    min-height:16px;
  }
  .status.error{color:var(--red);}
  .status.ok{color:var(--green);}

  footer{
    text-align:center;
    font-family:'Share Tech Mono', monospace;
    font-size:.65rem;
    color:var(--textdim);
    letter-spacing:1px;
    margin-top:30px;
  }
</style>
</head>
<body>
<div class="wrap">

  <header>
    <div class="logo">EMX</div>
  </header>
  <div style="text-align:center;margin-bottom:4px;">
    <span class="sub">// suita de unelte personale</span>
  </div>
  <h1 class="title">Generator de Manele</h1>

  <!-- LYRICS PANEL -->
  <div class="panel">
    <div class="panel-label">Versuri</div>

    <div class="modes">
      <button class="mode-btn active" id="modeRandomBtn" onclick="setMode('random')">🎲 Random</button>
      <button class="mode-btn" id="modeAiBtn" onclick="setMode('ai')">🤖 AI</button>
    </div>

    <div id="randomFields">
      <label class="field-label">Temă</label>
      <select id="themeSelect">
        <option value="dragoste">Dragoste / dor</option>
        <option value="bani">Bani / lux</option>
        <option value="fite">Fițe / superioritate</option>
        <option value="petrecere">Petrecere</option>
        <option value="dusmani">Dușmani / invidie</option>
      </select>
    </div>

    <div id="aiFields" style="display:none;">
      <label class="field-label">Despre ce sunt versurile?</label>
      <input type="text" id="aiThemeInput" placeholder="ex: mi-am luat tren nou de serviciu, sunt mecanic de locomotivă...">
    </div>

    <button class="btn" id="generateBtn" onclick="generateLyrics()">Generează versuri</button>

    <div class="lyrics-box empty" id="lyricsBox">Apasă „Generează versuri" ca să înceapă showul.</div>
    <div class="status" id="lyricsStatus"></div>
  </div>

  <!-- BEAT PANEL -->
  <div class="panel">
    <div class="panel-label">Instrumental <span class="pulse" id="pulseDot"></span></div>

    <div class="slider-row">
      <label class="field-label" style="min-width:60px;">Tempo</label>
      <input type="range" id="bpmSlider" min="70" max="170" value="128" oninput="updateBpmLabel()">
      <span class="val" id="bpmVal">128 BPM</span>
    </div>

    <div class="slider-row">
      <label class="field-label" style="min-width:60px;">Volum</label>
      <input type="range" id="volSlider" min="0" max="100" value="60">
      <span class="val" id="volVal">60%</span>
    </div>

    <div class="beat-controls">
      <button class="btn orange" id="playBtn" onclick="toggleBeat()">▶ Play beat</button>
      <button class="btn red" onclick="stopBeat()">■ Stop</button>
    </div>
    <div class="status" id="beatStatus">Sintetizat live în browser, gamă orientală + ritm de darbuka.</div>
  </div>

  <footer>EMX // unelte personale · vladynitu1.github.io</footer>
</div>

<script>
/* ============== LYRICS GENERATOR ============== */
let mode = 'random';

function setMode(m){
  mode = m;
  document.getElementById('modeRandomBtn').classList.toggle('active', m==='random');
  document.getElementById('modeAiBtn').classList.toggle('active', m==='ai');
  document.getElementById('randomFields').style.display = m==='random' ? 'block' : 'none';
  document.getElementById('aiFields').style.display = m==='ai' ? 'block' : 'none';
}

const banks = {
  dragoste: {
    nume: ["Andreea","Larisa","Bianca","prințesa mea","comoara mea","dulceața mea","inima mea"],
    obiecte: ["poza ta","numărul tău","inelul dat de mine","brățara de-aur","mesajul tău de noapte"],
    locuri: ["pe balcon","la geam, în noapte","în mașina mea","pe ringul de dans","sub luna plină"],
    sentimente: ["dor nebun","foc în piept","dragoste de milioane","supărare mare","gelozie cruntă"],
    superlative: ["fără margini","ca-n filme","cum n-a mai fost","de nedescris","până la capăt"],
    actiuni: ["te aștept la geam","plâng în mașină","sun de zece ori","scriu numele tău", "ard o lumânare pentru noi"]
  },
  bani: {
    nume: ["Bosu","Mister X","Rambo","Nasty","Regele"],
    obiecte: ["Mercedes-ul negru","lanțul de-aur","ceasul de firmă","vila din deal","banii din portbagaj"],
    locuri: ["în fața blocului","la munte, la vilă","în Dubai","pe litoral, la Vip","la crâșma din centru"],
    sentimente: ["mândrie de neoprit","putere fără limite","satisfacție totală","respect câștigat greu"],
    superlative: ["de milioane","fără egal","cel mai tare din oraș","greu ca aurul","de nota zece"],
    actiuni: ["arunc banii-n aer","număr note verzi","plătesc tot cu cash","urc la volan tras", "sar peste toți din cartier"]
  },
  fite: {
    nume: ["frate","dușmane","lume","tot cartierul","toată gașca"],
    obiecte: ["fițele mele","hainele de firmă","ochelarii de soare","stilul meu unic"],
    locuri: ["pe bulevard","la evenimentul anului","la nunta din sat","în fața tuturor"],
    sentimente: ["încredere fără limite","stil pe care nu-l ai","clasă naturală"],
    superlative: ["nimeni nu mă-ntrece","sunt unic în tot orașul","stau deasupra tuturor"],
    actiuni: ["defilez încet","arăt lumii cine sunt","las gura tuturor căscată","calc apăsat, cu stil"]
  },
  petrecere: {
    nume: ["prieteni","lăutari","toată sala","nuntași","tot satul"],
    obiecte: ["șampania","muzica de la formație","paharul ridicat","toastul de onoare"],
    locuri: ["la nuntă","la botez","la masa mare","pe ringul de dans","până dimineața"],
    sentimente: ["veselie mare","bucurie fără sfârșit","poftă de viață"],
    superlative: ["ca la carte","cum se cuvine","până cade tavanul","fără oprire"],
    actiuni: ["ridic paharul sus","dansez fără oprire","chem toată lumea la joc","strig către lăutari"]
  },
  dusmani: {
    nume: ["dușmanii mei","invidioșii","lumea rea","cei care mă vorbesc"],
    obiecte: ["vorbele lor goale","invidia din priviri","minciunile spuse-n spate"],
    locuri: ["în spatele meu","în tot cartierul","pe la colțuri","prin sat"],
    sentimente: ["curaj fără frică","liniște deplină","putere de fier"],
    superlative: ["nu mă-ating cu nimic","stau mai sus ca oricând","rămân neclintit"],
    actiuni: ["merg cu capul sus","calc peste vorbe goale","zâmbesc și trec departe","rămân tot eu, cel mai tare"]
  }
};

function pick(arr){ return arr[Math.floor(Math.random()*arr.length)]; }

const templates = [
  b => `Cu ${pick(b.obiecte)} ${pick(b.locuri)},`,
  b => `simt ${pick(b.sentimente)}, ${pick(b.superlative)}.`,
  b => `${pick(b.nume)}, să știi că nu mă opresc,`,
  b => `${pick(b.actiuni)}, ${pick(b.locuri)}.`,
  b => `E ${pick(b.sentimente)} în tot ce fac,`,
  b => `și ${pick(b.actiuni)}, ${pick(b.superlative)}.`,
  b => `Nu-i nimeni ca mine, ${pick(b.nume)},`,
  b => `${pick(b.actiuni)}, mereu ${pick(b.superlative)}.`
];

function generateRandomLyrics(themeKey){
  const b = banks[themeKey];
  const lines = [];
  const nLines = 8;
  for(let i=0;i<nLines;i++){
    lines.push(templates[i % templates.length](b));
  }
  const title = "EMX Manea // " + themeKey.toUpperCase();
  return title + "\n\n" + lines.join("\n") + "\n\n[Refren, de două ori]";
}

async function generateAiLyrics(theme){
  const prompt = `Scrie versuri de manea românească, stil parodic și amuzant, pe tema: "${theme}".
Reguli:
- Limba română, 8-14 versuri plus un refren scurt de 2-4 versuri.
- Rime cât mai naturale, ritm specific manelelor (lăudăroșenie, exagerări, emoție mare).
- Nu folosi nume de artiști reali sau persoane reale.
- Răspunde DOAR cu versurile, fără explicații, fără ghilimele, fără markdown.`;

  const response = await fetch("https://api.anthropic.com/v1/messages", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({
      model: "claude-sonnet-4-6",
      max_tokens: 1000,
      messages: [{ role: "user", content: prompt }]
    })
  });

  if(!response.ok){
    throw new Error("Eroare API: " + response.status);
  }
  const data = await response.json();
  const text = (data.content || [])
    .filter(item => item.type === "text")
    .map(item => item.text)
    .join("\n")
    .trim();
  if(!text) throw new Error("Răspuns gol de la AI.");
  return "EMX Manea // AI\n\n" + text;
}

async function generateLyrics(){
  const box = document.getElementById('lyricsBox');
  const status = document.getElementById('lyricsStatus');
  const btn = document.getElementById('generateBtn');
  status.className = 'status';
  status.textContent = '';

  if(mode === 'random'){
    const theme = document.getElementById('themeSelect').value;
    box.classList.remove('empty');
    box.textContent = generateRandomLyrics(theme);
    status.className = 'status ok';
    status.textContent = 'Generat local, fără AI.';
  } else {
    const theme = document.getElementById('aiThemeInput').value.trim();
    if(!theme){
      status.className = 'status error';
      status.textContent = 'Scrie mai întâi despre ce vrei să fie manea.';
      return;
    }
    btn.disabled = true;
    box.classList.remove('empty');
    box.textContent = 'Se compune manea...';
    status.textContent = '';
    try{
      const lyrics = await generateAiLyrics(theme);
      box.textContent = lyrics;
      status.className = 'status ok';
      status.textContent = 'Generat cu AI.';
    }catch(err){
      box.classList.add('empty');
      box.textContent = 'Nu am putut genera versurile.';
      status.className = 'status error';
      status.textContent = err.message || 'Eroare necunoscută.';
    }finally{
      btn.disabled = false;
    }
  }
}

/* ============== BEAT PLAYER (Web Audio API) ============== */
let audioCtx = null;
let isPlaying = false;
let schedulerTimer = null;
let nextNoteTime = 0;
let step = 0;
const stepsPerBar = 16;
const lookahead = 25; // ms
const scheduleAheadTime = 0.1; // s

// Hijaz-ish scale (semitone offsets from root) — gives the oriental manele flavor
const scale = [0,1,4,5,7,8,10];
const rootFreq = 196.00; // G3

function noteFreq(scaleIndex, octave=0){
  const semis = scale[((scaleIndex % scale.length) + scale.length) % scale.length] + 12*octave;
  return rootFreq * Math.pow(2, semis/12);
}

// catchy syncopated riff, indices into scale (with octave jumps)
const riff = [0,2,4,2,0,-1,0,4, 7,4,2,0,2,4,5,4];

// darbuka-ish pattern: D = dum (low), T = tek (high), . = rest
const percPattern = "D..T D.TD D..T D.TD".replace(/ /g,'');

function getBpm(){ return parseInt(document.getElementById('bpmSlider').value, 10); }
function getVol(){ return parseInt(document.getElementById('volSlider').value, 10) / 100; }

function updateBpmLabel(){
  document.getElementById('bpmVal').textContent = getBpm() + ' BPM';
}
document.getElementById('volSlider').addEventListener('input', () => {
  document.getElementById('volVal').textContent = getVol()*100 + '%';
});

function playSynthNote(freq, time, dur, gainMult=1){
  const ctx = audioCtx;
  const osc = ctx.createOscillator();
  const gain = ctx.createGain();
  osc.type = 'sawtooth';
  osc.frequency.setValueAtTime(freq, time);
  const vol = getVol() * 0.18 * gainMult;
  gain.gain.setValueAtTime(0.0001, time);
  gain.gain.exponentialRampToValueAtTime(Math.max(vol,0.0001), time + 0.015);
  gain.gain.exponentialRampToValueAtTime(0.0001, time + dur);
  osc.connect(gain).connect(ctx.destination);
  osc.start(time);
  osc.stop(time + dur + 0.02);
}

function playDrum(time, low){
  const ctx = audioCtx;
  const osc = ctx.createOscillator();
  const gain = ctx.createGain();
  osc.type = 'sine';
  const vol = getVol() * (low ? 0.5 : 0.25);
  osc.frequency.setValueAtTime(low ? 90 : 260, time);
  osc.frequency.exponentialRampToValueAtTime(low ? 45 : 140, time + 0.12);
  gain.gain.setValueAtTime(vol, time);
  gain.gain.exponentialRampToValueAtTime(0.0001, time + (low ? 0.18 : 0.09));
  osc.connect(gain).connect(ctx.destination);
  osc.start(time);
  osc.stop(time + 0.2);
}

function scheduleStep(stepIndex, time){
  // melody: one riff note per 16th
  const deg = riff[stepIndex % riff.length];
  const octave = deg >= 7 ? 1 : (deg < 0 ? -1 : 0);
  playSynthNote(noteFreq(deg, 0), time, 0.16, 0.9);

  // percussion
  const pChar = percPattern[stepIndex % percPattern.length];
  if(pChar === 'D') playDrum(time, true);
  if(pChar === 'T') playDrum(time, false);

  // visual pulse on beat 0,4,8,12
  if(stepIndex % 4 === 0){
    const dot = document.getElementById('pulseDot');
    setTimeout(() => {
      dot.classList.add('on');
      setTimeout(()=>dot.classList.remove('on'), 90);
    }, Math.max(0,(time - audioCtx.currentTime)*1000));
  }
}

function scheduler(){
  const secondsPerStep = 60.0 / getBpm() / 4; // 16th notes
  while(nextNoteTime < audioCtx.currentTime + scheduleAheadTime){
    scheduleStep(step, nextNoteTime);
    nextNoteTime += secondsPerStep;
    step = (step + 1) % stepsPerBar;
  }
  schedulerTimer = setTimeout(scheduler, lookahead);
}

function toggleBeat(){
  if(isPlaying){ stopBeat(); return; }
  if(!audioCtx){ audioCtx = new (window.AudioContext || window.webkitAudioContext)(); }
  if(audioCtx.state === 'suspended'){ audioCtx.resume(); }
  isPlaying = true;
  step = 0;
  nextNoteTime = audioCtx.currentTime + 0.05;
  scheduler();
  document.getElementById('playBtn').textContent = '⏸ Pauză';
  document.getElementById('beatStatus').textContent = 'Se cântă... ridică volumul, frate!';
  document.getElementById('beatStatus').className = 'status ok';
}

function stopBeat(){
  isPlaying = false;
  if(schedulerTimer) clearTimeout(schedulerTimer);
  document.getElementById('playBtn').textContent = '▶ Play beat';
  document.getElementById('beatStatus').textContent = 'Sintetizat live în browser, gamă orientală + ritm de darbuka.';
  document.getElementById('beatStatus').className = 'status';
}
</script>
</body>
</html>
