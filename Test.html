<!DOCTYPE html>

<html lang="ro">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EMX — Document Browser</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=IBM+Plex+Mono:wght@300;400;600&family=IBM+Plex+Sans:wght@300;400;600&display=swap');

:root {
–red: #E8212B;
–dark: #0a0a0a;
–mid: #141414;
–border: #222;
–text: #e0e0e0;
–muted: #666;
}

- { margin: 0; padding: 0; box-sizing: border-box; }

body {
background: var(–dark);
color: var(–text);
font-family: ‘IBM Plex Sans’, sans-serif;
min-height: 100vh;
}

.banner {
background: var(–red);
height: 90px;
display: flex;
align-items: center;
gap: 24px;
padding: 0 40px;
position: relative;
overflow: hidden;
}
.banner::after {
content: ‘EMX EMX EMX EMX EMX EMX EMX EMX EMX’;
position: absolute;
font-family: ‘Bebas Neue’, sans-serif;
font-size: 130px;
color: rgba(255,255,255,0.05);
white-space: nowrap;
right: -20px; top: -20px;
letter-spacing: 12px;
pointer-events: none;
}
.banner-logo {
font-family: ‘Bebas Neue’, sans-serif;
font-size: 74px;
color: #fff;
letter-spacing: 10px;
text-shadow: 3px 3px 0 rgba(0,0,0,0.25);
position: relative; z-index: 1;
}
.banner-sub {
font-family: ‘IBM Plex Mono’, monospace;
font-size: 11px;
color: rgba(255,255,255,0.75);
letter-spacing: 3px;
text-transform: uppercase;
border-left: 2px solid rgba(255,255,255,0.35);
padding-left: 20px;
line-height: 1.8;
position: relative; z-index: 1;
}

.status-bar {
background: var(–mid);
border-bottom: 1px solid var(–border);
padding: 12px 40px;
display: flex;
align-items: center;
gap: 10px;
font-family: ‘IBM Plex Mono’, monospace;
font-size: 12px;
color: var(–muted);
min-height: 42px;
}
.dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; background: var(–muted); }
.dot.loading { background: #f0a500; animation: blink 1s infinite; }
.dot.ok { background: #2ecc71; }
.dot.err { background: var(–red); }
@keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.2} }

.content { padding: 32px 40px; }

.category { margin-bottom: 44px; }
.cat-header {
display: flex; align-items: center; gap: 12px;
margin-bottom: 16px; padding-bottom: 10px;
border-bottom: 2px solid var(–border);
}
.cat-icon {
width: 34px; height: 34px;
background: var(–red); border-radius: 5px;
display: flex; align-items: center; justify-content: center;
font-size: 17px;
}
.cat-name { font-family: ‘Bebas Neue’, sans-serif; font-size: 26px; letter-spacing: 2px; color: #fff; }
.cat-count {
font-family: ‘IBM Plex Mono’, monospace; font-size: 11px;
color: var(–muted); background: #1c1c1c;
border: 1px solid var(–border); padding: 3px 10px; border-radius: 20px;
}

.file-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 12px; }

.file-card {
background: var(–mid); border: 1px solid var(–border);
border-radius: 6px; padding: 14px 12px 12px;
cursor: pointer; display: flex; flex-direction: column; gap: 10px;
position: relative; overflow: hidden;
transition: border-color 0.2s, transform 0.15s, background 0.2s;
}
.file-card::before {
content: ‘’; position: absolute; top: 0; left: 0; right: 0; height: 2px;
background: var(–red); transform: scaleX(0); transition: transform 0.2s; transform-origin: left;
}
.file-card:hover { border-color: #444; background: #1a1a1a; transform: translateY(-2px); }
.file-card:hover::before { transform: scaleX(1); }

.file-thumb {
width: 100%; aspect-ratio: 4/3; background: #1a1a1a;
border-radius: 4px; display: flex; align-items: center;
justify-content: center; overflow: hidden; position: relative;
}
.file-thumb img { width: 100%; height: 100%; object-fit: cover; border-radius: 4px; }
.thumb-icon { font-size: 38px; opacity: 0.35; }
.type-badge {
position: absolute; top: 6px; right: 6px;
background: rgba(0,0,0,0.75); color: var(–red);
font-family: ‘IBM Plex Mono’, monospace; font-size: 9px;
font-weight: 600; padding: 2px 6px; border-radius: 3px; letter-spacing: 1px;
}
.file-name {
font-size: 11px; color: #ccc; line-height: 1.4; word-break: break-word;
display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden;
}

.modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.93); z-index: 1000; flex-direction: column; }
.modal.open { display: flex; }
.modal-top {
background: var(–mid); border-bottom: 1px solid var(–border);
padding: 14px 24px; display: flex; align-items: center; gap: 14px; flex-shrink: 0;
}
.modal-title { flex: 1; font-family: ‘IBM Plex Mono’, monospace; font-size: 13px; color: var(–text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.modal-btn {
background: var(–red); border: none; color: #fff; padding: 8px 20px;
font-family: ‘Bebas Neue’, sans-serif; font-size: 16px; letter-spacing: 1px;
border-radius: 4px; cursor: pointer; text-decoration: none; flex-shrink: 0;
}
.modal-close {
background: #222; border: 1px solid var(–border); color: var(–text);
width: 32px; height: 32px; border-radius: 4px; font-size: 18px; cursor: pointer;
display: flex; align-items: center; justify-content: center; flex-shrink: 0; transition: background 0.2s;
}
.modal-close:hover { background: var(–red); border-color: var(–red); }
.modal-body { flex: 1; overflow: auto; display: flex; align-items: center; justify-content: center; padding: 16px; }
.modal-body iframe { width: 100%; height: 100%; border: none; border-radius: 4px; background: #fff; }
.modal-body img { max-width: 100%; max-height: 100%; object-fit: contain; border-radius: 4px; box-shadow: 0 20px 60px rgba(0,0,0,0.6); }

::-webkit-scrollbar { width: 6px; height: 6px; }
::-webkit-scrollbar-track { background: var(–dark); }
::-webkit-scrollbar-thumb { background: #2a2a2a; border-radius: 3px; }
::-webkit-scrollbar-thumb:hover { background: var(–red); }
</style>

</head>
<body>

<div class="banner">
  <div class="banner-logo">EMX</div>
  <div class="banner-sub">Document Browser<br>Transferoviar Călători</div>
</div>

<div class="status-bar">
  <div class="dot loading" id="dot"></div>
  <span id="status">Se încarcă folderele...</span>
</div>

<div class="content" id="content"></div>

<div class="modal" id="modal">
  <div class="modal-top">
    <span class="modal-title" id="modalTitle"></span>
    <a class="modal-btn" id="modalLink" href="#" target="_blank">↗ DESCHIDE</a>
    <button class="modal-close" onclick="closeModal()">✕</button>
  </div>
  <div class="modal-body" id="modalBody"></div>
</div>

<script>
const API_KEY = 'AIzaSyAkrWRtDdBb0s6eqRnTbJbuAfqxe0H5Kok';
const ROOT_ID = '1mqSeG9xrvCKZhgI4ztNVqKCj2ciUq4Wr';
const BASE    = 'https://www.googleapis.com/drive/v3/files';

function setStatus(state, msg) {
  document.getElementById('dot').className = 'dot ' + state;
  document.getElementById('status').textContent = msg;
}

async function driveList(parentId) {
  const q = `'${parentId}' in parents and trashed=false`;
  const url = `${BASE}?q=${encodeURIComponent(q)}&key=${API_KEY}&fields=files(id,name,mimeType)&pageSize=200`;
  const r = await fetch(url);
  const data = await r.json();
  if (!r.ok) throw new Error(data.error?.message || 'API error ' + r.status);
  return data.files || [];
}

function fileType(mime, name) {
  if (mime === 'application/pdf') return 'pdf';
  if (mime && mime.startsWith('image/')) return 'image';
  const ext = (name || '').split('.').pop().toLowerCase();
  if (ext === 'pdf') return 'pdf';
  if (['jpg','jpeg','png','gif','webp','bmp','svg'].includes(ext)) return 'image';
  return null;
}

async function load() {
  try {
    const rootFiles = await driveList(ROOT_ID);
    const folders   = rootFiles.filter(f => f.mimeType === 'application/vnd.google-apps.folder');
    const direct    = rootFiles.filter(f => fileType(f.mimeType, f.name));

    const categories = [];
    if (direct.length) categories.push({ name: 'General', files: direct });

    for (const folder of folders) {
      setStatus('loading', `Se încarcă: ${folder.name}…`);
      const files = (await driveList(folder.id)).filter(f => fileType(f.mimeType, f.name));
      if (files.length) categories.push({ name: folder.name, files });
    }

    if (!categories.length) {
      setStatus('err', 'Nu s-au găsit fișiere PDF sau imagini.');
      return;
    }

    const total = categories.reduce((s, c) => s + c.files.length, 0);
    setStatus('ok', `${total} fișiere în ${categories.length} categorii — ${new Date().toLocaleTimeString('ro-RO')}`);
    render(categories);

  } catch(e) {
    setStatus('err', 'Eroare: ' + e.message);
    console.error(e);
  }
}

function render(cats) {
  const content = document.getElementById('content');
  content.innerHTML = '';

  for (const cat of cats) {
    const sec = document.createElement('div');
    sec.className = 'category';
    sec.innerHTML = `
      <div class="cat-header">
        <div class="cat-icon">📂</div>
        <div class="cat-name">${esc(cat.name)}</div>
        <div class="cat-count">${cat.files.length} fișiere</div>
      </div>
      <div class="file-grid"></div>`;

    const grid = sec.querySelector('.file-grid');

    for (const file of cat.files) {
      const type = fileType(file.mimeType, file.name);
      const card = document.createElement('div');
      card.className = 'file-card';
      card.onclick = () => openFile(file, type);

      card.innerHTML = `
        <div class="file-thumb">
          ${type === 'image'
            ? `<img src="https://drive.google.com/thumbnail?id=${file.id}&sz=w300" onerror="this.style.display='none'" loading="lazy">`
            : `<div class="thumb-icon">📄</div>`}
          <div class="type-badge">${type.toUpperCase()}</div>
        </div>
        <div class="file-name">${esc(file.name)}</div>`;

      grid.appendChild(card);
    }
    content.appendChild(sec);
  }
}

function openFile(file, type) {
  document.getElementById('modalTitle').textContent = file.name;
  document.getElementById('modalLink').href = `https://drive.google.com/file/d/${file.id}/view`;
  const body = document.getElementById('modalBody');
  body.innerHTML = '';

  if (type === 'pdf') {
    const iframe = document.createElement('iframe');
    iframe.src = `https://drive.google.com/file/d/${file.id}/preview`;
    body.appendChild(iframe);
  } else {
    const img = document.createElement('img');
    img.src = `https://drive.google.com/thumbnail?id=${file.id}&sz=w1600`;
    img.alt = file.name;
    body.appendChild(img);
  }

  document.getElementById('modal').classList.add('open');
}

function closeModal() {
  document.getElementById('modal').classList.remove('open');
  document.getElementById('modalBody').innerHTML = '';
}

function esc(s) { return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

document.getElementById('modal').addEventListener('click', e => { if (e.target === e.currentTarget) closeModal(); });
document.addEventListener('keydown', e => { if (e.key === 'Escape') closeModal(); });

load();
</script>

</body>
</html>
